# Stable-channel defaults. scripts/build-desktop.sh writes a generated config
# with channel-specific productName, appId, icon, version, and protocol scheme
# before packaging dev or canary variants.
appId: ai.thinkwork.spaces.desktop
productName: ThinkWork Spaces
artifactName: ${productName}-${version}-${arch}.${ext}
asar: true

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - package.json

extraMetadata:
  main: out/main/index.js

protocols:
  - name: ThinkWork Spaces
    schemes:
      - thinkwork

mac:
  category: public.app-category.productivity
  icon: build/icons/icon-active.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64

dmg:
  sign: false

publish:
  - provider: github
    owner: thinkwork-ai
    repo: thinkwork
    vPrefixedTagName: true
    releaseType: release
    publishAutoUpdate: true

generateUpdatesFilesForAllChannels: true
