<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ThinkWork OG</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; overflow: hidden; }
      body {
        background: radial-gradient(ellipse 900px 560px at 50% 35%, rgba(56, 189, 248, 0.22), transparent 70%),
                    radial-gradient(ellipse 720px 500px at 50% 110%, rgba(56, 189, 248, 0.12), transparent 70%),
                    #070a0f;
        color: #e2e8f0;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        flex-direction: column;
        padding: 72px 80px;
        position: relative;
      }
      .topline {
        display: flex;
        align-items: center;
        gap: 18px;
      }
      .mark {
        width: 56px;
        height: 56px;
        color: #38bdf8;
        filter: drop-shadow(0 0 20px rgba(56, 189, 248, 0.45));
      }
      .wordmark {
        font-size: 32px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: #f1f5f9;
      }
      .eyebrow {
        margin-top: 140px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 8px 16px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #cbd5e1;
        width: fit-content;
      }
      .eyebrow-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: #38bdf8;
      }
      .headline {
        margin-top: 32px;
        font-size: 88px;
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 1.02;
        color: #f8fafc;
        max-width: 1000px;
      }
      .accent { color: #38bdf8; }
      .tagline {
        margin-top: 36px;
        font-size: 26px;
        line-height: 1.4;
        color: #94a3b8;
        max-width: 880px;
      }
      .footer {
        position: absolute;
        bottom: 56px;
        left: 80px;
        right: 80px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
        font-size: 14px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #475569;
      }
      .footer-right { color: #38bdf8; }
    </style>
  </head>
  <body>
    <div class="topline">
      <!-- BrainMark simplified to match the site -->
      <svg class="mark" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
          <circle cx="60" cy="60" r="34" />
          <circle cx="44" cy="48" r="3.5" fill="currentColor" />
          <circle cx="76" cy="48" r="3.5" fill="currentColor" />
          <circle cx="60" cy="72" r="3.5" fill="currentColor" />
          <circle cx="36" cy="66" r="2.5" fill="currentColor" />
          <circle cx="84" cy="66" r="2.5" fill="currentColor" />
          <circle cx="60" cy="42" r="2.5" fill="currentColor" />
          <path d="M44 48 L76 48 M44 48 L60 72 M76 48 L60 72 M36 66 L44 48 M36 66 L60 72 M84 66 L76 48 M84 66 L60 72 M60 42 L44 48 M60 42 L76 48" />
        </g>
      </svg>
      <span class="wordmark">ThinkWork</span>
    </div>

    <span class="eyebrow">
      <span class="eyebrow-dot"></span>
      Governed AI adoption
    </span>
    <h1 class="headline">
      The control plane for<br />
      <span class="accent">governed AI adoption.</span>
    </h1>
    <p class="tagline">
      Capability-granted templates, per-agent spend budgets, and an evaluation harness &mdash; under one admin surface, running inside your AWS.
    </p>

    <div class="footer">
      <span>thinkwork.ai</span>
      <span class="footer-right">Your runtime · Your memory · Your AWS</span>
    </div>
  </body>
</html>
