<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0"
		/>
		<title>Thinkwork Computer Sandbox</title>
		<!--
			CSP is set authoritatively by the CloudFront response-headers
			policy on the computer_sandbox_site distribution (plan-012 U3,
			contract v1 section CSP profile). The meta tag below is
			defense-in-depth for local dev / preview where the response-
			headers policy is not applied. The directives match the CDN
			policy except frame-ancestors, which browsers ignore in meta CSP.
		-->
		<meta
			http-equiv="Content-Security-Policy"
			content="default-src 'none'; script-src 'self' blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'self';"
		/>
	</head>
	<body style="margin: 0">
		<div id="thinkwork-iframe-shell-root"></div>
		<script type="module" src="./main.ts"></script>
	</body>
</html>
