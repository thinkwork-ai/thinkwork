version: 0.2

phases:
  install:
    commands:
      - |
        if ! command -v terraform >/dev/null 2>&1; then
          curl -fsSLo /tmp/terraform.zip https://releases.hashicorp.com/terraform/1.8.5/terraform_1.8.5_linux_amd64.zip
          unzip -oq /tmp/terraform.zip -d /usr/local/bin
        fi
        if ! command -v psql >/dev/null 2>&1; then
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y postgresql-client
          elif command -v yum >/dev/null 2>&1; then
            yum install -y postgresql15
          fi
        fi
      - terraform version
      - psql --version
  build:
    commands:
      - aws s3 cp "$THINKWORK_RUNNER_SCRIPT_S3_URI" /tmp/thinkwork-runner.py
      - python3 /tmp/thinkwork-runner.py
