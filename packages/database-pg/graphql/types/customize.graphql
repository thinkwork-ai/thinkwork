# Customize page surface — read-only catalog + bindings for Workflows.

type WorkflowCatalogItem {
  id: ID!
  tenantId: ID!
  slug: String!
  displayName: String!
  description: String
  category: String
  icon: String
  defaultSchedule: String
  status: String!
  enabled: Boolean!
}

# IDs of currently-bound items per kind for the caller's Computer.
# Frontend merges these with the catalog lists to derive `connected: true`.
type CustomizeBindings {
  computerId: ID!
  connectedSkillIds: [String!]!
  connectedWorkflowSlugs: [String!]!
}

# Mirrors ConnectorBinding shape for parity. Distinct from the heavier
# Routine type (which carries ASL versions, executions, triggers) — this
# is the binding-toggle projection only, sufficient for the Customize
# Sheet's status flip.
type WorkflowBinding {
  id: ID!
  tenantId: ID!
  agentId: ID!
  computerId: ID!
  catalogSlug: String!
  status: String!
  enabled: Boolean!
  updatedAt: AWSDateTime!
}

input DisableSkillInput {
  computerId: ID!
  skillId: String!
}

input EnableWorkflowInput {
  computerId: ID!
  slug: String!
}

input DisableWorkflowInput {
  computerId: ID!
  slug: String!
}

extend type Query {
  workflowCatalog: [WorkflowCatalogItem!]!
  customizeBindings: CustomizeBindings
}

extend type Mutation {
  disableSkill(input: DisableSkillInput!): Boolean!
  enableWorkflow(input: EnableWorkflowInput!): WorkflowBinding!
  disableWorkflow(input: DisableWorkflowInput!): Boolean!
}
