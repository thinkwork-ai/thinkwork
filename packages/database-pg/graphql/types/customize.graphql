# Customize page surface — read-only catalog + bindings for Workflow templates.
# These catalog/template rows predate the first-class Workflow control plane.
# They enable reusable templates by materializing Step Functions-backed Routine
# compatibility rows; they are not active Workflow inventory records.

type WorkflowTemplateCatalogItem {
  id: ID!
  tenantId: ID!
  slug: String!
  displayName: String!
  description: String
  category: String
  icon: String
  defaultSchedule: String
  status: String!
  enabled: Boolean!
}

type WorkflowCatalogItem {
  id: ID!
  tenantId: ID!
  slug: String!
  displayName: String!
  description: String
  category: String
  icon: String
  defaultSchedule: String
  status: String!
  enabled: Boolean!
}

# IDs of currently-bound items per kind for the caller's tenant
# platform agent. Frontend merges these with the catalog lists to derive
# `connected: true`.
type CustomizeBindings {
  agentId: ID!
  connectedSkillIds: [String!]!
  connectedWorkflowTemplateSlugs: [String!]!
  # Compatibility field for the pre-control-plane Customize API name.
  connectedWorkflowSlugs: [String!]!
}

# Mirrors ConnectorBinding shape for parity. Distinct from first-class
# WorkflowEngineBinding and from the heavier Routine type (which carries ASL
# versions, executions, triggers). This is the Customize template toggle
# projection only, sufficient for the Customize Sheet's status flip.
type WorkflowTemplateBinding {
  id: ID!
  tenantId: ID!
  agentId: ID!
  catalogSlug: String!
  status: String!
  enabled: Boolean!
  updatedAt: AWSDateTime!
}

# Compatibility type for the pre-control-plane Customize API name.
type WorkflowBinding {
  id: ID!
  tenantId: ID!
  agentId: ID!
  catalogSlug: String!
  status: String!
  enabled: Boolean!
  updatedAt: AWSDateTime!
}

input DisableSkillInput {
  agentId: ID!
  skillId: String!
}

input EnableWorkflowTemplateInput {
  agentId: ID!
  slug: String!
}

input DisableWorkflowTemplateInput {
  agentId: ID!
  slug: String!
}

input EnableWorkflowInput {
  agentId: ID!
  slug: String!
}

input DisableWorkflowInput {
  agentId: ID!
  slug: String!
}

extend type Query {
  workflowTemplateCatalog: [WorkflowTemplateCatalogItem!]!
  workflowCatalog: [WorkflowCatalogItem!]!
  customizeBindings: CustomizeBindings
}

extend type Mutation {
  disableSkill(input: DisableSkillInput!): Boolean!
  enableWorkflowTemplate(
    input: EnableWorkflowTemplateInput!
  ): WorkflowTemplateBinding!
  disableWorkflowTemplate(input: DisableWorkflowTemplateInput!): Boolean!
  enableWorkflow(input: EnableWorkflowInput!): WorkflowBinding!
  disableWorkflow(input: DisableWorkflowInput!): Boolean!
}
