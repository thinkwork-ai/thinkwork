# Customize page surface — read-only catalog + bindings for Connectors,
# Skills, and Workflows. Mutations land in a follow-on slice (plan U4-U6).

type ConnectorCatalogItem {
  id: ID!
  tenantId: ID!
  slug: String!
  kind: String!
  displayName: String!
  description: String
  category: String
  icon: String
  status: String!
  enabled: Boolean!
}

type WorkflowCatalogItem {
  id: ID!
  tenantId: ID!
  slug: String!
  displayName: String!
  description: String
  category: String
  icon: String
  defaultSchedule: String
  status: String!
  enabled: Boolean!
}

type SkillCatalogItem {
  # Stable per-tenant id (tenant_skills.id).
  id: ID!
  tenantId: ID!
  # tenant_skills.skill_id — same shape as agent_skills.skill_id.
  skillId: String!
  # Display fields are taken from the global skill_catalog row when one
  # exists; otherwise the resolver falls back to humanizing skill_id.
  displayName: String!
  description: String
  category: String
  icon: String
  source: String!
  enabled: Boolean!
}

# IDs of currently-bound items per kind for the caller's Computer.
# Frontend merges these with the catalog lists to derive `connected: true`.
type CustomizeBindings {
  computerId: ID!
  connectedConnectorSlugs: [String!]!
  connectedSkillIds: [String!]!
  connectedWorkflowSlugs: [String!]!
}

type ConnectorBinding {
  id: ID!
  tenantId: ID!
  computerId: ID!
  catalogSlug: String!
  status: String!
  enabled: Boolean!
  updatedAt: AWSDateTime!
}

type SkillBinding {
  id: ID!
  tenantId: ID!
  agentId: ID!
  skillId: String!
  enabled: Boolean!
}

input EnableConnectorInput {
  computerId: ID!
  slug: String!
}

input DisableConnectorInput {
  computerId: ID!
  slug: String!
}

input EnableSkillInput {
  computerId: ID!
  skillId: String!
}

input DisableSkillInput {
  computerId: ID!
  skillId: String!
}

extend type Query {
  connectorCatalog: [ConnectorCatalogItem!]!
  skillCatalog: [SkillCatalogItem!]!
  workflowCatalog: [WorkflowCatalogItem!]!
  customizeBindings: CustomizeBindings
}

extend type Mutation {
  enableConnector(input: EnableConnectorInput!): ConnectorBinding!
  disableConnector(input: DisableConnectorInput!): Boolean!
  enableSkill(input: EnableSkillInput!): SkillBinding!
  disableSkill(input: DisableSkillInput!): Boolean!
}
