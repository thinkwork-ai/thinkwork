# Customize page surface — read-only catalog + bindings for Skills and
# Workflows.

type WorkflowCatalogItem {
  id: ID!
  tenantId: ID!
  slug: String!
  displayName: String!
  description: String
  category: String
  icon: String
  defaultSchedule: String
  status: String!
  enabled: Boolean!
}

type SkillCatalogItem {
  # Stable per-tenant id (tenant_skills.id).
  id: ID!
  tenantId: ID!
  # tenant_skills.skill_id — same shape as agent_skills.skill_id.
  skillId: String!
  # Display fields are taken from the global skill_catalog row when one
  # exists; otherwise the resolver falls back to humanizing skill_id.
  displayName: String!
  description: String
  category: String
  icon: String
  source: String!
  enabled: Boolean!
}

# IDs of currently-bound items per kind for the caller's Computer.
# Frontend merges these with the catalog lists to derive `connected: true`.
type CustomizeBindings {
  computerId: ID!
  connectedSkillIds: [String!]!
  connectedWorkflowSlugs: [String!]!
}

# Mirrors ConnectorBinding shape for parity. Distinct from the heavier
# Routine type (which carries ASL versions, executions, triggers) — this
# is the binding-toggle projection only, sufficient for the Customize
# Sheet's status flip.
type WorkflowBinding {
  id: ID!
  tenantId: ID!
  agentId: ID!
  computerId: ID!
  catalogSlug: String!
  status: String!
  enabled: Boolean!
  updatedAt: AWSDateTime!
}

input EnableSkillInput {
  computerId: ID!
  skillId: String!
}

input DisableSkillInput {
  computerId: ID!
  skillId: String!
}

input EnableWorkflowInput {
  computerId: ID!
  slug: String!
}

input DisableWorkflowInput {
  computerId: ID!
  slug: String!
}

extend type Query {
  skillCatalog: [SkillCatalogItem!]!
  workflowCatalog: [WorkflowCatalogItem!]!
  customizeBindings: CustomizeBindings
}

extend type Mutation {
  enableSkill(input: EnableSkillInput!): AgentSkill!
  disableSkill(input: DisableSkillInput!): Boolean!
  enableWorkflow(input: EnableWorkflowInput!): WorkflowBinding!
  disableWorkflow(input: DisableWorkflowInput!): Boolean!
}
