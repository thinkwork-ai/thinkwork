type MemoryRecord {
  memoryRecordId: ID!
  content: MemoryContent
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
  expiresAt: AWSDateTime
  namespace: String
  strategyId: String
  strategy: String
  score: Float
  agentSlug: String
  factType: String
  confidence: Float
  eventDate: AWSDateTime
  occurredStart: AWSDateTime
  occurredEnd: AWSDateTime
  mentionedAt: AWSDateTime
  tags: [String!]
  accessCount: Int
  proofCount: Int
  context: String
  threadId: String
  """
  Compiled wiki pages (Compounding Memory) that cite this memory unit as
  a source. Populated from wiki_section_sources.source_ref. Returns pages
  scoped to the same agent as this memory (there is no cross-agent
  citation in v1). Returned pages have empty `sections`/`aliases` — fetch
  `wikiPage(tenantId, ownerId, type, slug)` for full detail.
  """
  wikiPages: [WikiPage!]!
}

type MemoryContent {
  text: String
}

enum MemoryStrategy {
  SEMANTIC
  PREFERENCES
  SUMMARIES
  EPISODES
  REFLECTIONS
}

type MemorySearchResult {
  records: [MemoryRecord!]!
  totalCount: Int!
}

type MemoryGraphNode {
  id: ID!
  label: String!
  type: String!
  strategy: String
  entityType: String
  edgeCount: Int!
  latestThreadId: String
}

type MemoryGraphEdge {
  source: String!
  target: String!
  type: String!
  label: String
  weight: Float!
}

type MemoryGraph {
  nodes: [MemoryGraphNode!]!
  edges: [MemoryGraphEdge!]!
}

"""
Runtime memory system configuration exposed to the admin UI.
Lets the UI decide which views to render (e.g. Knowledge Graph toggle is
only meaningful when Hindsight is deployed alongside managed memory).
"""
type MemorySystemConfig {
  """
  True when managed AgentCore Memory is provisioned and wired into the
  agent container. This is the always-on baseline — when false, memory
  features may be unavailable.
  """
  managedMemoryEnabled: Boolean!
  """
  True when the optional Hindsight add-on is deployed (ECS + ALB). Gates
  the Knowledge Graph / entity-graph views in the admin UI.
  """
  hindsightEnabled: Boolean!
}

extend type Query {
  memoryRecords(assistantId: ID!, namespace: String!): [MemoryRecord!]!
  memorySearch(assistantId: ID!, query: String!, strategy: MemoryStrategy, limit: Int): MemorySearchResult!
  memoryGraph(assistantId: ID!): MemoryGraph!
  memorySystemConfig: MemorySystemConfig!
}

extend type Mutation {
  deleteMemoryRecord(memoryRecordId: ID!): Boolean!
  updateMemoryRecord(memoryRecordId: ID!, content: String!): Boolean!
  captureMobileMemory(
    agentId: ID!
    content: String!
    factType: MobileCaptureFactType = FACT
    metadata: AWSJSON
    clientCaptureId: ID
  ): MobileMemoryCapture!
}

"""
Fact-type picker values exposed to the mobile quick-capture footer. Maps to
Hindsight's native fact_type via the resolver. FACT is the default when the
user doesn't override.
"""
enum MobileCaptureFactType {
  FACT
  PREFERENCE
  EXPERIENCE
  OBSERVATION
}

type MobileMemoryCapture {
  id: ID!
  tenantId: ID!
  agentId: ID!
  content: String!
  factType: MobileCaptureFactType!
  capturedAt: AWSDateTime!
  syncedAt: AWSDateTime
  metadata: AWSJSON
}

extend type Query {
  mobileMemoryCaptures(agentId: ID!, limit: Int = 50): [MobileMemoryCapture!]!
  """
  Free-text search across the full Hindsight bank for the given agent.
  Hits Hindsight's recall endpoint (semantic + rerank) and normalizes results
  back to MobileMemoryCapture so the Memories list can render search results
  with the same rows it uses for captures. Not filtered by capture_source —
  search is meant to answer "what does this agent know?", including chat-
  derived observations.
  """
  mobileMemorySearch(agentId: ID!, query: String!, limit: Int = 20): [MobileMemoryCapture!]!

  """
  Ranked wiki-page search for mobile. Runs the same Hindsight recall the
  mobile memory search does, then reverse-joins each hit through
  `wiki_section_sources` to the compiled pages that cite it. Pages are
  deduplicated (one row per page) and ranked by the sum of Hindsight hit
  scores across all of the page's matching source memories — so a page
  cited by multiple strong hits ranks higher than one cited by a single
  weak hit. `matchingMemoryIds` preserves input rank order so the client
  can show "why this page matched" without a second round trip.
  """
  mobileWikiSearch(agentId: ID!, query: String!, limit: Int = 20): [MobileWikiSearchResult!]!
}

type MobileWikiSearchResult {
  page: WikiPage!
  """
  Aggregated score — sum of the Hindsight hit scores for all memories cited
  by this page. Higher is better. Not a ts_rank; not comparable across
  queries.
  """
  score: Float!
  """
  Source memory unit ids whose recall hits caused this page to appear, in
  Hindsight rank order (best-ranked first).
  """
  matchingMemoryIds: [ID!]!
}

extend type Mutation {
  deleteMobileMemoryCapture(agentId: ID!, captureId: ID!): Boolean!
}
