type MemoryRecord {
  memoryRecordId: ID!
  content: MemoryContent
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
  expiresAt: AWSDateTime
  namespace: String
  strategyId: String
  strategy: String
  score: Float
  agentSlug: String
  factType: String
  confidence: Float
  eventDate: AWSDateTime
  occurredStart: AWSDateTime
  occurredEnd: AWSDateTime
  mentionedAt: AWSDateTime
  tags: [String!]
  accessCount: Int
  proofCount: Int
  context: String
}

type MemoryContent {
  text: String
}

enum MemoryStrategy {
  SEMANTIC
  PREFERENCES
  SUMMARIES
  EPISODES
  REFLECTIONS
}

type MemorySearchResult {
  records: [MemoryRecord!]!
  totalCount: Int!
}

type MemoryGraphNode {
  id: ID!
  label: String!
  type: String!
  strategy: String
  entityType: String
  edgeCount: Int
}

type MemoryGraphEdge {
  source: ID!
  target: ID!
  type: String!
  label: String
  weight: Float
}

type MemoryGraph {
  nodes: [MemoryGraphNode!]!
  edges: [MemoryGraphEdge!]!
}

# ---------------------------------------------------------------------------
# Ontology Studio types (PRD-41B Phase 6)
# ---------------------------------------------------------------------------

type OntologyNodeType {
  id: ID!
  name: String!
  slug: String!
  description: String
  broadType: String!
  parentTypeId: ID
  propertiesSchema: AWSJSON
  guidanceNotes: String
  extractionExamples: AWSJSON
  status: String!
  proposedBy: String
  approvedBy: ID
  approvedAt: AWSDateTime
  entityCount: Int!
  lastSeenAt: AWSDateTime
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}

input OntologyNodeTypeInput {
  name: String!
  slug: String!
  description: String
  broadType: String!
  parentTypeId: ID
  propertiesSchema: AWSJSON
  guidanceNotes: String
  extractionExamples: AWSJSON
}

type OntologyEdgeType {
  id: ID!
  name: String!
  slug: String!
  description: String
  inverseName: String
  allowedSourceTypes: [ID!]
  allowedTargetTypes: [ID!]
  guidanceNotes: String
  aliases: [String!]!
  status: String!
  proposedBy: String
  approvedBy: ID
  approvedAt: AWSDateTime
  relationCount: Int!
  lastSeenAt: AWSDateTime
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}

input OntologyEdgeTypeInput {
  name: String!
  slug: String!
  description: String
  inverseName: String
  allowedSourceTypes: [ID!]
  allowedTargetTypes: [ID!]
  guidanceNotes: String
  aliases: [String!]
}

type ERReviewItem {
  id: ID!
  agentSlug: String!
  entityA: String!
  entityB: String!
  similarityScore: Float
  evidence: AWSJSON
  llmReasoning: String
  status: String!
  resolution: String
  resolvedAt: AWSDateTime
  createdAt: AWSDateTime
}

type ExtractionHealth {
  totalEntities: Int!
  totalFacts: Int!
  pendingReviews: Int!
  lastExtraction: AWSDateTime
}

type HindsightEntity {
  id: ID!
  canonicalName: String!
  bankId: String!
  mentionCount: Int!
  ontologyType: String
  firstSeen: AWSDateTime
  lastSeen: AWSDateTime
}

extend type Query {
  memoryRecords(assistantId: ID!, namespace: String!): [MemoryRecord!]!
  memorySearch(assistantId: ID!, query: String!, strategy: MemoryStrategy, limit: Int): MemorySearchResult!
  memoryGraph(assistantId: ID!): MemoryGraph!
  ontologyNodeTypes(tenantId: ID!, status: String): [OntologyNodeType!]!
  ontologyEdgeTypes(tenantId: ID!, status: String): [OntologyEdgeType!]!
  erReviewQueue(tenantId: ID!, agentSlug: String): [ERReviewItem!]!
  extractionHealth(assistantId: ID!): ExtractionHealth
  hindsightEntities(tenantId: ID!, ontologyType: String, limit: Int): [HindsightEntity!]!
  ontologyTypeMemories(tenantId: ID!, ontologyType: String!, limit: Int): [MemoryRecord!]!
  ontologyEdgeMemories(tenantId: ID!, edgeTypeId: ID!, limit: Int): [MemoryRecord!]!
}

extend type Mutation {
  deleteMemoryRecord(memoryRecordId: ID!): Boolean!
  updateMemoryRecord(memoryRecordId: ID!, content: String!): Boolean!
  triggerKGExtract(assistantId: ID!): Boolean!
  createOntologyNodeType(tenantId: ID!, input: OntologyNodeTypeInput!): OntologyNodeType!
  updateOntologyNodeType(id: ID!, input: OntologyNodeTypeInput!): OntologyNodeType!
  approveOntologyNodeType(id: ID!): OntologyNodeType!
  deprecateOntologyNodeType(id: ID!): OntologyNodeType!
  createOntologyEdgeType(tenantId: ID!, input: OntologyEdgeTypeInput!): OntologyEdgeType!
  updateOntologyEdgeType(id: ID!, input: OntologyEdgeTypeInput!): OntologyEdgeType!
  approveOntologyEdgeType(id: ID!): OntologyEdgeType!
  deprecateOntologyEdgeType(id: ID!): OntologyEdgeType!
  resolveERReview(id: ID!, resolution: String!): ERReviewItem!
  scanAndProposeOntology(tenantId: ID!): OntologyProposalResult!
}

type OntologyProposalResult {
  proposedNodeTypes: Int!
  proposedEdgeTypes: Int!
  proposedERReviews: Int!
}
