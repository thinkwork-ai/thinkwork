# Goals: explicit outcome contracts for promoted Thread workflows.

enum ThreadGoalMode {
  DELEGATE
  COLLABORATE
}

enum ThreadGoalStatus {
  ACTIVE
  IN_REVIEW
  COMPLETED
  CANCELLED
}

enum ThreadGoalFileKind {
  THREAD
  GOAL
  PROGRESS
  TASKS
  DECISIONS
  ARTIFACTS
  HANDOFFS
}

enum ReviewGoalAction {
  CONFIRM_COMPLETION
  REQUEST_CHANGES
  CANCEL
}

type ThreadGoal {
  id: ID!
  tenantId: ID!
  spaceId: ID!
  threadId: ID!
  agentId: ID
  userId: ID
  templateKey: String
  outcome: String!
  ownerType: String
  ownerId: ID
  mode: ThreadGoalMode!
  status: ThreadGoalStatus!
  progressModel: String!
  completionRule: AWSJSON
  reviewPolicy: AWSJSON
  reviewerType: String
  reviewerId: ID
  startedAt: AWSDateTime!
  reviewedAt: AWSDateTime
  completedAt: AWSDateTime
  cancelledAt: AWSDateTime
  metadata: AWSJSON
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type ThreadGoalMarkdownFile {
  file: ThreadGoalFileKind!
  key: String!
  content: String
}

type ThreadGoalFiles {
  goal: ThreadGoal!
  files: [ThreadGoalMarkdownFile!]!
}

type ReviewGoalPayload {
  goal: ThreadGoal!
  thread: Thread!
}

type RefreshThreadProgressPayload {
  threadGoalFiles: ThreadGoalFiles
}

input ReviewGoalInput {
  tenantId: ID!
  goalId: ID!
  action: ReviewGoalAction!
  notes: String
}

input RefreshThreadProgressInput {
  tenantId: ID!
  threadId: ID!
}

extend type Query {
  threadGoal(tenantId: ID!, threadId: ID!): ThreadGoal
  threadGoalFiles(tenantId: ID!, threadId: ID!): ThreadGoalFiles
}

extend type Mutation {
  refreshThreadProgress(
    input: RefreshThreadProgressInput!
  ): RefreshThreadProgressPayload!
  reviewGoal(input: ReviewGoalInput!): ReviewGoalPayload!
}
