# Message domain types: Message, MessageArtifact, pagination types,
# and related enums/inputs.

enum MessageRole {
  USER
  ASSISTANT
  SYSTEM
  TOOL
}

enum MessageMentionTargetType {
  USER
  AGENT
  AGENT_PROFILE
}

enum MessageDispatchMode {
  MANAGED_DEFAULT
}

type Message {
  id: ID!
  threadId: ID!
  tenantId: ID!
  role: MessageRole!
  content: String
  # Plan-012 U7: typed UIMessage parts (Vercel AI SDK Stream Protocol shape)
  # persisted at turn-finalize for new Computer assistant messages. Null on
  # legacy rows; null on user messages until/unless a future plan opts users
  # into typed shape too. Draft app previews are represented as
  # tool-preview_app parts carrying an unsaved draft_app_preview payload, not
  # as MessageArtifact rows. Render-path precedence: parts non-null wins over
  # content. Tenant-scoped by the same gate as content (resolveCallerTenantId
  # + thread/computer ownership) — see contract v1 §Tenant scoping.
  parts: AWSJSON
  senderType: String
  senderId: ID
  ownerType: String!
  ownerId: ID
  toolCalls: AWSJSON
  toolResults: AWSJSON
  metadata: AWSJSON
  tokenCount: Int
  sender: MessageSender
  mentions: [MessageMention!]!
  artifacts: [MessageArtifact!]!
  durableArtifact: Artifact
  # Answer-state read path for ask_user_question messages (resolved from
  # pending_user_questions by message id); null for ordinary messages.
  userQuestion: UserQuestion
  createdAt: AWSDateTime!
}

# --- User questions (ask_user_question HITL) ---

# Status of a pending_user_questions row. PENDING parks the thread in
# AWAITING_USER; answer state derives from this row, never from mutating
# the question message's parts payload.
enum UserQuestionStatus {
  PENDING
  ANSWERED
  CANCELLED
}

enum UserQuestionAnsweredVia {
  CARD
  REPLY
}

type UserQuestion {
  id: ID!
  threadId: ID!
  messageId: ID!
  status: UserQuestionStatus!
  # Validated ask_user_question tool payload (questions only; written once
  # at intake).
  questions: AWSJSON!
  # Answer payload — TWO shapes, discriminated by answeredVia:
  #   - answeredVia CARD: a JSON object keyed by question header, each
  #     value the selected option label (string) or, for multiSelect
  #     questions, an array of labels. Example:
  #     {"Environment": "Dev", "Regions": ["us-east-1", "eu-west-1"]}
  #   - answeredVia REPLY: {"replyMessageId": "<message id>"} — a
  #     reference to the consuming user message, never its text.
  answers: AWSJSON
  answeredVia: UserQuestionAnsweredVia
  answeredBy: String
  answeredAt: AWSDateTime
}

type MessageSender {
  type: String!
  id: ID
  displayName: String!
  avatarUrl: String
}

type MessageMention {
  id: ID!
  messageId: ID!
  threadId: ID!
  tenantId: ID!
  targetType: MessageMentionTargetType!
  targetId: ID!
  displayName: String!
  rawText: String
  startOffset: Int
  endOffset: Int
  metadata: AWSJSON
  user: User
  agent: Agent
  createdAt: AWSDateTime!
}

type MessageArtifact {
  id: ID!
  messageId: ID!
  threadId: ID!
  tenantId: ID!
  artifactType: String!
  name: String
  content: String
  s3Key: String
  mimeType: String
  sizeBytes: Int
  metadata: AWSJSON
  createdAt: AWSDateTime!
}

# --- Pagination ---

type MessageConnection {
  edges: [MessageEdge!]!
  pageInfo: PageInfo!
}

type MessageEdge {
  node: Message!
  cursor: String!
}

# --- Inputs ---

input SendMessageInput {
  threadId: ID!
  role: MessageRole!
  content: String
  agentRequested: Boolean
  dispatchMode: MessageDispatchMode
  senderType: String
  senderId: ID
  toolCalls: AWSJSON
  toolResults: AWSJSON
  metadata: AWSJSON
  modelId: String
  mentions: [SendMessageMentionInput!]
}

input SendMessageMentionInput {
  targetType: MessageMentionTargetType!
  targetId: ID!
  displayName: String
  rawText: String
  startOffset: Int
  endOffset: Int
}

input HandleGenUIActionInput {
  threadId: ID!
  sourceMessageId: ID!
  partId: ID!
  actionId: String!
  specHash: String!
  idempotencyKey: String!
  params: AWSJSON
}

# --- Query / Mutation extensions ---

extend type Thread {
  # The thread's open question batch, if any (at most one pending row per
  # thread, enforced by a partial unique index).
  pendingUserQuestion: UserQuestion
}

extend type Query {
  messages(threadId: ID!, limit: Int, cursor: String): MessageConnection!
}

extend type Mutation {
  sendMessage(input: SendMessageInput!): Message!
  deleteMessage(id: ID!): Boolean!
  # The CARD-route answer mutation: submits structured card answers
  # (a JSON object keyed by question header → label | [labels]) and
  # enqueues the agent's resume wakeup. The plain-reply route is just
  # sendMessage — any user message on the thread consumes the pending
  # batch with answeredVia REPLY.
  answerUserQuestion(questionId: ID!, answers: AWSJSON!): UserQuestion!
  handleGenUIAction(input: HandleGenUIActionInput!): Message!
}
