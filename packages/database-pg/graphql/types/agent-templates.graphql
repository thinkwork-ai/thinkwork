# Agent Templates — security & capability boundary types
# A template defines the full capability and security posture for agents
# it creates: model, guardrail, blocked tools, skills, knowledge bases.

type AgentTemplate {
  id: ID!
  tenantId: ID
  name: String!
  slug: String!
  description: String
  category: String
  icon: String
  source: String!
  model: String
  guardrailId: ID
  blockedTools: AWSJSON
  config: AWSJSON
  skills: AWSJSON
  knowledgeBaseIds: AWSJSON

  isPublished: Boolean!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type AgentVersion {
  id: ID!
  tenantId: ID!
  agentId: ID!
  versionNumber: Int!
  label: String
  configSnapshot: AWSJSON
  workspaceSnapshot: AWSJSON
  skillsSnapshot: AWSJSON
  knowledgeBasesSnapshot: AWSJSON
  guardrailSnapshot: AWSJSON
  createdBy: ID
  createdAt: AWSDateTime!
  isActive: Boolean!
}

# --- Sync diff types ---

type RoleChange {
  current: String
  target: String
}

type TemplateSyncDiff {
  roleChange: RoleChange
  skillsAdded: [String!]!
  skillsRemoved: [String!]!
  skillsChanged: [String!]!
  kbsAdded: [String!]!
  kbsRemoved: [String!]!
  filesAdded: [String!]!
  filesModified: [String!]!
  filesSame: [String!]!
}

type SyncSummary {
  agentsSynced: Int!
  agentsFailed: Int!
  errors: [String!]!
}

# --- Inputs ---

input CreateAgentTemplateInput {
  tenantId: ID!
  name: String!
  slug: String!
  description: String
  category: String
  icon: String
  model: String
  guardrailId: ID
  blockedTools: AWSJSON
  config: AWSJSON
  skills: AWSJSON
  knowledgeBaseIds: AWSJSON

  isPublished: Boolean
  """
  Optional client-supplied idempotency key. See
  CreateAgentInput.idempotencyKey / packages/api/src/lib/idempotency.ts.
  """
  idempotencyKey: String
}

input UpdateAgentTemplateInput {
  name: String
  slug: String
  description: String
  category: String
  icon: String
  model: String
  guardrailId: ID
  blockedTools: AWSJSON
  config: AWSJSON
  skills: AWSJSON
  knowledgeBaseIds: AWSJSON

  isPublished: Boolean
}

input CreateAgentFromTemplateInput {
  templateId: ID!
  name: String!
  slug: String!
  teamId: ID
  "Optional idempotency key. See CreateAgentInput.idempotencyKey."
  idempotencyKey: String
}

# --- Pin status + accept-update (overlay Unit 9) ---

type PinStatusFile {
  filename: String!
  pinnedSha: String
  latestSha: String
  updateAvailable: Boolean!
  pinnedContent: String
  latestContent: String
}

type AcceptTemplateUpdateBulkResultEntry {
  agentId: ID!
  success: Boolean!
  error: String
}

type AcceptTemplateUpdateBulkResult {
  accepted: Int!
  failed: Int!
  results: [AcceptTemplateUpdateBulkResultEntry!]!
}

# --- Query / Mutation extensions ---

extend type Query {
  agentTemplates(tenantId: ID!): [AgentTemplate!]!
  agentTemplate(id: ID!): AgentTemplate
  agentVersions(agentId: ID!, limit: Int): [AgentVersion!]!
  linkedAgentsForTemplate(templateId: ID!): [Agent!]!
  templateSyncDiff(templateId: ID!, agentId: ID!): TemplateSyncDiff!
  agentPinStatus(agentId: ID!): [PinStatusFile!]!
}

extend type Mutation {
  createAgentTemplate(input: CreateAgentTemplateInput!): AgentTemplate!
  updateAgentTemplate(id: ID!, input: UpdateAgentTemplateInput!): AgentTemplate!
  deleteAgentTemplate(id: ID!): Boolean!
  createAgentFromTemplate(input: CreateAgentFromTemplateInput!): Agent!
  "Sync template config + workspace files to a linked agent. idempotencyKey optional."
  syncTemplateToAgent(templateId: ID!, agentId: ID!, idempotencyKey: String): Agent!
  "Sync template to every linked agent in a tenant. idempotencyKey optional."
  syncTemplateToAllAgents(templateId: ID!, idempotencyKey: String): SyncSummary!
  rollbackAgentVersion(agentId: ID!, versionId: ID!): Agent!

  "Advance an agent's pinned hash for a guardrail-class file. idempotencyKey optional."
  acceptTemplateUpdate(agentId: ID!, filename: String!, idempotencyKey: String): Agent!
  acceptTemplateUpdateBulk(
    templateId: ID!
    filename: String!
    tenantId: ID!
  ): AcceptTemplateUpdateBulkResult!
}
