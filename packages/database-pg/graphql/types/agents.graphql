# Agent domain types. Plan B collapses tenant-visible configuration to a
# single platform agent per tenant; sub-agents remain workspace folders.

enum AgentType {
  AGENT
  GATEWAY
  SUPERVISOR
}

enum AgentStatus {
  IDLE
  BUSY
  OFFLINE
  ERROR
}

enum AgentRuntime {
  FLUE
}

type Agent {
  id: ID!
  tenantId: ID!
  name: String!
  slug: String
  role: String
  type: AgentType!
  source: String
  status: AgentStatus!
  systemPrompt: String
  reportsTo: Agent
  reportsToId: ID
  humanPairId: ID
  humanPair: User
  parentAgentId: ID
  subAgents: [Agent!]
  runtime: AgentRuntime!
  adapterType: String
  adapterConfig: AWSJSON
  runtimeConfig: AWSJSON
  model: String
  guardrailId: ID
  blockedTools: AWSJSON
  sandbox: AWSJSON
  browser: AWSJSON
  webSearch: AWSJSON
  sendEmail: AWSJSON
  contextEngine: AWSJSON
  budgetMonthlyCents: Int
  lastHeartbeatAt: AWSDateTime
  avatarUrl: String
  version: Int!
  capabilities: [AgentCapability!]!
  skills: [AgentSkill!]!
  budgetPolicy: AgentBudgetPolicy
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type AgentCapability {
  id: ID!
  agentId: ID!
  tenantId: ID!
  capability: String!
  config: AWSJSON
  enabled: Boolean!
  createdAt: AWSDateTime!
}

type AgentSkill {
  id: ID!
  agentId: ID!
  tenantId: ID!
  skillId: String!
  config: AWSJSON
  permissions: AWSJSON
  rateLimitRpm: Int
  modelOverride: String
  enabled: Boolean!
  createdAt: AWSDateTime!
}

type AgentBudgetPolicy {
  id: ID!
  agentId: ID!
  tenantId: ID!
  scope: String!
  period: String!
  limitUsd: Float!
  actionOnExceed: String!
  enabled: Boolean!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

# --- Inputs ---

input UpdateTenantAgentInput {
  name: String
  role: String
  systemPrompt: String
  runtime: AgentRuntime
  adapterType: String
  adapterConfig: AWSJSON
  runtimeConfig: AWSJSON
  model: String
  guardrailId: ID
  blockedTools: AWSJSON
  sandbox: AWSJSON
  browser: AWSJSON
  webSearch: AWSJSON
  sendEmail: AWSJSON
  contextEngine: AWSJSON
  budgetMonthlyCents: Int
  budgetPaused: Boolean
  avatarUrl: String
}

input AgentCapabilityInput {
  capability: String!
  config: AWSJSON
  enabled: Boolean
}

input AgentSkillInput {
  skillId: String!
  config: AWSJSON
  permissions: AWSJSON
  rateLimitRpm: Int
  modelOverride: String
  enabled: Boolean
}

input AgentBudgetPolicyInput {
  period: String!
  limitUsd: Float!
  actionOnExceed: String
}

# --- Query / Mutation extensions ---

type ModelCatalogEntry {
  id: ID!
  modelId: String!
  provider: String!
  displayName: String!
  inputCostPerMillion: Float
  outputCostPerMillion: Float
  contextWindow: Int
  maxOutputTokens: Int
  supportsVision: Boolean
  supportsTools: Boolean
}

type AgentWorkspace {
  slug: String!
  name: String!
  purpose: String
}

extend type Query {
  tenantAgent(tenantId: ID!): Agent!
  modelCatalog: [ModelCatalogEntry!]!
}

extend type Mutation {
  updateTenantAgent(tenantId: ID!, input: UpdateTenantAgentInput!): Agent!
}
