# Agent domain types. Plan B collapses tenant-visible configuration to a
# single platform agent per tenant; sub-agents remain workspace folders.

enum AgentType {
  AGENT
  GATEWAY
  SUPERVISOR
}

enum AgentStatus {
  IDLE
  BUSY
  OFFLINE
  ERROR
}

enum AgentRuntime {
  FLUE
}

type Agent {
  id: ID!
  tenantId: ID!
  name: String!
  slug: String
  role: String
  type: AgentType!
  source: String
  status: AgentStatus!
  systemPrompt: String
  reportsTo: Agent
  reportsToId: ID
  humanPairId: ID
  humanPair: User
  parentAgentId: ID
  subAgents: [Agent!]
  runtime: AgentRuntime!
  adapterType: String
  adapterConfig: AWSJSON
  runtimeConfig: AWSJSON
  model: String
  guardrailId: ID
  blockedTools: AWSJSON
  sandbox: AWSJSON
  browser: AWSJSON
  webSearch: AWSJSON
  webExtract: AWSJSON
  sendEmail: AWSJSON
  contextEngine: AWSJSON
  budgetMonthlyCents: Int
  lastHeartbeatAt: AWSDateTime
  avatarUrl: String
  version: Int!
  capabilities: [AgentCapability!]!
  skills: [AgentSkill!]!
  budgetPolicy: AgentBudgetPolicy
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type AgentCapability {
  id: ID!
  agentId: ID!
  tenantId: ID!
  capability: String!
  config: AWSJSON
  enabled: Boolean!
  createdAt: AWSDateTime!
}

type AgentSkill {
  id: ID!
  agentId: ID!
  tenantId: ID!
  skillId: String!
  config: AWSJSON
  permissions: AWSJSON
  rateLimitRpm: Int
  modelOverride: String
  enabled: Boolean!
  createdAt: AWSDateTime!
}

type AgentBudgetPolicy {
  id: ID!
  agentId: ID!
  tenantId: ID!
  scope: String!
  period: String!
  limitUsd: Float!
  actionOnExceed: String!
  enabled: Boolean!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

# --- Inputs ---

input UpdateTenantAgentInput {
  name: String
  role: String
  systemPrompt: String
  runtime: AgentRuntime
  adapterType: String
  adapterConfig: AWSJSON
  runtimeConfig: AWSJSON
  model: String
  guardrailId: ID
  blockedTools: AWSJSON
  sandbox: AWSJSON
  browser: AWSJSON
  webSearch: AWSJSON
  webExtract: AWSJSON
  sendEmail: AWSJSON
  contextEngine: AWSJSON
  budgetMonthlyCents: Int
  budgetPaused: Boolean
  avatarUrl: String
}

input AgentCapabilityInput {
  capability: String!
  config: AWSJSON
  enabled: Boolean
}

input AgentSkillInput {
  skillId: String!
  config: AWSJSON
  permissions: AWSJSON
  rateLimitRpm: Int
  modelOverride: String
  enabled: Boolean
}

input AgentBudgetPolicyInput {
  period: String!
  limitUsd: Float!
  actionOnExceed: String
}

# --- Query / Mutation extensions ---

type ModelCatalogEntry {
  id: ID!
  modelId: String!
  provider: String!
  displayName: String!
  inputCostPerMillion: Float
  outputCostPerMillion: Float
  contextWindow: Int
  maxOutputTokens: Int
  supportsVision: Boolean
  supportsTools: Boolean
}

type UserModelCatalogEntry {
  id: ID!
  modelId: String!
  provider: String!
  displayName: String!
  inputCostPerMillion: Float
  outputCostPerMillion: Float
  contextWindow: Int
  maxOutputTokens: Int
  supportsVision: Boolean
  supportsTools: Boolean
  approved: Boolean!
}

type AgentProfile {
  id: ID!
  tenantId: ID!
  slug: String!
  name: String!
  description: String
  routingGuidance: String
  instructions: String!
  modelId: ID!
  model: ModelCatalogEntry
  enabled: Boolean!
  builtInKey: String
  toolPolicy: AWSJSON!
  skillPolicy: AWSJSON!
  executionControls: AWSJSON!
  spaceAssignments: [AgentProfileSpaceAssignment!]!
  spaces: [Space!]!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type AgentProfileSpaceAssignment {
  profileId: ID!
  tenantId: ID!
  spaceId: ID!
  space: Space
  createdAt: AWSDateTime!
}

type AgentProfileSkillOption {
  slug: String!
  displayName: String
  description: String
  category: String
  icon: String
  tags: [String!]
}

type AgentProfileMcpServerOption {
  id: ID!
  tenantId: ID!
  name: String!
  slug: String!
  transport: String!
  authType: String!
  tools: AWSJSON
  enabled: Boolean!
  status: String!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type AgentProfileEditorCatalog {
  models: [ModelCatalogEntry!]!
  spaces: [Space!]!
  skills: [AgentProfileSkillOption!]!
  builtInTools: [String!]!
  mcpServers: [AgentProfileMcpServerOption!]!
}

input AgentProfileInput {
  slug: String
  name: String!
  description: String
  routingGuidance: String
  instructions: String!
  modelId: ID!
  enabled: Boolean = true
  toolPolicy: AWSJSON
  skillPolicy: AWSJSON
  executionControls: AWSJSON
  spaceIds: [ID!]
}

input UpdateAgentProfileInput {
  slug: String
  name: String
  description: String
  routingGuidance: String
  instructions: String
  modelId: ID
  enabled: Boolean
  toolPolicy: AWSJSON
  skillPolicy: AWSJSON
  executionControls: AWSJSON
  spaceIds: [ID!]
}

type AgentWorkspace {
  slug: String!
  name: String!
  purpose: String
}

extend type Query {
  tenantAgent(tenantId: ID!): Agent!
  modelCatalog: [ModelCatalogEntry!]!
  userModelCatalog(userId: ID!): [UserModelCatalogEntry!]!
  myApprovedModelCatalog: [ModelCatalogEntry!]!
  agentProfiles(
    tenantId: ID!
    includeDisabled: Boolean = true
  ): [AgentProfile!]!
  agentProfile(tenantId: ID!, id: ID, slug: String): AgentProfile
  agentProfileEditorCatalog(tenantId: ID!): AgentProfileEditorCatalog!
}

extend type Mutation {
  updateTenantAgent(tenantId: ID!, input: UpdateTenantAgentInput!): Agent!
  setUserModelApproval(
    userId: ID!
    modelId: String!
    approved: Boolean!
  ): [UserModelCatalogEntry!]!
  createAgentProfile(tenantId: ID!, input: AgentProfileInput!): AgentProfile!
  updateAgentProfile(
    tenantId: ID!
    id: ID!
    input: UpdateAgentProfileInput!
  ): AgentProfile!
  deleteAgentProfile(tenantId: ID!, id: ID!): Boolean!
}
