# Linked tasks are ThinkWork-side checklist rows. They can mirror an external
# task provider such as LastMile Tasks, or represent ThinkWork-owned native
# checklist work.

enum LinkedTaskProvider {
  LASTMILE
  THINKWORK
  TWENTY
}

enum LinkedTaskStatus {
  UNKNOWN
  TODO
  IN_PROGRESS
  COMPLETED
  BLOCKED
  CANCELLED
  NOT_APPLICABLE
}

enum LinkedTaskSyncStatus {
  PENDING
  SYNCED
  WARNING
  ERROR
}

enum LinkedTaskEventType {
  CREATED
  STATUS_CHANGED
  COMPLETED
  BLOCKED
  REASSIGNED
  DUE_DATE_CHANGED
  COMMENT_ADDED
  SYNC_FAILED
  WRITEBACK_POSTED
}

type LinkedTask {
  id: ID!
  tenantId: ID!
  spaceId: ID!
  threadId: ID!
  checklistItemId: ID
  provider: LinkedTaskProvider!
  externalTaskId: String!
  externalTaskUrl: String
  title: String!
  required: Boolean!
  roleKey: String
  assigneeDisplay: String
  assigneeExternalId: String
  status: LinkedTaskStatus!
  blocked: Boolean!
  syncStatus: LinkedTaskSyncStatus!
  lastSyncedAt: AWSDateTime
  metadata: AWSJSON
  events: [LinkedTaskEvent!]!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type LinkedTaskEvent {
  id: ID!
  tenantId: ID!
  linkedTaskId: ID!
  spaceId: ID!
  threadId: ID!
  provider: LinkedTaskProvider!
  eventType: LinkedTaskEventType!
  externalEventId: String
  previousStatus: LinkedTaskStatus
  newStatus: LinkedTaskStatus
  message: String
  metadata: AWSJSON
  occurredAt: AWSDateTime!
  createdAt: AWSDateTime!
}

type ThreadProgressMarkdown {
  tenantId: ID!
  tenantSlug: String!
  threadId: ID!
  key: String!
  content: String!
}

input UpdateLinkedTaskInput {
  tenantId: ID!
  threadId: ID!
  linkedTaskId: ID!
  status: LinkedTaskStatus!
  note: String
  metadata: AWSJSON
}

extend type Query {
  threadLinkedTasks(tenantId: ID!, threadId: ID!): [LinkedTask!]!
  threadProgressMarkdown(tenantId: ID!, threadId: ID!): ThreadProgressMarkdown
}

extend type Mutation {
  updateLinkedTask(input: UpdateLinkedTaskInput!): LinkedTask!
}
