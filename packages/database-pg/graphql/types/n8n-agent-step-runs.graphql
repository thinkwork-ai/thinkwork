enum N8nAgentStepRunStatus {
  ACCEPTED
  WAITING
  AWAITING_HUMAN
  RESUME_PENDING
  RESUMING
  RESUMED
  RESUME_FAILED
  FAILED
  EXPIRED
}

enum N8nAgentStepResumeStatus {
  NOT_READY
  PENDING
  RESUMING
  RESUMED
  FAILED
}

type N8nAgentStepRun {
  id: ID!
  tenantId: ID!
  pluginInstallId: ID
  managedApplicationId: ID
  spaceId: ID!
  agentId: ID
  threadId: ID
  threadTurnId: ID
  openingMessageId: ID
  status: N8nAgentStepRunStatus!
  resumeStatus: N8nAgentStepResumeStatus!
  workflowId: String!
  workflowName: String
  executionId: String!
  stepId: String!
  correlationId: String!
  requestId: String
  idempotencyKey: String!
  instructionsPreview: String
  inputPreview: String
  requestMetadata: AWSJSON!
  resumeUrlHost: String
  resumeUrlPath: String
  timeoutSeconds: Int!
  expiresAt: AWSDateTime!
  resultPayload: AWSJSON
  outputPayload: AWSJSON
  errorPayload: AWSJSON
  summary: String
  links: AWSJSON
  resumeAttemptCount: Int!
  nextResumeAttemptAt: AWSDateTime
  lastResumeAttemptAt: AWSDateTime
  lastResumeHttpStatus: Int
  lastResumeError: String
  resumedAt: AWSDateTime
  terminalAt: AWSDateTime
  acceptedAt: AWSDateTime!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

"""
Redacted operator-visible telemetry for n8n agent-step bridge runs.

This intentionally excludes tenant IDs, idempotency keys, request metadata,
resume URL host/path, secret refs, and raw result/output/error payloads.
"""
type N8nAgentStepRunTelemetry {
  id: ID!
  pluginInstallId: ID
  managedApplicationId: ID
  spaceId: ID!
  agentId: ID
  threadId: ID
  threadTurnId: ID
  openingMessageId: ID
  status: N8nAgentStepRunStatus!
  resumeStatus: N8nAgentStepResumeStatus!
  workflowId: String!
  workflowName: String
  executionId: String!
  stepId: String!
  correlationId: String!
  requestId: String
  instructionsPreview: String
  inputPreview: String
  outputPreview: String
  errorMessage: String
  summary: String
  links: AWSJSON
  timeoutSeconds: Int!
  expiresAt: AWSDateTime!
  resumeAttemptCount: Int!
  nextResumeAttemptAt: AWSDateTime
  lastResumeAttemptAt: AWSDateTime
  lastResumeHttpStatus: Int
  lastResumeError: String
  resumedAt: AWSDateTime
  terminalAt: AWSDateTime
  acceptedAt: AWSDateTime!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type N8nAppWorkflowRow {
  externalWorkflowId: String!
  name: String!
  active: Boolean
  triggerTypes: [String!]!
  lastModifiedAt: AWSDateTime
  lastExecutionAt: AWSDateTime
  connectedWorkflowId: ID
  connectedBindingId: ID
  readinessState: WorkflowReadinessState!
  readinessReasons: AWSJSON!
  nativeWorkflowUrl: String
  warnings: [String!]!
}

type N8nAppExecutionRow {
  externalExecutionId: String!
  externalWorkflowId: String!
  workflowName: String
  status: String!
  mode: String
  startedAt: AWSDateTime
  finishedAt: AWSDateTime
  durationMs: Int
  failureMessage: String
  nativeExecutionUrl: String!
  nativeWorkflowUrl: String!
  bridgeRuns: [N8nAgentStepRunTelemetry!]!
  warnings: [String!]!
}

type N8nAppData {
  installId: ID!
  workflowReadinessState: WorkflowReadinessState!
  workflowReadinessReasons: AWSJSON!
  executionReadinessState: WorkflowReadinessState!
  executionReadinessReasons: AWSJSON!
  nativeBaseUrl: String
  workflows: [N8nAppWorkflowRow!]!
  executions: [N8nAppExecutionRow!]!
}

extend type Query {
  n8nAgentStepRuns(threadId: ID, limit: Int): [N8nAgentStepRunTelemetry!]!
  n8nAppData(installId: ID!, executionLimit: Int): N8nAppData!
}
