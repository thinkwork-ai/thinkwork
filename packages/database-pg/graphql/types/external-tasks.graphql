# External task integration — structured action executor.
#
# Direct-path mutation: the client calls this instead of routing a form-card
# submission through the agent. Returns the fresh envelope so the UI can
# replace optimistic state.

type ExternalTaskActionResult {
  threadId: ID!
  envelope: AWSJSON!
  auditMessageId: ID
}

# Input for `createLastmileTask`, the mutation the agent invokes after
# the user submits the LastMile task-intake form. The per-column fields
# (description / priority / dueDate / assigneeEmail) drive the legacy
# `POST /tasks` path and are used when the workflow has no `skill` block.
#
# When the workflow ships a populated `skill.form`, the agent instead
# passes `formResponse` (the opaque `{form_id, values}` payload LastMile
# renders against its workflow-specific schema), and the per-column
# fields are ignored. See `lastmile-workflow-skill-proposal.md`.
input CreateLastmileTaskInput {
  threadId: ID!
  description: String
  priority: String
  dueDate: AWSDateTime
  assigneeEmail: String
  formResponse: AWSJSON
}

extend type Mutation {
  executeExternalTaskAction(
    threadId: ID!
    actionType: String!
    params: AWSJSON
  ): ExternalTaskActionResult!

  # Finalizes a user-created task thread: fires POST /tasks on LastMile
  # using the thread's stored workflowId + the intake-form inputs, then
  # stamps sync_status='synced' and metadata.external.externalTaskId on
  # the thread row. Idempotent — re-running after a successful create
  # short-circuits to the current row.
  createLastmileTask(input: CreateLastmileTaskInput!): Thread!
}
