# Core domain types: Tenant, User, TenantSettings, TenantMember, UserProfile

type Tenant {
  id: ID!
  name: String!
  slug: String!
  plan: String!
  issuePrefix: String
  issueCounter: Int!
  settings: TenantSettings
  members: [TenantMember!]!
  agents: [Agent!]!
  teams: [Team!]!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type TenantSettings {
  id: ID!
  tenantId: ID!
  defaultModel: String
  budgetMonthlyCents: Int
  autoCloseThreadMinutes: Int
  maxAgents: Int
  features: AWSJSON
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type TenantMember {
  id: ID!
  tenantId: ID!
  principalType: String!
  principalId: ID!
  role: String!
  status: String!
  user: User
  agent: Agent
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type User {
  id: ID!
  tenantId: ID!
  email: String!
  name: String
  image: String
  phone: String
  profile: UserProfile
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type UserProfile {
  id: ID!
  userId: ID!
  tenantId: ID!
  displayName: String
  theme: String
  notificationPreferences: AWSJSON
  title: String
  timezone: String
  pronouns: String
  "Short/preferred name — what the agent should call this human in chat."
  callBy: String
  "Free-form notes the agent maintains about this human's preferences + style."
  notes: String
  "Free-form markdown describing the human's family / close contacts."
  family: String
  "Free-form markdown capturing ongoing context about the human."
  context: String
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

# --- Deployment Status (read from Lambda env vars) ---

type DeploymentStatus {
  stage: String!
  source: String!
  region: String!
  accountId: String
  bucketName: String
  databaseEndpoint: String
  ecrUrl: String
  adminUrl: String
  docsUrl: String
  apiEndpoint: String
  appsyncUrl: String
  appsyncRealtimeUrl: String
  hindsightEndpoint: String
  agentcoreStatus: String
  hindsightEnabled: Boolean!
  managedMemoryEnabled: Boolean!
}

# --- Inputs ---

input CreateTenantInput {
  name: String!
  slug: String!
  plan: String
}

input UpdateTenantInput {
  name: String
  plan: String
  issuePrefix: String
}

input UpdateTenantSettingsInput {
  defaultModel: String
  budgetMonthlyCents: Int
  autoCloseThreadMinutes: Int
  maxAgents: Int
  features: AWSJSON
}

input AddTenantMemberInput {
  principalType: String!
  principalId: ID!
  role: String
}

input UpdateTenantMemberInput {
  role: String
  status: String
}

input UpdateUserInput {
  name: String
  image: String
  phone: String
}

input UpdateUserProfileInput {
  displayName: String
  theme: String
  notificationPreferences: AWSJSON
  title: String
  timezone: String
  pronouns: String
  "Short/preferred name the agent should use in chat. Set via admin UI or agent self-serve tool."
  callBy: String
  "Free-form notes about the human's preferences + communication style."
  notes: String
  "Free-form markdown describing the human's family / close contacts."
  family: String
  "Free-form markdown capturing ongoing context about the human."
  context: String
}

# --- Query / Mutation extensions ---

extend type Query {
  tenant(id: ID!): Tenant
  tenantBySlug(slug: String!): Tenant
  me: User
  user(id: ID!): User
  tenantMembers(tenantId: ID!): [TenantMember!]!
  deploymentStatus: DeploymentStatus!
}

input InviteMemberInput {
  email: String!
  name: String
  role: String
}

type BootstrapResult {
  user: User!
  tenant: Tenant!
  isNew: Boolean!
}

extend type Mutation {
  bootstrapUser: BootstrapResult!
  createTenant(input: CreateTenantInput!): Tenant!
  updateTenant(id: ID!, input: UpdateTenantInput!): Tenant!
  updateTenantSettings(tenantId: ID!, input: UpdateTenantSettingsInput!): TenantSettings!
  addTenantMember(tenantId: ID!, input: AddTenantMemberInput!): TenantMember!
  updateTenantMember(id: ID!, input: UpdateTenantMemberInput!): TenantMember!
  removeTenantMember(id: ID!): Boolean!
  inviteMember(tenantId: ID!, input: InviteMemberInput!): TenantMember!
  updateUser(id: ID!, input: UpdateUserInput!): User!
  updateUserProfile(userId: ID!, input: UpdateUserProfileInput!): UserProfile!
  registerPushToken(input: RegisterPushTokenInput!): Boolean!
  unregisterPushToken(token: String!): Boolean!
}

input RegisterPushTokenInput {
  token: String!
  platform: String!
}
