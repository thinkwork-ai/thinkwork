"""
Compounding Memory (wiki) read path.

v1 is strictly agent-scoped: every read requires both `tenantId` and
`ownerId`. See .prds/compounding-memory-scoping.md.
"""

enum WikiPageType {
  ENTITY
  TOPIC
  DECISION
}

type WikiPageSection {
  id: ID!
  sectionSlug: String!
  heading: String!
  bodyMd: String!
  position: Int!
  lastSourceAt: AWSDateTime
}

type WikiPage {
  id: ID!
  tenantId: ID!
  ownerId: ID!
  type: WikiPageType!
  slug: String!
  title: String!
  summary: String
  bodyMd: String
  status: String!
  lastCompiledAt: AWSDateTime
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
  sections: [WikiPageSection!]!
  aliases: [String!]!
}

type WikiSearchResult {
  page: WikiPage!
  score: Float!
  matchedAlias: String
}

type WikiCompileJob {
  id: ID!
  tenantId: ID!
  ownerId: ID!
  status: String!
  trigger: String!
  dedupeKey: String!
  attempt: Int!
  claimedAt: AWSDateTime
  startedAt: AWSDateTime
  finishedAt: AWSDateTime
  error: String
  metrics: AWSJSON
  createdAt: AWSDateTime!
}

"""
Page-to-page link returned by the `wikiSubgraph` resolver. Mirrors a row
in `wiki_page_links`. Temporal fields (`firstSeenAt`/`lastSeenAt`/
`isCurrent`) are nullable in v1 and land for real in Unit 5 of the mobile
force-graph plan; today the resolver always returns `null` for them.
`weight` is also reserved (occurrence count, drives stroke width).
"""
type WikiPageLink {
  id: ID!
  fromPageId: ID!
  toPageId: ID!
  kind: String!
  context: String
  firstSeenAt: AWSDateTime
  lastSeenAt: AWSDateTime
  isCurrent: Boolean
  weight: Float
}

"""
Per-page hint that the focal page (or a neighbor) has additional links
not included in the current depth window or beyond the 500-node cap.
The mobile graph viewer renders a "+" badge for nodes flagged here.
v1 only sets `hasMore[focalPageId] = true` when the cap truncated; per-
node hasMore is a Unit 6 concern (k-hop expansion).
"""
type WikiHasMoreEntry {
  pageId: ID!
  hasMore: Boolean!
}

"""
Agent-scoped subgraph reachable from a focal page within `depth` hops.
Powers the mobile force-graph viewer's focal+expand interaction.

Caps at 500 nodes; when truncated, returns top-500 by
`(degree DESC, last_compiled_at DESC NULLS LAST)` with the focal page
always included, sets `hasMore[focalPageId] = true`, and surfaces the
delta in `truncatedNodeCount`.

`atTime` is accepted but ignored in v1 — the temporal scrub semantics
land with Unit 5's schema migration. The field is echoed in the response
for forward compatibility.
"""
type WikiSubgraph {
  focalPageId: ID!
  depth: Int!
  atTime: AWSDateTime!
  nodes: [WikiPage!]!
  edges: [WikiPageLink!]!
  hasMore: [WikiHasMoreEntry!]!
  truncatedNodeCount: Int!
}

"""
Agent-scoped force-graph payload: all active pages and their [[...]] links
for one `(tenant, owner)` scope. Shaped to match the legacy `memoryGraph`
wire contract so the admin force-graph component can swap data sources
with minimal client changes. `type` is always `"page"` on nodes; the
Wiki page type (`ENTITY`/`TOPIC`/`DECISION`) lives in `entityType`.
"""
type WikiGraphNode {
  id: ID!
  label: String!
  type: String!
  entityType: WikiPageType!
  slug: String!
  strategy: String
  edgeCount: Int!
  latestThreadId: String
}

type WikiGraphEdge {
  source: ID!
  target: ID!
  label: String!
  weight: Float!
}

type WikiGraph {
  nodes: [WikiGraphNode!]!
  edges: [WikiGraphEdge!]!
}

extend type Query {
  """
  Read one compiled page by slug. `ownerId` is required.
  """
  wikiPage(tenantId: ID!, ownerId: ID!, type: WikiPageType!, slug: String!): WikiPage

  """
  Postgres full-text search over compiled pages in a single (tenant, owner)
  scope. Also matches exact aliases. Ranked by ts_rank + alias-hit boost.
  """
  wikiSearch(tenantId: ID!, ownerId: ID!, query: String!, limit: Int = 20): [WikiSearchResult!]!

  """
  Pages that link to the given page. Visibility is derived from the target
  page's owner scope; caller must be that owner or an admin.
  """
  wikiBacklinks(pageId: ID!): [WikiPage!]!

  """
  Pages this page links OUT to — the "Connected Pages" surface. Mirrors
  wikiBacklinks in the opposite direction; reads wiki_page_links where
  from_page_id = pageId. Deduplicated by target so a parent/child pair
  with both a `reference` link and a `parent_of` link returns once.
  """
  wikiConnectedPages(pageId: ID!): [WikiPage!]!

  """
  Admin-only: list recent compile jobs for a tenant. When `ownerId` is
  provided, restricts to that agent's jobs; when null/absent, returns
  jobs across every agent in the tenant. Ordered newest-first.

  Powers the `thinkwork wiki status` CLI command.
  """
  wikiCompileJobs(
    tenantId: ID!
    ownerId: ID
    limit: Int = 10
  ): [WikiCompileJob!]!

  """
  Agent-scoped force-graph: every active wiki page + every page-to-page
  link whose endpoints are both active in the same `(tenant, owner)`
  scope. Links that reference archived pages are excluded. One round-trip.
  """
  wikiGraph(tenantId: ID!, ownerId: ID!): WikiGraph!

  """
  Agent-scoped subgraph reachable within `depth` hops from a focal page.
  Powers the mobile force-graph viewer. Caps at 500 nodes; depth clamps
  to [0, 2]. `atTime` is accepted but currently ignored (Unit 5 wires the
  temporal scrub).
  """
  wikiSubgraph(
    tenantId: ID!
    ownerId: ID!
    focalPageId: ID!
    depth: Int = 1
    atTime: AWSDateTime
    pageType: WikiPageType
  ): WikiSubgraph!
}

"""
Dispatch acknowledgement for `bootstrapJournalImport`. The actual ingest
runs on a dedicated worker Lambda (`wiki-bootstrap-import`) because
Hindsight's LLM-backed retain is too slow to complete within API Gateway's
30-second HTTP ceiling. Operator watches CloudWatch + wiki_compile_jobs
for the terminal compile the ingest enqueues.
"""
type WikiJournalImportDispatch {
  accountId: ID!
  tenantId: ID!
  agentId: ID!
  dispatched: Boolean!
  error: String
  dispatchedAt: AWSDateTime!
}

type WikiResetCursorResult {
  tenantId: ID!
  ownerId: ID!
  cursorCleared: Boolean!
  pagesArchived: Int!
}

extend type Mutation {
  """
  Admin-only: enqueue an ad-hoc compile job for a specific (tenant, agent).
  Returns the job row (newly inserted or the in-flight dedupe hit).

  When `modelId` is supplied, it is forwarded to the compile Lambda event
  payload so a single run can override `BEDROCK_MODEL_ID` without a
  redeploy. The override takes effect only on the direct Event-invoke
  path; if the invoke fails and a polling worker claims the job later, the
  compile falls back to the env-default model.
  """
  compileWikiNow(tenantId: ID!, ownerId: ID!, modelId: String): WikiCompileJob!

  """
  Admin-only fire-and-forget dispatch of a journal-schema bulk ingest onto
  a dedicated worker Lambda. Returns immediately with a dispatch
  acknowledgement — the actual ingest + terminal compile happen
  asynchronously. Track progress via the wiki-bootstrap-import Lambda's
  CloudWatch logs and the resulting compile job in wiki_compile_jobs.
  """
  bootstrapJournalImport(
    accountId: ID!
    tenantId: ID!
    agentId: ID!
    limit: Int
  ): WikiJournalImportDispatch!

  """
  Admin-only replay: clear the compile cursor for (tenant, owner). If
  `force` is true, also archives every active page in the scope so the
  next compile rebuilds from scratch. Destructive when force=true.
  """
  resetWikiCursor(
    tenantId: ID!
    ownerId: ID!
    force: Boolean = false
  ): WikiResetCursorResult!
}
