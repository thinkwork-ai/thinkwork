# Knowledge Base domain types for document-backed RAG via Bedrock KB.

type KnowledgeBase {
  id: ID!
  tenantId: ID!
  name: String!
  slug: String!
  description: String
  embeddingModel: String!
  chunkingStrategy: String!
  chunkSizeTokens: Int
  chunkOverlapPercent: Int
  status: String!
  awsKbId: String
  lastSyncAt: AWSDateTime
  lastSyncStatus: String
  documentCount: Int
  errorMessage: String
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type AgentKnowledgeBase {
  id: ID!
  agentId: ID!
  knowledgeBaseId: ID!
  knowledgeBase: KnowledgeBase
  enabled: Boolean!
  searchConfig: AWSJSON
  createdAt: AWSDateTime!
}

type SpaceKnowledgeBase {
  id: ID!
  tenantId: ID!
  spaceId: ID!
  knowledgeBaseId: ID!
  knowledgeBase: KnowledgeBase
  enabled: Boolean!
  searchConfig: AWSJSON
  createdAt: AWSDateTime!
}

input CreateKnowledgeBaseInput {
  tenantId: ID!
  name: String!
  description: String
  embeddingModel: String
  chunkingStrategy: String
  chunkSizeTokens: Int
  chunkOverlapPercent: Int
}

input UpdateKnowledgeBaseInput {
  name: String
  description: String
  # Changing any chunking field triggers a full re-ingest of all documents
  # (U8) — Bedrock fixes chunking at the data source.
  chunkingStrategy: String
  chunkSizeTokens: Int
  chunkOverlapPercent: Int
}

input AgentKnowledgeBaseInput {
  knowledgeBaseId: ID!
  enabled: Boolean
  searchConfig: AWSJSON
}

input SpaceKnowledgeBaseInput {
  knowledgeBaseId: ID!
  enabled: Boolean
  searchConfig: AWSJSON
}

# A single ranked result from a native test query against a KB (U10).
type KnowledgeBaseRetrievalHit {
  snippet: String!
  score: Float
  source: String
}

# Operator inspection result. `status` distinguishes a provisioned-but-empty
# KB ("ok") from one that was never provisioned ("not_provisioned"), so the
# UI doesn't show "no results" for a KB that actually needs a retry.
type KnowledgeBaseRetrievalResult {
  status: String!
  hits: [KnowledgeBaseRetrievalHit!]!
}

extend type Query {
  knowledgeBases(tenantId: ID!): [KnowledgeBase!]!
  knowledgeBase(id: ID!): KnowledgeBase
  testKnowledgeBaseRetrieval(
    id: ID!
    query: String!
  ): KnowledgeBaseRetrievalResult!
}

extend type Mutation {
  createKnowledgeBase(input: CreateKnowledgeBaseInput!): KnowledgeBase!
  updateKnowledgeBase(id: ID!, input: UpdateKnowledgeBaseInput!): KnowledgeBase!
  deleteKnowledgeBase(id: ID!): Boolean!
  syncKnowledgeBase(id: ID!): KnowledgeBase!
  retryKnowledgeBase(id: ID!): KnowledgeBase!
  setAgentKnowledgeBases(
    agentId: ID!
    knowledgeBases: [AgentKnowledgeBaseInput!]!
  ): [AgentKnowledgeBase!]!
}

extend type Agent {
  knowledgeBases: [AgentKnowledgeBase!]!
}
