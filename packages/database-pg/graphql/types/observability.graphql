# PRD-20: Observability types

type TraceEvent {
  traceId: String!
  requestId: String
  eventType: String
  threadId: ID
  agentId: ID
  agentName: String
  runtimeType: String
  model: String
  inputTokens: Int
  outputTokens: Int
  durationMs: Int
  costUsd: Float
  estimated: Boolean
  source: String
  parentRequestId: String
  toolCallId: String
  toolName: String
  profileRunId: String
  profileId: ID
  profileSlug: String
  profileName: String
  laneKey: String
  profileStatus: String
  loopId: String
  loopOwnerType: String
  loopOwnerSlug: String
  loopIterationIndex: Int
  loopPhase: String
  loopStatus: String
  loopVerdict: String
  reviewerRole: Boolean
  loopEvidence: AWSJSON
  modelRoutingStatus: String
  reconciliationState: String
  reconciliationSource: String
  sourceEvidence: [TraceSourceEvidence!]
  ruleSource: AWSJSON
  match: AWSJSON
  metadata: AWSJSON
  createdAt: AWSDateTime!
}

type TraceSourceEvidence {
  id: ID!
  traceRunId: ID
  traceEventId: ID
  sourceType: String!
  sourceSystem: String!
  sourceId: String
  uri: String
  observedAt: AWSDateTime
  summary: AWSJSON!
  redactionState: String!
  retentionExpiresAt: AWSDateTime
  metadata: AWSJSON!
  createdAt: AWSDateTime!
}

type TraceCostReconciliationFact {
  id: ID!
  traceRunId: ID
  traceEventId: ID
  costEventId: ID
  sourceEvidenceId: ID
  reconciliationState: String!
  reconciliationScope: String!
  provider: String
  model: String
  requestId: String
  attributionLevel: String
  runtimeInputTokens: Int
  runtimeOutputTokens: Int
  runtimeCachedReadTokens: Int
  providerInputTokens: Int
  providerOutputTokens: Int
  providerCachedReadTokens: Int
  runtimeAmountUsd: Float
  providerAmountUsd: Float
  billedAmountUsd: Float
  varianceUsd: Float
  metadata: AWSJSON!
  reconciledAt: AWSDateTime!
  createdAt: AWSDateTime!
}

type AgentPerformance {
  agentId: ID!
  agentName: String!
  runtimeType: String
  invocationCount: Int!
  errorCount: Int!
  avgDurationMs: Float!
  p95DurationMs: Float!
  totalInputTokens: Int!
  totalOutputTokens: Int!
  totalCostUsd: Float!
}

type PerformanceTimeSeries {
  day: String!
  invocationCount: Int!
  avgDurationMs: Float!
  errorCount: Int!
  totalCostUsd: Float!
}

type ModelInvocation {
  requestId: String!
  modelId: String!
  timestamp: AWSDateTime!
  inputTokenCount: Int!
  outputTokenCount: Int!
  cacheReadTokenCount: Int!
  inputPreview: String
  outputPreview: String
  toolCount: Int
  costUsd: Float
  toolUses: [String!]
  hasToolResult: Boolean
  branch: String
}

extend type Query {
  threadTraces(threadId: ID!, tenantId: ID!): [TraceEvent!]!
  agentPerformance(
    tenantId: ID!
    from: AWSDateTime
    to: AWSDateTime
  ): [AgentPerformance!]!
  performanceTimeSeries(
    tenantId: ID!
    agentId: ID
    days: Int
  ): [PerformanceTimeSeries!]!
  singleAgentPerformance(agentId: ID!, tenantId: ID!): AgentPerformance
  agentCostBreakdown(
    agentId: ID!
    tenantId: ID!
    from: AWSDateTime
    to: AWSDateTime
  ): CostSummary!
  turnInvocationLogs(tenantId: ID!, turnId: ID!): [ModelInvocation!]!
}
