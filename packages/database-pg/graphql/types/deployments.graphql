type ManagedApplication {
  id: ID!
  key: String!
  displayName: String!
  desiredStatus: String!
  currentStatus: String!
  desiredConfig: AWSJSON!
  selectedReleaseVersion: String
  selectedManifestDigest: String
  lastJobId: ID
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type ManagedApplicationDeploymentJob {
  id: ID!
  tenantId: ID!
  applicationId: ID
  appKey: String!
  operation: String!
  status: String!
  requestedByUserId: ID
  releaseVersion: String!
  manifestDigest: String!
  desiredConfigVersion: String!
  stateMachineArn: String
  planExecutionArn: String
  applyExecutionArn: String
  codebuildBuildArn: String
  planDigest: String
  planSummary: AWSJSON!
  dataImpact: AWSJSON!
  evidenceBucket: String
  evidencePrefix: String
  approvalRequired: Boolean!
  approvedByUserId: ID
  approvedAt: AWSDateTime
  rejectedByUserId: ID
  rejectedAt: AWSDateTime
  errorMessage: String
  events: [ManagedApplicationDeploymentEvent!]!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type ManagedApplicationDeploymentEvent {
  id: ID!
  jobId: ID!
  eventType: String!
  message: String!
  payload: AWSJSON!
  createdAt: AWSDateTime!
}

type DeploymentEvidence {
  jobId: ID!
  bucket: String
  prefix: String
  urls: [String!]!
}

type DeploymentRelease {
  version: String!
  name: String
  prerelease: Boolean!
  draft: Boolean!
  publishedAt: AWSDateTime
  htmlUrl: String!
  manifestUrl: String!
  manifestSha256: String!
  signatureUrl: String
  signed: Boolean!
  deployable: Boolean!
}

type DeploymentReleaseUpdate {
  release: DeploymentRelease!
  executionArn: String
  stateMachineArn: String!
  evidenceBucket: String
  evidencePrefix: String!
  message: String!
}

type ReleaseUpdateJob {
  id: ID!
  tenantId: ID!
  status: String!
  requestedByUserId: ID
  targetReleaseVersion: String!
  currentReleaseVersion: String
  manifestUrl: String!
  manifestSha256: String!
  manifestSigned: Boolean!
  manifestTrustPolicy: String
  terraformModuleVersion: String
  preflightSummary: AWSJSON!
  preservedConfigSummary: AWSJSON!
  remediationSummary: AWSJSON!
  stateMachineArn: String
  executionArn: String
  codebuildBuildArn: String
  evidenceBucket: String
  evidencePrefix: String
  statusPointerBucket: String
  statusPointerKey: String
  finalStatus: AWSJSON!
  failureCategory: String
  failureMessage: String
  recoveryAction: String
  events: [ReleaseUpdateEvent!]!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type ReleaseUpdateEvent {
  id: ID!
  jobId: ID!
  eventType: String!
  message: String!
  payload: AWSJSON!
  createdAt: AWSDateTime!
}

input StartDeploymentReleaseUpdateInput {
  version: String!
  manifestUrl: String!
  manifestSha256: String!
  idempotencyKey: String
}

type BootstrapCredentialLease {
  id: ID!
  sessionId: ID!
  status: String!
  leaseType: String!
  secretFingerprint: String!
  roleArn: String
  externalIdHash: String
  expiresAt: AWSDateTime!
  validatedAt: AWSDateTime
  inUseAt: AWSDateTime
  transferredAt: AWSDateTime
  revokedAt: AWSDateTime
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

input StartManagedApplicationPlanInput {
  key: String!
  operation: String!
  releaseVersion: String
  manifestDigest: String
  manifestUrl: String
  manifestImages: AWSJSON
  desiredConfigVersion: String
  desiredConfig: AWSJSON
  idempotencyKey: String!
}

input ApproveManagedApplicationDeploymentInput {
  jobId: ID!
  planDigest: String!
  manifestDigest: String!
  destructiveConfirmation: String
}

input RejectManagedApplicationDeploymentInput {
  jobId: ID!
  reason: String
}

extend type Query {
  managedApplications: [ManagedApplication!]!
  managedApplicationDeployment(jobId: ID!): ManagedApplicationDeploymentJob
  deploymentEvidence(jobId: ID!): DeploymentEvidence!
  deploymentReleases(limit: Int): [DeploymentRelease!]!
  releaseUpdateJob(jobId: ID!): ReleaseUpdateJob
}

extend type Mutation {
  startDeploymentReleaseUpdate(
    input: StartDeploymentReleaseUpdateInput!
  ): DeploymentReleaseUpdate!
  startManagedApplicationPlan(
    input: StartManagedApplicationPlanInput!
  ): ManagedApplicationDeploymentJob!
  approveManagedApplicationDeployment(
    input: ApproveManagedApplicationDeploymentInput!
  ): ManagedApplicationDeploymentJob!
  rejectManagedApplicationDeployment(
    input: RejectManagedApplicationDeploymentInput!
  ): ManagedApplicationDeploymentJob!
}
