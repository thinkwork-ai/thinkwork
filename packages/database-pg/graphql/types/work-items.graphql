# Native Work Items are ThinkWork-owned units of work. Threads can discuss
# items, but Work Items own task status, provenance, and saved views.

enum WorkItemStatusCategory {
  TODO
  ACTIVE
  BLOCKED
  DONE
  SKIPPED
}

enum WorkItemPriority {
  LOW
  NORMAL
  HIGH
  URGENT
}

enum WorkItemEventType {
  CREATED
  UPDATED
  STATUS_CHANGED
  COMPLETED
  BLOCKED
  UNBLOCKED
  ASSIGNED
  DUE_DATE_CHANGED
  APPLICABILITY_CHANGED
  LINKED_THREAD
  AGENT_ACTION
}

enum WorkItemViewType {
  LIST
  BOARD
}

enum WorkItemThreadRelationship {
  PRIMARY
  MENTIONED
  EVIDENCE
  FOLLOW_UP
}

enum WorkItemExternalRefProvider {
  THINKWORK
  LASTMILE
  LINEAR
  PLANE
  TWENTY
}

enum WorkItemOpenEngineDependencyState {
  READY
  WAITING
}

enum WorkItemOpenEngineReceiptType {
  CLAIMED
  PROGRESS
  BLOCKED
  RESUMED
  FAILED
  COMPLETED
}

enum WorkItemDocumentKind {
  PLAN
  PROGRESS
  SPEC
  EVIDENCE
  HANDOFF
  NOTE
  OTHER
}

type WorkItemStatus {
  id: ID!
  tenantId: ID!
  spaceId: ID!
  name: String!
  description: String
  color: String
  icon: String
  category: WorkItemStatusCategory!
  isActive: Boolean!
  isFinal: Boolean!
  isDefault: Boolean!
  displayOrder: Int!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type WorkItemThreadLink {
  id: ID!
  tenantId: ID!
  workItemId: ID!
  threadId: ID!
  spaceId: ID!
  relationship: WorkItemThreadRelationship!
  createdAt: AWSDateTime!
}

type WorkItemEvent {
  id: ID!
  tenantId: ID!
  spaceId: ID!
  workItemId: ID!
  threadId: ID
  actorUserId: ID
  actorAgentId: ID
  eventType: WorkItemEventType!
  previousStatusId: ID
  newStatusId: ID
  message: String
  metadata: AWSJSON
  createdAt: AWSDateTime!
}

type WorkItemExternalRef {
  id: ID!
  tenantId: ID!
  workItemId: ID!
  provider: WorkItemExternalRefProvider!
  externalId: String!
  externalUrl: AWSURL
  metadata: AWSJSON
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type WorkItemLabel {
  id: ID!
  tenantId: ID!
  name: String!
  slug: String!
  color: String
  description: String
  createdByUserId: ID
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
  archivedAt: AWSDateTime
}

type WorkItemDocument {
  id: ID!
  tenantId: ID!
  workItemId: ID!
  kind: WorkItemDocumentKind!
  title: String!
  content: String
  contentType: String!
  sizeBytes: Int!
  checksumSha256: String
  metadata: AWSJSON
  createdByUserId: ID
  createdByAgentId: ID
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
  archivedAt: AWSDateTime
}

type WorkItem {
  id: ID!
  tenantId: ID!
  spaceId: ID!
  statusId: ID
  status: WorkItemStatus
  title: String!
  notes: String
  priority: WorkItemPriority!
  ownerUserId: ID
  ownerAgentId: ID
  dueAt: AWSDateTime
  required: Boolean!
  applicable: Boolean!
  blocked: Boolean!
  openEngineEnabled: Boolean!
  openEngineQueueKey: String
  openEngineClaimedByAgentId: ID
  openEngineClaimedAt: AWSDateTime
  openEngineClaimExpiresAt: AWSDateTime
  openEngineHumanHold: Boolean!
  openEngineHumanHoldReason: String
  openEngineScheduledAt: AWSDateTime
  openEngineDependencyState: WorkItemOpenEngineDependencyState!
  openEngineRouting: AWSJSON
  completedAt: AWSDateTime
  completedByUserId: ID
  completedByAgentId: ID
  createdByUserId: ID
  createdByAgentId: ID
  templateSourceId: ID
  metadata: AWSJSON
  threadLinks: [WorkItemThreadLink!]!
  events: [WorkItemEvent!]!
  externalRefs: [WorkItemExternalRef!]!
  labels: [WorkItemLabel!]!
  documents: [WorkItemDocument!]!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
  archivedAt: AWSDateTime
}

type WorkItemSavedView {
  id: ID!
  tenantId: ID!
  userId: ID
  spaceId: ID
  name: String!
  viewType: WorkItemViewType!
  filters: AWSJSON
  grouping: AWSJSON
  sorting: AWSJSON
  viewConfig: AWSJSON
  isPrivate: Boolean!
  isDefault: Boolean!
  isFavorite: Boolean!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

input WorkItemsInput {
  tenantId: ID
  spaceId: ID
  threadId: ID
  statusId: ID
  statusCategory: WorkItemStatusCategory
  ownerUserId: ID
  ownerAgentId: ID
  dueBefore: AWSDateTime
  dueAfter: AWSDateTime
  blocked: Boolean
  priority: WorkItemPriority
  required: Boolean
  applicable: Boolean
  labelIds: [ID!]
  labelSlugs: [String!]
  search: String
  includeArchived: Boolean
  limit: Int
}

input WorkItemLabelsInput {
  tenantId: ID
  includeArchived: Boolean
  search: String
  limit: Int
}

input WorkItemDocumentsInput {
  tenantId: ID
  workItemId: ID!
  kind: WorkItemDocumentKind
  includeArchived: Boolean
  includeContent: Boolean
  limit: Int
}

input WorkItemDocumentInput {
  tenantId: ID
  id: ID!
}

input CreateWorkItemInput {
  tenantId: ID
  spaceId: ID!
  threadId: ID
  statusId: ID
  title: String!
  notes: String
  priority: WorkItemPriority
  ownerUserId: ID
  ownerAgentId: ID
  dueAt: AWSDateTime
  required: Boolean
  applicable: Boolean
  blocked: Boolean
  templateSourceId: ID
  labelIds: [ID!]
  labelSlugs: [String!]
  metadata: AWSJSON
}

input UpdateWorkItemInput {
  tenantId: ID
  workItemId: ID!
  title: String
  notes: String
  priority: WorkItemPriority
  ownerUserId: ID
  ownerAgentId: ID
  dueAt: AWSDateTime
  required: Boolean
  applicable: Boolean
  blocked: Boolean
  labelIds: [ID!]
  labelSlugs: [String!]
  metadata: AWSJSON
  archived: Boolean
}

input CreateWorkItemLabelInput {
  tenantId: ID
  name: String!
  slug: String
  color: String
  description: String
}

input UpdateWorkItemLabelInput {
  tenantId: ID
  id: ID!
  name: String
  slug: String
  color: String
  description: String
  archived: Boolean
}

input CreateWorkItemDocumentInput {
  tenantId: ID
  workItemId: ID!
  kind: WorkItemDocumentKind
  title: String!
  content: String
  contentBase64: String
  filename: String
  contentType: String
  metadata: AWSJSON
}

input UpdateWorkItemDocumentInput {
  tenantId: ID
  id: ID!
  kind: WorkItemDocumentKind
  title: String
  content: String
  contentBase64: String
  filename: String
  contentType: String
  metadata: AWSJSON
  archived: Boolean
}

input UpdateWorkItemStatusInput {
  tenantId: ID
  workItemId: ID!
  statusId: ID
  statusCategory: WorkItemStatusCategory
  threadId: ID
  note: String
  metadata: AWSJSON
}

input WorkItemStatusInput {
  id: ID
  name: String!
  description: String
  color: String
  icon: String
  category: WorkItemStatusCategory!
  isActive: Boolean
  isFinal: Boolean
  isDefault: Boolean
  displayOrder: Int
}

input SaveWorkItemStatusesInput {
  tenantId: ID
  spaceId: ID!
  statuses: [WorkItemStatusInput!]!
}

input SaveWorkItemViewInput {
  tenantId: ID
  id: ID
  name: String!
  spaceId: ID
  viewType: WorkItemViewType!
  filters: AWSJSON
  grouping: AWSJSON
  sorting: AWSJSON
  viewConfig: AWSJSON
  isPrivate: Boolean
  isDefault: Boolean
  isFavorite: Boolean
}

input DeleteWorkItemViewInput {
  tenantId: ID
  id: ID!
}

input OpenEngineEligibleWorkItemsInput {
  tenantId: ID
  queueKey: String
  now: AWSDateTime
  limit: Int
}

input ClaimNextOpenEngineWorkItemInput {
  tenantId: ID
  queueKey: String
  agentId: ID!
  now: AWSDateTime
  leaseSeconds: Int
}

input RecordOpenEngineWorkItemReceiptInput {
  tenantId: ID
  workItemId: ID!
  agentId: ID!
  receiptType: WorkItemOpenEngineReceiptType!
  threadId: ID
  message: String
  evidence: AWSJSON
  metadata: AWSJSON
  idempotencyKey: String
  now: AWSDateTime
}

extend type Query {
  workItems(input: WorkItemsInput): [WorkItem!]!
  workItem(tenantId: ID, id: ID!): WorkItem
  threadWorkItems(tenantId: ID, threadId: ID!): [WorkItem!]!
  workItemLabels(input: WorkItemLabelsInput): [WorkItemLabel!]!
  workItemDocuments(input: WorkItemDocumentsInput!): [WorkItemDocument!]!
  workItemDocument(input: WorkItemDocumentInput!): WorkItemDocument
  workItemStatuses(tenantId: ID, spaceId: ID!): [WorkItemStatus!]!
  workItemSavedViews(tenantId: ID, spaceId: ID): [WorkItemSavedView!]!
  openEngineEligibleWorkItems(
    input: OpenEngineEligibleWorkItemsInput!
  ): [WorkItem!]!
}

extend type Mutation {
  createWorkItem(input: CreateWorkItemInput!): WorkItem!
  updateWorkItem(input: UpdateWorkItemInput!): WorkItem!
  createWorkItemLabel(input: CreateWorkItemLabelInput!): WorkItemLabel!
  updateWorkItemLabel(input: UpdateWorkItemLabelInput!): WorkItemLabel!
  createWorkItemDocument(input: CreateWorkItemDocumentInput!): WorkItemDocument!
  updateWorkItemDocument(input: UpdateWorkItemDocumentInput!): WorkItemDocument!
  updateWorkItemStatus(input: UpdateWorkItemStatusInput!): WorkItem!
  claimNextOpenEngineWorkItem(
    input: ClaimNextOpenEngineWorkItemInput!
  ): WorkItem
  recordOpenEngineWorkItemReceipt(
    input: RecordOpenEngineWorkItemReceiptInput!
  ): WorkItemEvent!
  saveWorkItemStatuses(input: SaveWorkItemStatusesInput!): [WorkItemStatus!]!
  saveWorkItemView(input: SaveWorkItemViewInput!): WorkItemSavedView!
  deleteWorkItemView(input: DeleteWorkItemViewInput!): Boolean!
}
