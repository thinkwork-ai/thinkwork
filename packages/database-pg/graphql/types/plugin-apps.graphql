"""
Installed plugin app surfaces.

These are trusted, first-party plugin apps declared by launchable `ui-surface`
components in installed plugin manifests. The launch contract is identity and
route metadata only; browser clients never receive plugin credentials or
runtime code from this surface.
"""
type InstalledPluginAppReadiness {
  """
  ready | install_in_progress | operator_setup_required |
  component_unavailable | activation_required
  """
  state: String!
  message: String!
  "Optional product-action hint for the web shell."
  nextAction: String
}

type InstalledPluginApp {
  "Stable install/surface identity."
  id: ID!
  pluginInstallId: ID!
  pluginKey: String!
  pluginDisplayName: String!
  pluginVersion: String!
  surfaceKey: String!
  displayName: String!
  appKey: String!
  routeSegment: String!
  mount: String!
  runtime: String!
  description: String
  icon: String
  entitlementProductKey: String
  readiness: InstalledPluginAppReadiness!
}

"""
Twenty CRM records normalized for the Client Engagement plugin app.

The app reads and mutates CRM-owned fields through the authenticated Twenty
plugin path. Browser clients receive only app-shaped records; they never send
MCP URLs, bearer tokens, or generic tool-call payloads.
"""
type TwentyEngagementCompany {
  id: ID!
  name: String!
  domainName: String
  crmUrl: String
}

type TwentyEngagementOpportunity {
  id: ID!
  name: String!
  stage: String!
  stageLabel: String!
  amountMicros: Float
  closeDate: String
  companyId: ID
  companyName: String
  crmUrl: String
}

type TwentyEngagementOpportunityLayer {
  id: ID!
  name: String
  layerType: String!
  layerTypeLabel: String!
  instanceName: String
  layerStatus: String!
  layerStatusLabel: String!
  whatWeKnow: String
  openQuestions: String
  businessValue: String
  nextSteps: String
  opportunityId: ID!
}

type TwentyEngagementOpportunityWithLayers {
  opportunity: TwentyEngagementOpportunity!
  layers: [TwentyEngagementOpportunityLayer!]!
}

type TwentyEngagementAccount {
  company: TwentyEngagementCompany!
  opportunities: [TwentyEngagementOpportunityWithLayers!]!
}

type TwentyEngagementDashboard {
  accounts: [TwentyEngagementAccount!]!
  companies: [TwentyEngagementCompany!]!
  opportunities: [TwentyEngagementOpportunity!]!
  opportunityLayers: [TwentyEngagementOpportunityLayer!]!
}

"""
ThinkWork-owned app overlay state keyed to a trusted plugin app surface and
source-system record. Overlay payloads are tenant-shared in v1; created/updated
user fields are audit metadata, not visibility scopes.
"""
type PluginAppOverlay {
  id: ID!
  pluginInstallId: ID!
  pluginKey: String!
  appSurfaceKey: String!
  appKey: String!
  provider: String!
  providerRecordType: String!
  providerRecordId: ID!
  sectionKey: String!
  payload: AWSJSON!
  createdByUserId: ID
  updatedByUserId: ID
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

input PluginAppOverlayQueryInput {
  appKey: String!
  provider: String!
  providerRecordType: String!
  providerRecordId: ID!
  sectionKeys: [String!]
}

input UpsertPluginAppOverlayInput {
  appKey: String!
  provider: String!
  providerRecordType: String!
  providerRecordId: ID!
  sectionKey: String!
  payload: AWSJSON!
}

input UpdateTwentyEngagementOpportunityStageInput {
  opportunityId: ID!
  stage: String!
}

input UpdateTwentyEngagementOpportunityLayerStatusInput {
  layerId: ID!
  layerStatus: String!
}

extend type Query {
  "Launchable plugin apps available to the current tenant/user."
  installedPluginApps: [InstalledPluginApp!]!

  "CRM-owned records for the Twenty Client Engagement app."
  twentyEngagementDashboard: TwentyEngagementDashboard!

  "ThinkWork-owned overlay sections for one plugin-app record."
  pluginAppOverlays(input: PluginAppOverlayQueryInput!): [PluginAppOverlay!]!
}

extend type Mutation {
  "Create or replace one ThinkWork-owned overlay section for a plugin-app record."
  upsertPluginAppOverlay(input: UpsertPluginAppOverlayInput!): PluginAppOverlay!

  "Update an opportunity stage in Twenty through the authenticated plugin MCP path."
  updateTwentyEngagementOpportunityStage(
    input: UpdateTwentyEngagementOpportunityStageInput!
  ): TwentyEngagementOpportunity!

  "Update an opportunity layer status in Twenty through the authenticated plugin MCP path."
  updateTwentyEngagementOpportunityLayerStatus(
    input: UpdateTwentyEngagementOpportunityLayerStatusInput!
  ): TwentyEngagementOpportunityLayer!
}
