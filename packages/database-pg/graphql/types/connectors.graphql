# Connector framework data foundation.
#
# U3 exposes read-only connector data. Lifecycle mutations land in U4, and
# live dispatch behavior lands in the master plan's connector chassis work.

enum ConnectorStatus {
  active
  paused
  unhealthy
  archived
}

enum DispatchTargetType {
  agent
  routine
  hybrid_routine
  computer
}

enum ConnectorExecutionState {
  pending
  dispatching
  invoking
  recording_result
  terminal
  failed
  cancelled
}

input ConnectorFilter {
  status: ConnectorStatus
  type: String
  includeArchived: Boolean
}

input CreateConnectorInput {
  tenantId: ID!
  type: String!
  name: String!
  description: String
  connectionId: ID
  config: AWSJSON
  dispatchTargetType: DispatchTargetType!
  dispatchTargetId: ID!
  enabled: Boolean
  createdByType: String
  createdById: String
}

input UpdateConnectorInput {
  type: String
  name: String
  description: String
  connectionId: ID
  config: AWSJSON
  dispatchTargetType: DispatchTargetType
  dispatchTargetId: ID
  enabled: Boolean
}

type Connector {
  id: ID!
  tenantId: ID!
  type: String!
  name: String!
  description: String
  status: ConnectorStatus!
  connectionId: ID
  config: AWSJSON
  dispatchTargetType: DispatchTargetType!
  dispatchTargetId: ID!
  lastPollAt: AWSDateTime
  lastPollCursor: String
  nextPollAt: AWSDateTime
  ebScheduleName: String
  enabled: Boolean!
  createdByType: String
  createdById: String
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type ConnectorExecution {
  id: ID!
  tenantId: ID!
  connectorId: ID!
  externalRef: String!
  currentState: ConnectorExecutionState!
  spendEnvelopeUsdCents: Int
  stateMachineArn: String
  startedAt: AWSDateTime
  finishedAt: AWSDateTime
  errorClass: String
  outcomePayload: AWSJSON
  costFinalizedAt: AWSDateTime
  lastUsageEventAt: AWSDateTime
  killTarget: String
  killTargetAt: AWSDateTime
  retryAttempt: Int!
  createdAt: AWSDateTime!
}

type ConnectorRunComputerTask {
  id: ID!
  status: String!
  input: AWSJSON
  output: AWSJSON
  error: AWSJSON
  completedAt: AWSDateTime
  createdAt: AWSDateTime!
}

type ConnectorRunDelegation {
  id: ID!
  status: String!
  agentId: ID!
  inputArtifacts: AWSJSON
  outputArtifacts: AWSJSON
  result: AWSJSON
  error: AWSJSON
  completedAt: AWSDateTime
  createdAt: AWSDateTime!
}

type ConnectorRunThreadTurn {
  id: ID!
  threadId: ID
  agentId: ID
  status: String!
  resultJson: AWSJSON
  error: String
  errorCode: String
  startedAt: AWSDateTime
  finishedAt: AWSDateTime
  createdAt: AWSDateTime!
}

type ConnectorRunLifecycle {
  execution: ConnectorExecution!
  connector: Connector!
  computerTask: ConnectorRunComputerTask
  delegation: ConnectorRunDelegation
  threadTurn: ConnectorRunThreadTurn
  threadId: ID
  messageId: ID
  computerId: ID
}

type ConnectorDispatchResult {
  status: String!
  connectorId: ID!
  executionId: ID
  externalRef: String
  threadId: ID
  messageId: ID
  computerId: ID
  computerTaskId: ID
  targetType: DispatchTargetType
  reason: String
  error: String
}

type ConnectorRunNowResult {
  connectorId: ID!
  results: [ConnectorDispatchResult!]!
}

extend type Query {
  connectors(filter: ConnectorFilter, limit: Int, cursor: String): [Connector!]!
  connector(id: ID!): Connector
  connectorExecutions(
    connectorId: ID
    status: ConnectorExecutionState
    limit: Int
    cursor: String
  ): [ConnectorExecution!]!
  connectorRunLifecycles(
    connectorId: ID
    limit: Int
    cursor: String
  ): [ConnectorRunLifecycle!]!
  connectorExecution(id: ID!): ConnectorExecution
}

extend type Mutation {
  createConnector(input: CreateConnectorInput!): Connector!
  updateConnector(id: ID!, input: UpdateConnectorInput!): Connector!
  pauseConnector(id: ID!): Connector!
  resumeConnector(id: ID!): Connector!
  archiveConnector(id: ID!): Connector!
  runConnectorNow(id: ID!): ConnectorRunNowResult!
}
