# Evaluations — port of maniflow's eval product.
#
# v1 scope: dashboard summary, runs list/detail, Studio test-case CRUD,
# scheduled runs, real-time run status. Trends-only routes and
# Analyze-Threads are out of scope; AgentCore Evaluations covers the
# scoring layer (no separate evaluator-config table).

# ────────────────────────────────────────────────────────────────────
# Test cases (Studio)
# ────────────────────────────────────────────────────────────────────

type EvalTestCase {
  id: ID!
  tenantId: ID!
  name: String!
  category: String!
  query: String!
  systemPrompt: String
  # Deterministic checks (contains/regex/equals/json-path) evaluated by
  # our custom code-based AgentCore evaluator. Stored as JSON because
  # the shape varies per assertion type.
  assertions: AWSJSON!
  # Built-in or custom AgentCore evaluator IDs to invoke per test
  # (e.g. ["Builtin.Helpfulness", "Builtin.ToolSelectionAccuracy"]).
  agentcoreEvaluatorIds: [String!]!
  tags: [String!]!
  enabled: Boolean!
  source: String!
  # Linkage into the S3-canonical dataset substrate (Trust Core U4).
  # Null on pre-dataset rows. datasetCaseId is the case's stable identity
  # within its dataset — it survives dataset version bumps so trend
  # history spans edits.
  datasetId: ID
  datasetCaseId: String
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

# ────────────────────────────────────────────────────────────────────
# Datasets — versioned per-tenant S3 artifacts (Trust Core U4)
#
# S3 is canonical (tenants/<slug>/eval-datasets/<dataset-slug>/);
# this type projects the derived eval_datasets index row. The index is
# fully reconstructible from S3; reads drift-check manifestSha and
# re-sync on mismatch.
# ────────────────────────────────────────────────────────────────────

type EvalDataset {
  id: ID!
  tenantId: ID!
  slug: String!
  name: String
  # 'baseline' (seeded red-team suite) | 'custom' (operator-curated).
  kind: String!
  # Monotonically bumped on every dataset mutation; runs pin it (U6).
  version: Int!
  # sha256 of the S3 dataset.json — the index drift detector.
  manifestSha: String
  # Soft archive: archived datasets hide from the default listing but
  # stay queryable (history intact). Never hard-deleted while referenced.
  archivedAt: AWSDateTime
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

# ────────────────────────────────────────────────────────────────────
# Flag-thread → dataset case (Trust Core U7)
#
# An operator flags a completed thread turn into a custom dataset. The
# flag-time snapshot (message history, workspace projection when the
# turn carries one, tool traces when retrievable) is copied into the
# dataset's S3 prefix as case payload objects — self-contained, so the
# case survives source-thread deletion. The completeness record states
# exactly what was captured; pre-THNK-10 threads degrade to
# history-only rather than being blocked.
# ────────────────────────────────────────────────────────────────────

type EvalCaseCompleteness {
  # Message history captured into the snapshot.
  history: Boolean!
  # The turn's context_snapshot.workspace_projection was present and
  # captured. False on pre-THNK-10 threads (history-only badge).
  workspace: Boolean!
  # Tool traces (tool_calls/tool_results from the message rows) captured.
  traces: Boolean!
  # Any payload hit the size cap and was truncated (oldest entries
  # dropped first; the payload records the dropped count).
  truncated: Boolean!
}

type FlagThreadForEvalResult {
  # The created case's derived index row (kind 'flagged-thread').
  case: EvalTestCase!
  # The target dataset (existing custom dataset or the newly created one).
  dataset: EvalDataset!
  completeness: EvalCaseCompleteness!
}

input FlagThreadForEvalInput {
  threadId: ID!
  # Must be a completed turn of the thread — in-flight turns are rejected.
  turnId: ID!
  # Exactly one of datasetSlug (existing custom dataset; baseline is not
  # a valid target) or newDatasetName (creates a custom dataset).
  datasetSlug: String
  newDatasetName: String
  # Required, non-empty after trim: what "fixed" looks like. Becomes the
  # case's llm-rubric assertion (judging hardened in U8).
  resolutionTarget: String!
  # 'security' | 'quality' — tagged onto the case.
  outcomeKind: String!
}

# ────────────────────────────────────────────────────────────────────
# Runs
# ────────────────────────────────────────────────────────────────────

type EvalRun {
  id: ID!
  tenantId: ID!
  agentId: ID
  agentName: String
  scheduledJobId: ID
  status: String!
  executionTarget: String!
  runtimeHost: String!
  # Model used for the direct-AgentCore eval run. Manual runs default to
  # Kimi K2.5; explicit overrides must be available in model_catalog.
  model: String
  categories: [String!]!
  selectedTestCaseIds: [ID!]!
  # Run scope pinning (Trust Core U6). Dataset launches record the
  # dataset id at creation; the eval-runner pins the manifest version
  # when it captures the run snapshot (copy-at-launch), so the run
  # executes exactly the dataset version it was launched with. Both null
  # on legacy category/test-case launches.
  datasetId: ID
  datasetVersion: Int
  totalTests: Int!
  passed: Int!
  failed: Int!
  # Count of error-status results (infra noise — excluded from passRate).
  # Null on legacy runs, where errors are folded into `failed`.
  errored: Int
  # Scoring-semantics version stamped at run creation
  # (CURRENT_EVAL_SCORING_VERSION in @thinkwork/evals-core). Null = legacy
  # run scored under the old denominator (errors counted as failed).
  scoringVersion: Int
  # True when scoringVersion is null: the run's passRate is on the legacy
  # scale and must not be blended with current-version numbers.
  isLegacyScoring: Boolean!
  # pass / (pass + fail) under current scoring; null while pending/running
  # and on completed runs with nothing scoreable (all-error / zero-case) —
  # "no score", never 0%.
  passRate: Float
  regression: Boolean!
  costUsd: Float
  errorMessage: String
  startedAt: AWSDateTime
  completedAt: AWSDateTime
  createdAt: AWSDateTime!
}

# ────────────────────────────────────────────────────────────────────
# Per-test results within a run
# ────────────────────────────────────────────────────────────────────

type EvalResult {
  id: ID!
  runId: ID!
  testCaseId: ID
  testCaseName: String
  category: String
  status: String!
  score: Float
  durationMs: Int
  agentSessionId: String
  input: String
  expected: String
  actualOutput: String
  # Composed system prompt the agent loop ran against this case (workspace
  # files + runtime tool policy + attachment preamble). Captured from the
  # Pi runtime's response. Null on rows from runs that completed before
  # this field shipped, or on Computer-eval rows where the runtime does
  # not surface the composed prompt.
  systemPrompt: String
  # Thread turn this eval execution corresponds to. Set when the test case
  # carries workspace-projection assertions targeting a stored turn snapshot
  # (plan 2026-06-12-002 U10). Null for output-only eval rows and rows from
  # runs that completed before this field shipped.
  threadTurnId: ID
  # Convenience read of the linked turn's stored
  # `thread_turns.context_snapshot.workspace_projection` (shape documented in
  # packages/api/src/lib/workspace-projection-snapshot.ts). Resolved lazily
  # from the STORED snapshot — never re-rendered. Null when no turn is
  # linked or the turn has no stored projection.
  workspaceProjection: AWSJSON
  # Per-evaluator scores. JSON because the shape varies by evaluator
  # (Builtin.Helpfulness vs ToolSelectionAccuracy vs custom). Each entry:
  # { evaluatorId, source, value, label, explanation, tokenUsage }
  evaluatorResults: AWSJSON!
  # Snapshot of which deterministic assertions passed at run time.
  assertions: AWSJSON!
  errorMessage: String
  # Why an error-status row errored. Enum-by-comment:
  # 'timeout' | 'throttle' | 'evaluator_error' | 'reconciler' |
  # 'infra_other'. Null on pass/fail rows and pre-migration error rows.
  errorCause: String
  # Operator verdict override (Trust Core U9). The override is a
  # SEPARATE field, never a mutation of `status` — the judge's original
  # verdict + rendered rubric stay immutable while aggregation reads the
  # override last. 'pass' | 'fail'; null = no override.
  overrideStatus: String
  # Authenticated caller who wrote the override — derived server-side,
  # never accepted as an argument.
  overriddenBy: String
  overriddenAt: AWSDateTime
  # Required audit note recorded with the override.
  overrideReason: String
  # The verdict aggregation counts: overrideStatus when present,
  # otherwise status.
  effectiveStatus: String!
  createdAt: AWSDateTime!
}

type EvalSpan {
  timestamp: AWSDateTime
  name: String!
  attributes: AWSJSON!
}

# ────────────────────────────────────────────────────────────────────
# Aggregates for dashboard
# ────────────────────────────────────────────────────────────────────

type EvalSummary {
  totalRuns: Int!
  latestPassRate: Float
  avgPassRate: Float
  regressionCount: Int!
}

type EvalTimeSeriesPoint {
  day: String!
  passRate: Float
  runCount: Int!
  passed: Int!
  failed: Int!
}

type EvalRunsPage {
  items: [EvalRun!]!
  totalCount: Int!
}

# ────────────────────────────────────────────────────────────────────
# Inputs
# ────────────────────────────────────────────────────────────────────

input EvalAssertionInput {
  type: String!
  value: String
  path: String
}

input CreateEvalTestCaseInput {
  name: String!
  category: String!
  query: String!
  systemPrompt: String
  assertions: [EvalAssertionInput!]
  agentcoreEvaluatorIds: [String!]
  tags: [String!]
  enabled: Boolean
}

input UpdateEvalTestCaseInput {
  name: String
  category: String
  query: String
  systemPrompt: String
  assertions: [EvalAssertionInput!]
  agentcoreEvaluatorIds: [String!]
  tags: [String!]
  enabled: Boolean
}

input CreateEvalDatasetInput {
  # Validated against ^[a-z][a-z0-9-]{0,63}$ — used verbatim as the S3
  # key segment under tenants/<tenant-slug>/eval-datasets/.
  slug: String!
  name: String
  # 'baseline' | 'custom'; defaults to 'custom'.
  kind: String
}

input UpdateEvalDatasetInput {
  name: String
}

input EvalDatasetCaseInput {
  # Stable case identity within the dataset (^[a-z][a-z0-9-]{0,63}$).
  caseId: String!
  name: String!
  category: String!
  query: String!
  systemPrompt: String
  # Informational expected-answer text; stored only in the S3 case file
  # (the canonical artifact), not projected into the index row.
  expectedBehavior: String
  assertions: [EvalAssertionInput!]
  # Engine-specific evaluator selections. Stored in the case file's
  # namespaced `engines.agentcore.evaluator_ids` extension block — the
  # canonical core format never references engine vocabulary.
  agentcoreEvaluatorIds: [String!]
  tags: [String!]
  enabled: Boolean
}

input UpdateEvalDatasetCaseInput {
  name: String
  category: String
  query: String
  systemPrompt: String
  expectedBehavior: String
  assertions: [EvalAssertionInput!]
  agentcoreEvaluatorIds: [String!]
  tags: [String!]
  enabled: Boolean
}

# ────────────────────────────────────────────────────────────────────
# MCP replay tool overrides (Trust Core U13 → reworked U14)
#
# Replay now DEFAULT-ALLOWS read-shaped MCP tools (classified by a name
# heuristic) and blocks write-shaped tools — read-only tools run on replay
# with no operator setup. The email/web side-effect kill-list stays blocked
# regardless. This per-tenant list is the OPTIONAL OVERRIDE layer: a row
# force-allows a write the heuristic would block, or force-blocks a read the
# heuristic would allow. One row per (server, tool); `mode` carries which.
# ────────────────────────────────────────────────────────────────────

type EvalReplayAllowedTool {
  id: ID!
  tenantId: ID!
  serverName: String!
  toolName: String!
  # 'allow' force-allows this tool on replay; 'block' force-blocks it.
  mode: String!
  createdAt: AWSDateTime!
}

# A tenant MCP server and its discovered tools, offered to the UI so an
# operator can see each tool's auto-classification (read = auto-allowed,
# write = blocked) and add overrides. Sourced from the cached
# tenant_mcp_servers.tools discovery list (approved + enabled servers) — no
# live MCP connection is made.
type EvalReplayMcpServer {
  serverName: String!
  displayName: String!
  tools: [EvalReplayMcpTool!]!
}

type EvalReplayMcpTool {
  name: String!
  description: String
  # Heuristic access classification ('read' | 'write'). Read tools are
  # auto-allowed on replay; write tools are blocked unless force-allowed.
  access: String!
}

input OverrideEvalResultInput {
  resultId: ID!
  # 'pass' | 'fail' to set (or re-set — last write wins) an override;
  # null/omitted CLEARS an existing override, restoring the judge's
  # verdict to aggregation. Only scored results (status pass|fail) may
  # be overridden; error rows are rejected.
  overrideStatus: String
  # Required non-empty (after trim) when setting an override; ignored
  # when clearing. The overriding caller's identity is derived from the
  # authenticated context, never from input.
  reason: String
}

input StartEvalRunInput {
  # Optional model override for the direct-AgentCore eval run. Omit to use
  # Kimi K2.5; non-default overrides must be available in model_catalog.
  model: String
  # Subset of categories to run; empty = all enabled test cases for the tenant.
  categories: [String!]
  # Subset of test case IDs to run; empty = use the categories filter above.
  testCaseIds: [ID!]
  # Dataset launch (Trust Core U6): the run pins the dataset version +
  # case scope at launch and executes run-scoped copies — mid-run dataset
  # edits cannot change what the run scores. Mutually exclusive with
  # categories/testCaseIds.
  datasetSlug: String
}

# ────────────────────────────────────────────────────────────────────
# Query / Mutation extensions
# ────────────────────────────────────────────────────────────────────

extend type Query {
  evalSummary(tenantId: ID!): EvalSummary!
  evalRuns(tenantId: ID!, limit: Int, offset: Int): EvalRunsPage!
  evalRun(id: ID!): EvalRun
  evalRunResults(runId: ID!): [EvalResult!]!
  evalResultSpans(runId: ID!, testCaseId: ID!): [EvalSpan!]!
  evalTimeSeries(tenantId: ID!, days: Int): [EvalTimeSeriesPoint!]!
  evalTestCases(
    tenantId: ID!
    category: String
    search: String
    # Restrict to the index rows of one dataset (live + tombstoned).
    datasetId: ID
  ): [EvalTestCase!]!
  evalTestCase(id: ID!): EvalTestCase
  evalTestCaseHistory(testCaseId: ID!, limit: Int): [EvalResult!]!
  # Datasets (Trust Core U4). Default listing hides archived datasets;
  # pass includeArchived to see them (history stays intact either way).
  evalDatasets(tenantId: ID!, includeArchived: Boolean): [EvalDataset!]!
  # Single-dataset read. Drift-checks the index manifestSha against S3
  # and re-syncs on mismatch before returning the row.
  evalDataset(tenantId: ID!, slug: String!): EvalDataset
  # MCP replay tool overrides (Trust Core U14). Operator-readable; scoped
  # through resolveCallerTenantId. Default-allow heuristic: an empty list
  # still runs read-shaped tools on replay. Each entry force-allows a write
  # or force-blocks a read.
  evalReplayToolAllowlist(tenantId: ID!): [EvalReplayAllowedTool!]!
  # The tenant's available MCP servers + discovered tools, each annotated
  # with its heuristic access classification (read = auto-allowed, write =
  # blocked) so the UI can show what runs on replay by default. Sourced from
  # the cached tenant_mcp_servers.tools list (approved + enabled servers); no
  # live MCP discovery.
  evalReplayAvailableMcpTools(tenantId: ID!): [EvalReplayMcpServer!]!
}

extend type Mutation {
  startEvalRun(tenantId: ID!, input: StartEvalRunInput!): EvalRun!
  cancelEvalRun(id: ID!): EvalRun!
  deleteEvalRun(id: ID!): Boolean!
  createEvalTestCase(
    tenantId: ID!
    input: CreateEvalTestCaseInput!
  ): EvalTestCase!
  updateEvalTestCase(id: ID!, input: UpdateEvalTestCaseInput!): EvalTestCase!
  deleteEvalTestCase(id: ID!): Boolean!
  # Bulk-import the Thinkwork starter pack. Idempotent at the (tenant_id, name)
  # level via INSERT ON CONFLICT DO NOTHING. Returns count of new rows inserted
  # (existing rows skipped).
  seedEvalTestCases(tenantId: ID!, categories: [String!]): Int!
  # Dataset CRUD (Trust Core U4). All mutations are operator-gated, write
  # S3 first, then re-sync the derived index under an advisory lock.
  createEvalDataset(tenantId: ID!, input: CreateEvalDatasetInput!): EvalDataset!
  updateEvalDataset(
    tenantId: ID!
    slug: String!
    input: UpdateEvalDatasetInput!
  ): EvalDataset!
  # Soft archive — hides the dataset from default listings; result history
  # and index rows stay intact. Idempotent.
  archiveEvalDataset(tenantId: ID!, slug: String!): EvalDataset!
  addEvalDatasetCase(
    tenantId: ID!
    datasetSlug: String!
    input: EvalDatasetCaseInput!
  ): EvalTestCase!
  updateEvalDatasetCase(
    tenantId: ID!
    datasetSlug: String!
    caseId: String!
    input: UpdateEvalDatasetCaseInput!
  ): EvalTestCase!
  # Case removal = manifest tombstone + enabled=false on the index row
  # (never a row delete — historical results FK the case); the S3 case
  # payload object IS deleted. Returns the updated dataset.
  removeEvalDatasetCase(
    tenantId: ID!
    datasetSlug: String!
    caseId: String!
  ): EvalDataset!
  # Flag a completed thread turn into a custom dataset (Trust Core U7).
  # Tenant is derived from the thread row (never caller input); the
  # caller must be an operator of that tenant. Copies the flag-time
  # snapshot into the dataset's S3 prefix before the case file lands.
  flagThreadForEval(input: FlagThreadForEvalInput!): FlagThreadForEvalResult!
  # Operator verdict override (Trust Core U9). Gate is row-derived
  # (result → run → tenant admin). Writing the override recomputes the
  # run summary under the run-level advisory lock, preserving the run's
  # stamped scoring_version (legacy runs recompute under legacy
  # semantics), and pushes notifyEvalRunUpdate.
  overrideEvalResult(input: OverrideEvalResultInput!): EvalResult!
  # MCP replay tool override (Trust Core U14). Operator-gated
  # (requireTenantAdmin). mode 'allow' force-allows a write the heuristic
  # blocks; mode 'block' force-blocks a read the heuristic allows. Upserts
  # on the unique (tenant, server, tool) key (re-adding with a new mode
  # updates the row).
  addEvalReplayToolOverride(
    tenantId: ID!
    serverName: String!
    toolName: String!
    mode: String!
  ): EvalReplayAllowedTool!
  # Remove an override entry by id (gate is row-derived → tenant admin).
  removeEvalReplayToolOverride(id: ID!): Boolean!
}
