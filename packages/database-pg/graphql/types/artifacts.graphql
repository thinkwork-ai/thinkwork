# Artifacts: durable, markdown-first agent output.

type Artifact {
  id: ID!
  tenantId: ID!
  agentId: ID
  threadId: ID
  title: String!
  type: ArtifactType!
  status: ArtifactStatus!
  content: String
  s3Key: String
  summary: String
  sourceMessageId: ID
  metadata: AWSJSON
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type DashboardArtifact {
  artifact: Artifact!
  manifest: AWSJSON!
  latestRefreshTask: ComputerTask
  canRefresh: Boolean!
}

type DashboardRefreshResult {
  artifact: Artifact!
  task: ComputerTask!
  idempotencyKey: String!
}

type Applet {
  artifact: Artifact!
  appId: ID!
  name: String!
  version: Int!
  source: String!
  sourceKey: String!
  metadata: AWSJSON!
}

type AppletPayload {
  applet: Applet!
}

type AppletState {
  appId: ID!
  state: AWSJSON
  updatedAt: AWSDateTime!
}

enum ArtifactType {
  DATA_VIEW
  APPLET
  APPLET_STATE
  NOTE
  REPORT
  PLAN
  DRAFT
  DIGEST
}

enum ArtifactStatus {
  DRAFT
  FINAL
  SUPERSEDED
}

input CreateArtifactInput {
  tenantId: ID!
  agentId: ID
  threadId: ID
  title: String!
  type: ArtifactType!
  status: ArtifactStatus
  content: String
  s3Key: String
  summary: String
  sourceMessageId: ID
  metadata: AWSJSON
}

input UpdateArtifactInput {
  title: String
  type: ArtifactType
  status: ArtifactStatus
  content: String
  s3Key: String
  summary: String
  metadata: AWSJSON
}

input SaveAppletInput {
  tenantId: ID!
  appId: ID!
  name: String!
  version: Int!
  threadId: ID
  agentId: ID
  source: String!
  metadata: AWSJSON
}

input SaveAppletStateInput {
  tenantId: ID!
  appId: ID!
  state: AWSJSON
}

extend type Query {
  artifacts(tenantId: ID!, threadId: ID, agentId: ID, type: ArtifactType, status: ArtifactStatus, limit: Int, cursor: String): [Artifact!]!
  artifact(id: ID!): Artifact
  dashboardArtifact(id: ID!): DashboardArtifact
  applet(id: ID!): AppletPayload
  appletState(tenantId: ID!, appId: ID!): AppletState
}

extend type Mutation {
  createArtifact(input: CreateArtifactInput!): Artifact!
  updateArtifact(id: ID!, input: UpdateArtifactInput!): Artifact!
  deleteArtifact(id: ID!): Boolean!
  refreshDashboardArtifact(id: ID!): DashboardRefreshResult!
  saveApplet(input: SaveAppletInput!): AppletPayload!
  saveAppletState(input: SaveAppletStateInput!): AppletState!
}
