slug: frame
display_name: Frame
description: Restate a problem in a structured way before gathering data. Returns goal, constraints, known unknowns, and decision criteria so downstream steps have a clean target. Sub-skill — invoked via the Skill meta-tool by deliverable-shape skills, not intended for direct chat use.
category: workflow
version: "0.1.0"
author: thinkwork
icon: target
tags: [primitive, framing, sub-skill]
execution: context
mode: tool

# Sub-skill: this skill is designed to be invoked via the Skill meta-tool
# by a parent deliverable-shape skill, not picked up ad hoc from chat.
# Admins should not enable `frame` as a direct agent tool.
invocable_from: sub_skill

inputs:
  problem:
    type: string
    required: true
  context:
    type: string
    required: false

# Named string downstream sub-skills look up when referencing frame's output.
output: framed
