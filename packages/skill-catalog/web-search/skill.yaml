slug: web-search
display_name: Web Search
description: Search the web, read pages, and research companies. Provider-agnostic — backed by Exa or SerpAPI depending on tenant configuration. Use when the user needs current information, wants to look something up, or asks about a company.
category: research
version: "1.2.0"
author: thinkwork
icon: search
tags: [search, web, research, exa, serpapi]
execution: script
is_default: false
scripts:
  - name: web_search
    path: scripts/search.py
    description: "Search the web for current information"
  - name: web_read
    path: scripts/search.py
    description: "Read the full text content of web pages"
  - name: company_research
    path: scripts/search.py
    description: "Research a company — profile, news, people, databases"
triggers:
  - "search the web"
  - "look up"
  - "research"
  - "find information"
  - "what is"
requires_env:
  - WEB_SEARCH_PROVIDER
  - EXA_API_KEY
  - SERPAPI_KEY
