id: renewal-prep
version: 2
execution: context
mode: tool
name: "Renewal Prep"
description: >
  Prep a customer renewal conversation. Pulls contract terms, recent
  usage, support posture, renewal history, and win/loss signals, then
  renders a renewal_risk brief ordered by deal-impact likelihood.

# Agent-driven deliverable: the model drives the frame → gather →
# synthesize → package sequence itself via the Skill() meta-tool (U5
# session allowlist). Pattern mirrors sales-prep + account-health-
# review — same four phases with a risk-steered synthesize and a
# renewal-specific gather set (contract + usage + renewal history +
# AR + NPS + tickets). Focus hard-coded at "risks".

inputs:
  customer:
    type: string
    required: true
    resolver: resolve_customer
    on_missing_input: ask
  renewal_date:
    type: date
    required: true
    on_missing_input: ask
  contract_value:
    type: string
    required: false

tenant_overridable:
  - triggers.schedule.expression

triggers:
  chat_intent:
    examples:
      - "prep for {customer} renewal"
      - "renewal brief for {customer}"
      - "{customer} renewal risk"
    disambiguation: ask
  schedule:
    # Daily 07:00 scan — fires for any account with a renewal in the next
    # 60 days, per the scheduled-jobs row's from_tenant_config bindings.
    type: cron
    expression: "0 7 * * ? *"
    bindings:
      customer:
        from_tenant_config: upcoming_renewal_customer
      renewal_date:
        from_tenant_config: upcoming_renewal_date

# Sub-skills the model invokes via Skill(). Template-scoped
# session_allowlist (U5) auto-includes these when renewal-prep is
# assigned to a template. Connector skills (contract, product-usage,
# renewal-history, AR, NPS, support-incidents) ship in separate PRDs;
# missing sub-skills degrade gracefully per SKILL.md body's policy.
requires_skills:
  - frame
  - synthesize
  - package
