id: renewal-prep
version: 2
execution: context
name: "Renewal Prep"
description: >
  Prep a customer renewal conversation. Pulls contract terms, recent
  usage, support posture, renewal history, and win/loss signals, then
  renders a renewal_risk brief ordered by deal-impact likelihood.

# Context skill — the model reads SKILL.md and drives the four phases
# (frame → gather → synthesize → package) inline with a risk-steered
# synthesize and renewal-specific gather (contract + usage + renewal
# history + AR + NPS + tickets). Focus hard-coded at "risks".

inputs:
  customer:
    type: string
    required: true
    resolver: resolve_customer
    on_missing_input: ask
  renewal_date:
    type: date
    required: true
    on_missing_input: ask
  contract_value:
    type: string
    required: false

tenant_overridable:
  - triggers.schedule.expression

triggers:
  chat_intent:
    examples:
      - "prep for {customer} renewal"
      - "renewal brief for {customer}"
      - "{customer} renewal risk"
    disambiguation: ask
  schedule:
    # Daily 07:00 scan — fires for any account with a renewal in the next
    # 60 days, per the scheduled-jobs row's from_tenant_config bindings.
    type: cron
    expression: "0 7 * * ? *"
    bindings:
      customer:
        from_tenant_config: upcoming_renewal_customer
      renewal_date:
        from_tenant_config: upcoming_renewal_date

# Real registered tools this skill depends on at runtime. Connector
# skills (contract, product-usage, renewal-history, AR, NPS,
# support-incidents) ship in separate PRDs; missing connectors degrade
# gracefully per SKILL.md.
requires_skills:
  - package
