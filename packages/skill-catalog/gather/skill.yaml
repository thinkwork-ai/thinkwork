slug: gather
display_name: Gather (parallel-fan-out guidance)
description: >
  Authoring guidance for parallel sub-skill invocation inside
  agent-driven skills. Not a runtime primitive — the post-U8 runtime
  relies on the model invoking Skill() calls independently; this
  catalog entry documents the pattern for skill authors and gives the
  model a canonical description to cite when a skill's SKILL.md says
  "gather in parallel."
category: workflow
version: "1.0.0"
author: thinkwork
icon: layers
tags: [primitive, parallel, fan-out, guidance]

# Authoring guidance shipped as a context skill — the SKILL.md body
# documents how skill authors describe parallel fan-out patterns for
# model-driven execution. No runtime primitive of its own.
execution: context
mode: tool

# Not a standalone chat anchor — the model encounters this skill as a
# referenced sub-skill in other SKILL.md bodies (sales-prep,
# account-health-review, renewal-prep). No chat_intent, no schedule,
# no webhook triggers.
triggers: {}

# No sub-skills of its own — this is descriptive content, not an
# orchestrator.
requires_skills: []

# Admin discoverability only. If an admin accidentally enables gather
# as a direct agent tool, the skill registry surfaces this message
# rather than loading an empty Skill() invocation.
standalone_invocation_error: >
  The `gather` catalog entry is authoring guidance, not a runnable
  skill. It describes the parallel fan-out pattern other skills
  reference from their SKILL.md bodies. To use the pattern, invoke
  each sub-skill in its own `Skill(...)` call; the runtime handles
  concurrency.
