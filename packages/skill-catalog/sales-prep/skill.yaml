id: sales-prep
version: 2
execution: context
mode: tool
name: "Prep for Meeting"
description: >
  Gather account context, financials, activity, and external signals for a
  sales meeting. Produces a packaged brief the rep can read in 60 seconds.

# U8 migration (plan §U8, 2026-04-24): converted from execution:composition
# → execution:context. The model drives the frame → gather → synthesize →
# package sequence itself via the Skill() meta-tool (U5 session allowlist),
# replacing composition_runner. Pattern:
#   Skill("frame", ...)          — restate goal
#   Skill("web-search", ...) etc — parallel gather, model judges failures
#   Skill("synthesize", ...)     — four-section analysis
#   Skill("package", ...)        — deterministic template render
# The SKILL.md body describes the sequencing rules + graceful-degradation
# policy the model must follow. See U4 skill dispatcher + U5 Skill tool.

# Typed inputs — the dispatcher / scheduled job / admin catalog resolves
# values into these shapes before calling startSkillRun.
inputs:
  customer:
    type: string
    required: true
    resolver: resolve_customer
    on_missing_input: ask
  meeting_date:
    type: date
    required: true
    on_missing_input: ask
  focus:
    type: enum
    values: [financial, expansion, risks, general]
    default: general

# Tenants can override these paths via agent_skills.config without touching
# the canonical YAML. Everything else stays as authored.
tenant_overridable:
  - inputs.focus.default
  - triggers.schedule.expression

triggers:
  chat_intent:
    examples:
      - "prep me for {customer}"
      - "brief me on {customer}"
      - "sales prep for {customer}"
      - "get me ready for the {customer} meeting"
    disambiguation: ask
  schedule:
    type: cron
    # Weekday afternoons — the default is a sensible baseline; tenants override.
    expression: "0 14 ? * MON-FRI *"
    bindings:
      customer:
        from_tenant_config: default_customer
      meeting_date:
        today_plus_N: 1

# Sub-skills the model invokes via Skill(). Ship as an explicit
# allowlist so template-scoped session_allowlist (U5) can include them
# automatically when sales-prep is assigned to a template.
requires_skills:
  - frame
  - synthesize
  - package
  - web-search
  # CRM / AR / support-incidents / wiki skills ship in separate PRDs;
  # missing sub-skills degrade gracefully per SKILL.md body's policy.
