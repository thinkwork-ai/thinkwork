id: sales-prep
version: 2
execution: context
name: "Prep for Meeting"
description: >
  Gather account context, financials, activity, and external signals for a
  sales meeting. Produces a packaged brief the rep can read in 60 seconds.

# Context skill — the model reads SKILL.md and drives the four phases
# (frame → gather → synthesize → package) inline, calling real registered
# tools (web-search, render_package, connector scripts). SKILL.md
# governs sequencing and graceful-degradation policy.

# Typed inputs — the dispatcher / scheduled job / admin catalog resolves
# values into these shapes before calling startSkillRun.
inputs:
  customer:
    type: string
    required: true
    resolver: resolve_customer
    on_missing_input: ask
  meeting_date:
    type: date
    required: true
    on_missing_input: ask
  focus:
    type: enum
    values: [financial, expansion, risks, general]
    default: general

# Tenants can override these paths via agent_skills.config without touching
# the canonical YAML. Everything else stays as authored.
tenant_overridable:
  - inputs.focus.default
  - triggers.schedule.expression

triggers:
  chat_intent:
    examples:
      - "prep me for {customer}"
      - "brief me on {customer}"
      - "sales prep for {customer}"
      - "get me ready for the {customer} meeting"
    disambiguation: ask
  schedule:
    type: cron
    # Weekday afternoons — the default is a sensible baseline; tenants override.
    expression: "0 14 ? * MON-FRI *"
    bindings:
      customer:
        from_tenant_config: default_customer
      meeting_date:
        today_plus_N: 1

# Real registered tools this skill depends on at runtime. Listed so the
# template session_allowlist auto-includes them when sales-prep is
# assigned. Framing + synthesis happen inline per SKILL.md; CRM / AR /
# support-incidents / wiki connectors ship in separate PRDs and degrade
# gracefully per SKILL.md's policy when absent.
requires_skills:
  - package
  - web-search
