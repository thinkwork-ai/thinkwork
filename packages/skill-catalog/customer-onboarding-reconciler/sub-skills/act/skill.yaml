slug: customer-onboarding-reconciler/act
display_name: Customer Onboarding — Act
description: >
  Agent-mode sub-skill. Given the gap analysis and existing tasks, decides
  what tasks to create this tick. MUST NOT wait for human input — read
  state, create missing tasks, exit. HITL happens between ticks, not
  inside one.
category: composable-primitive
version: "0.1.0"
author: thinkwork
execution: context
mode: agent
invocable_from: composition

inputs:
  customerId:
    type: string
    required: true
  opportunityId:
    type: string
    required: true
  gap_analysis:
    type: string
    required: true
  existing_tasks:
    type: string
    required: false

output: action_summary
