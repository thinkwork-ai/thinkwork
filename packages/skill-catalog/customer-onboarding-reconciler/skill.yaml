id: customer-onboarding-reconciler
version: 2
execution: context
name: "Customer Onboarding (Reconciler)"
description: >
  Drive a new customer from deal-close to onboarded by continuously
  reconciling desired state against actual state. Invoked via webhook on
  opportunity-won and re-invoked on task completions. Never blocks waiting
  for human input — each tick reads current state, creates the tasks that
  are still missing, and exits. HITL happens between ticks, not inside a
  single invocation.

# Context skill with reconciler semantics — the model reads SKILL.md and
# drives the gather → synthesize → act tick inline, failing fast on
# missing critical gather. No delivery fan-out, no one-shot package step.

# Typed inputs — the resolver converts slugs to ids; the reconciler only
# needs the stable customer / opportunity identifiers.
inputs:
  customerId:
    type: string
    required: true
  opportunityId:
    type: string
    required: true

# v1 tenants cannot override the reconciler body without touching the
# canonical YAML. Future units may open this up via the checklist.
tenant_overridable: []

# The reconciler shape's triggers are primarily webhook-driven. chat_intent
# is present so an admin can force a tick from the catalog UI, but scheduled
# invocation is not in v1 — reconciliation is event-driven on task close.
triggers:
  chat_intent:
    examples:
      - "reconcile onboarding for {customer}"
      - "kick onboarding for {customer}"
    disambiguation: ask
  webhook:
    examples:
      - source: crm
        event: opportunity.won
        when: "Opportunity stage transitions to Closed Won"
      - source: task-system
        event: task.completed
        when: "A task spawned by a prior tick gets marked done"

# No hard runtime dependencies — gap analysis happens inline per
# SKILL.md. The CRM + lastmile_tasks_* connectors ship in separate PRDs;
# the critical-fail policy in SKILL.md governs availability requirements.
requires_skills: []
