slug: lastmile-tasks
display_name: LastMile Tasks
description: Propose LastMile task creation for user approval, and enumerate terminals to pick one. Invoked when a user wants to create a task that should sync to LastMile — the agent gathers title + terminal, then proposes the create for user confirmation via an inbox item.
category: task-management
version: "1.0.0"
author: thinkwork
icon: clipboard-list
tags: [tasks, lastmile, external, approval]
execution: script
is_default: false
scripts:
  - name: list_terminals
    path: scripts/tasks.py
    description: "List the current user's LastMile terminals so the agent can resolve a terminal from free-form intent. Returns [{id, name, externalId, abbv, city, state}]."
  - name: propose_task_create
    path: scripts/tasks.py
    description: "Propose creating a LastMile task for the user to approve. Creates an inbox item with type='create_task'; the user taps Approve on mobile and the actual POST /tasks fires deterministically. Requires title + terminalId. Call list_terminals first when the terminal isn't obvious from the conversation."
triggers:
  - "create a task in lastmile"
  - "send this to lastmile"
  - "make a ticket"
  - "file a task"
requires_env:
  - THINKWORK_API_URL
  - THINKWORK_API_SECRET
  - AGENT_ID
  - TENANT_ID
  - CURRENT_THREAD_ID
