slug: thinkwork-admin
display_name: ThinkWork Admin
description: >
  Drive the ThinkWork platform — create agents, templates, teams, and members.
  Admin / owner role required; every operation is gated per-agent at the
  resolver via agent_skills.permissions.operations.
category: platform
version: "0.3.0"
author: thinkwork
icon: shield
tags: [admin, platform, onboarding]
execution: script
mode: tool
is_default: false

requires_env:
  - THINKWORK_API_URL
  - THINKWORK_API_SECRET
  - TENANT_ID
  - AGENT_ID
  - CURRENT_USER_ID

# Unit 7 ships the default-enabled read surface. Every read is gated
# wrapper-side by `_check_admin_role` and resolver-side by the underlying
# query's auth — a member-role agent can't read through this skill even
# if an admin accidentally assigns it. Mutations land in Unit 8.
scripts:
  - name: me
    path: scripts/operations/reads.py
    description: "Return the current caller's User record."
    default_enabled: true
  - name: get_tenant
    path: scripts/operations/reads.py
    description: "Fetch a tenant by id."
    default_enabled: true
  - name: get_tenant_by_slug
    path: scripts/operations/reads.py
    description: "Fetch a tenant by slug — common onboarding lookup."
    default_enabled: true
  - name: get_user
    path: scripts/operations/reads.py
    description: "Fetch a user by id."
    default_enabled: true
  - name: list_tenant_members
    path: scripts/operations/reads.py
    description: "List every tenant_members row for a tenant with role + status."
    default_enabled: true
  - name: list_agents
    path: scripts/operations/reads.py
    description: "List agents in a tenant, optionally filtered by status/type."
    default_enabled: true
  - name: get_agent
    path: scripts/operations/reads.py
    description: "Fetch an agent by id."
    default_enabled: true
  - name: list_all_tenant_agents
    path: scripts/operations/reads.py
    description: "Full unfiltered agent inventory for reconciler-style flows."
    default_enabled: true
  - name: list_templates
    path: scripts/operations/reads.py
    description: "List agent templates for a tenant."
    default_enabled: true
  - name: get_template
    path: scripts/operations/reads.py
    description: "Fetch an agent template by id."
    default_enabled: true
  - name: list_linked_agents_for_template
    path: scripts/operations/reads.py
    description: "List agents linked to a template — feeds template-sync recipes."
    default_enabled: true
  - name: list_teams
    path: scripts/operations/reads.py
    description: "List teams in a tenant."
    default_enabled: true
  - name: get_team
    path: scripts/operations/reads.py
    description: "Fetch a team by id."
    default_enabled: true
  - name: list_artifacts
    path: scripts/operations/reads.py
    description: "List artifacts filterable by thread/agent/type/status."
    default_enabled: true
  - name: get_artifact
    path: scripts/operations/reads.py
    description: "Fetch an artifact by id."
    default_enabled: true

  # Unit 8 mutations. default_enabled flags follow the plan's inventory
  # table — opt-in for operations with tenant-wide blast radius. Admins
  # extend per-agent via agent_skills.permissions.operations to allow
  # opt-in ops for a specific agent.
  - name: update_tenant
    path: scripts/operations/tenants.py
    description: "Update tenant name, plan, or issue prefix."
    default_enabled: true
  - name: add_tenant_member
    path: scripts/operations/tenants.py
    description: "Add an existing user or agent to tenant_members."
    default_enabled: true
  - name: update_tenant_member
    path: scripts/operations/tenants.py
    description: "Change a member's role or status. Last-owner guard enforced server-side."
    default_enabled: true
  - name: remove_tenant_member
    path: scripts/operations/tenants.py
    description: "Hard-delete a tenant member (OPT-IN — destructive)."
    default_enabled: false
  - name: invite_member
    path: scripts/operations/tenants.py
    description: "Invite a new user by email — creates Cognito user + member row."
    default_enabled: true
  - name: create_team
    path: scripts/operations/teams.py
    description: "Create a team in a tenant."
    default_enabled: true
  - name: add_team_agent
    path: scripts/operations/teams.py
    description: "Add an agent to a team."
    default_enabled: true
  - name: add_team_user
    path: scripts/operations/teams.py
    description: "Add a user to a team."
    default_enabled: true
  - name: remove_team_agent
    path: scripts/operations/teams.py
    description: "Remove an agent from a team (OPT-IN)."
    default_enabled: false
  - name: remove_team_user
    path: scripts/operations/teams.py
    description: "Remove a user from a team (OPT-IN)."
    default_enabled: false
  - name: create_agent
    path: scripts/operations/agents.py
    description: "Create a new agent, optionally linked to a template."
    default_enabled: true
  - name: set_agent_skills
    path: scripts/operations/agents.py
    description: "Replace the full agent_skills set for an agent."
    default_enabled: true
  - name: set_agent_capabilities
    path: scripts/operations/agents.py
    description: "Replace the agent_capabilities set for an agent."
    default_enabled: true
  - name: create_agent_template
    path: scripts/operations/templates.py
    description: "Create an agent template."
    default_enabled: true
  - name: create_agent_from_template
    path: scripts/operations/templates.py
    description: "Instantiate an agent from a template."
    default_enabled: true
  - name: sync_template_to_agent
    path: scripts/operations/templates.py
    description: "Sync one linked agent to its template."
    default_enabled: true
  - name: sync_template_to_all_agents
    path: scripts/operations/templates.py
    description: "Sync every linked agent to a template (OPT-IN — tenant-wide blast)."
    default_enabled: false
  - name: accept_template_update
    path: scripts/operations/templates.py
    description: "Advance an agent's pinned hash for a guardrail-class file."
    default_enabled: true
