id: smoke-package-only
version: 1
execution: composition
mode: tool
name: "Smoke: Package Only"
description: >
  End-to-end smoke for the composable-skill dispatch path. A one-step
  composition that calls the deterministic `package` script skill, no
  LLM, no external connectors. Exists solely so that a `/api/skills/start`
  + agentcore run → `skill_runs.status='complete'` transition can be
  proved end-to-end against the deployed stack.

inputs:
  synthesis:
    type: string
    required: true
  format:
    type: enum
    values: [sales_brief, health_report, renewal_risk]
    default: sales_brief

delivery:
  - chat

budget_cap:
  tokens: 1000

steps:
  - id: render
    mode: sequential
    skill: package
    inputs:
      synthesis: "{synthesis}"
      format: "{format}"
    output: deliverable
