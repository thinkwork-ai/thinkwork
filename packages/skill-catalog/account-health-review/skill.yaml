id: account-health-review
version: 1
execution: composition
mode: tool
name: "Account Health Review"
description: >
  Periodic review of a customer account's health signals — engagement,
  usage, support load, financial posture. Produces a health report CSMs
  and AEs can skim ahead of a standing check-in.

inputs:
  customer:
    type: string
    required: true
    resolver: resolve_customer
    on_missing_input: ask
  period:
    type: enum
    values: [last_30_days, last_quarter, last_year]
    default: last_30_days
  agent_name:
    type: string
    required: false

tenant_overridable:
  - inputs.period.default
  - triggers.schedule.expression

triggers:
  chat_intent:
    examples:
      - "review {customer}"
      - "account health for {customer}"
      - "how is {customer} doing"
      - "check on {customer}"
    disambiguation: ask
  schedule:
    # Weekly, Monday mornings — CSMs catch up before standing meetings.
    type: cron
    expression: "0 9 ? * MON *"
    bindings:
      customer:
        from_tenant_config: default_customer
      period:
        literal: last_30_days

delivery:
  - chat
  - email

budget_cap:
  tokens: 100000

steps:
  - id: frame
    mode: sequential
    skill: frame
    inputs:
      problem: "Account health review for {customer} over {period}."
    output: framed

  - id: gather
    mode: parallel
    on_branch_failure: continue_with_footer
    branches:
      - id: crm
        skill: crm_account_summary
        inputs:
          customer: "{customer}"
          period: "{period}"
        critical: true
      - id: usage
        skill: product_usage_summary
        inputs:
          customer: "{customer}"
          period: "{period}"
      - id: ar
        skill: ar_summary
        inputs:
          customer: "{customer}"
      - id: tickets
        skill: support_incidents_summary
        inputs:
          customer: "{customer}"
          period: "{period}"
      - id: engagement
        skill: engagement_summary
        inputs:
          customer: "{customer}"
          period: "{period}"
    output: gathered

  - id: synthesize
    mode: sequential
    skill: synthesize
    inputs:
      framed: "{framed}"
      gathered: "{gathered}"
      focus: risks
    output: synthesis

  - id: package
    mode: sequential
    skill: package
    inputs:
      synthesis: "{synthesis}"
      format: health_report
    output: deliverable
