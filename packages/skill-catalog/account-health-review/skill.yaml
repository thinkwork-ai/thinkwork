id: account-health-review
version: 2
execution: context
name: "Account Health Review"
description: >
  Periodic review of a customer account's health signals — engagement,
  usage, support load, financial posture. Produces a health report CSMs
  and AEs can skim ahead of a standing check-in.

# Context skill — the model reads SKILL.md and drives the four phases
# (frame → gather → synthesize → package) inline, mirroring sales-prep
# with a risk-steered synthesize + product/engagement gather set.

inputs:
  customer:
    type: string
    required: true
    resolver: resolve_customer
    on_missing_input: ask
  period:
    type: enum
    values: [last_30_days, last_quarter, last_year]
    default: last_30_days
  agent_name:
    type: string
    required: false

tenant_overridable:
  - inputs.period.default
  - triggers.schedule.expression

triggers:
  chat_intent:
    examples:
      - "review {customer}"
      - "account health for {customer}"
      - "how is {customer} doing"
      - "check on {customer}"
    disambiguation: ask
  schedule:
    # Weekly, Monday mornings — CSMs catch up before standing meetings.
    type: cron
    expression: "0 9 ? * MON *"
    bindings:
      customer:
        from_tenant_config: default_customer
      period:
        literal: last_30_days

# Real registered tools this skill depends on at runtime. CRM / AR /
# support-incidents / product-usage / engagement connectors ship in
# separate PRDs; missing connectors degrade gracefully per SKILL.md.
requires_skills:
  - package
