id: account-health-review
version: 2
execution: context
mode: tool
name: "Account Health Review"
description: >
  Periodic review of a customer account's health signals — engagement,
  usage, support load, financial posture. Produces a health report CSMs
  and AEs can skim ahead of a standing check-in.

# Agent-driven deliverable: the model drives the frame → gather →
# synthesize → package sequence itself via the Skill() meta-tool (U5
# session allowlist). Pattern mirrors sales-prep — same four phases
# with a risk-steered synthesize + product/engagement gather set.

inputs:
  customer:
    type: string
    required: true
    resolver: resolve_customer
    on_missing_input: ask
  period:
    type: enum
    values: [last_30_days, last_quarter, last_year]
    default: last_30_days
  agent_name:
    type: string
    required: false

tenant_overridable:
  - inputs.period.default
  - triggers.schedule.expression

triggers:
  chat_intent:
    examples:
      - "review {customer}"
      - "account health for {customer}"
      - "how is {customer} doing"
      - "check on {customer}"
    disambiguation: ask
  schedule:
    # Weekly, Monday mornings — CSMs catch up before standing meetings.
    type: cron
    expression: "0 9 ? * MON *"
    bindings:
      customer:
        from_tenant_config: default_customer
      period:
        literal: last_30_days

# Sub-skills the model invokes via Skill(). Template-scoped
# session_allowlist (U5) auto-includes these when account-health-review
# is assigned to a template. CRM / AR / support-incidents / product-usage /
# engagement skills ship in separate PRDs; missing sub-skills degrade
# gracefully per SKILL.md body's policy.
requires_skills:
  - frame
  - synthesize
  - package
