name: Release Desktop

on:
  push:
    tags:
      - "desktop-v*"

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  STAGE: dev

jobs:
  build-sign-notarize-publish:
    name: Build, sign, notarize, and publish
    runs-on: macos-14
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Preflight desktop release secrets
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          missing=()
          for name in \
            APPLE_API_KEY_ID \
            APPLE_API_KEY_ISSUER \
            APPLE_API_KEY_P8_BASE64 \
            APPLE_TEAM_ID \
            MAC_CSC_LINK \
            MAC_CSC_KEY_PASSWORD \
            AWS_ACCESS_KEY_ID \
            AWS_SECRET_ACCESS_KEY
          do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required desktop release secrets:\n' >&2
            printf '  %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Initialize Terraform outputs
        working-directory: terraform/examples/greenfield
        run: |
          terraform init -input=false
          terraform workspace select "${STAGE}"

      - name: Write App Store Connect API key
        id: apple-key
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$key_path"
          chmod 600 "$key_path"
          echo "path=$key_path" >> "$GITHUB_OUTPUT"

      - name: Build and publish desktop release
        env:
          APPLE_API_KEY: ${{ steps.apple-key.outputs.path }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/build-desktop.sh "${STAGE}" --publish always

      - name: Build desktop SHA-256 manifest
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#desktop-v}"
          mkdir -p dist/desktop-sha256
          sha_file="dist/desktop-sha256/${version}.sha256"
          : > "$sha_file"
          dmg_count=0
          while IFS= read -r dmg_path; do
            shasum -a 256 "$dmg_path" >> "$sha_file"
            dmg_count=$((dmg_count + 1))
          done < <(find apps/desktop/dist -maxdepth 1 -name '*.dmg' -print | sort)
          if [ "$dmg_count" -eq 0 ]; then
            echo "No desktop DMG artifacts found in apps/desktop/dist" >&2
            exit 1
          fi

      - name: Publish desktop SHA-256 mirror
        env:
          DESKTOP_SHA256_MIRROR_TOKEN: ${{ secrets.DESKTOP_SHA256_MIRROR_TOKEN }}
          DESKTOP_SHA256_MIRROR_URL: ${{ secrets.DESKTOP_SHA256_MIRROR_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DESKTOP_SHA256_MIRROR_TOKEN:-}" ] || [ -z "${DESKTOP_SHA256_MIRROR_URL:-}" ]; then
            echo "Skipping SHA-256 mirror upload; DESKTOP_SHA256_MIRROR_URL/TOKEN are not configured."
            exit 0
          fi
          version="${GITHUB_REF_NAME#desktop-v}"
          sha_file="dist/desktop-sha256/${version}.sha256"
          curl -fsS \
            -X PUT \
            -H "Authorization: Bearer ${DESKTOP_SHA256_MIRROR_TOKEN}" \
            -H "Content-Type: text/plain" \
            --data-binary "@${sha_file}" \
            "${DESKTOP_SHA256_MIRROR_URL%/}/${version}.sha256"

      - name: Upload SHA-256 mirror artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-dmg-sha256
          path: dist/desktop-sha256/*.sha256
          retention-days: 30
