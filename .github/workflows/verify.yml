name: Verify

# Manual + scheduled verification of the deployed dev stack. Split out
# of deploy.yml so push-to-main does not create dev threads or run
# smokes implicitly. Trigger smokes deliberately via
# `gh workflow run verify.yml -f run_smokes=true`, or run the workflow
# with the default input for the nightly-style drift-only verification.

on:
  workflow_dispatch:
    inputs:
      run_smokes:
        description: "Run the four smoke jobs against dev"
        type: boolean
        default: false
  schedule:
    # 06:00 UTC daily — drift-check only; smokes do not run on schedule.
    - cron: "0 6 * * *"

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  STAGE: dev
  THINKWORK_PLATFORM_OPERATOR_EMAILS: ${{ vars.THINKWORK_PLATFORM_OPERATOR_EMAILS || 'eric@thinkwork.ai' }}

jobs:
  # ── Pi agent smoke ────────────────────────────────────────────
  # End-to-end check that the Pi AgentCore runtime responds to a real
  # invoke and the response includes a USER.md fingerprint. Catches LWA
  # routing, Bedrock IAM, Sonnet 4.5 inference-profile prefix, and the
  # missing workspace prompt loader class of bugs.
  #
  # Scope: dev only (uses Marco's tenant + agent IDs). Other stages
  # would need SMOKE_* env vars set; the wrapper script refuses to
  # run when STAGE != dev without those overrides.
  pi-smoke-test:
    name: Pi Smoke Test
    # Stage gating lives in the wrapper script, not the job conditional —
    # per feedback_gha_env_context_job_if, `if: env.X` at job-level silently
    # fails the entire workflow.
    if: github.event_name == 'workflow_dispatch' && inputs.run_smokes == true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Pi smoke
        run: bash scripts/post-deploy-smoke-pi.sh --stage ${{ env.STAGE }}

  # ── Computer thread streaming smoke ─────────────────────────────
  # Exercises the deployed Pi Computer path end-to-end:
  # blank thread creation → AppSync chunk subscription → sendMessage →
  # durable assistant persistence → completed computer_tasks row.
  spaces-thread-streaming-smoke:
    name: Computer Thread Streaming Smoke
    if: github.event_name == 'workflow_dispatch' && inputs.run_smokes == true
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install psql + jq
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client jq

      - name: Run Computer thread streaming smoke
        run: bash scripts/smoke-web.sh --stage ${{ env.STAGE }} --region ${{ env.AWS_REGION }}

  # ── Compliance Anchor smoke ─────────────────────────────────────
  # Invokes both the anchor Lambda and the watchdog Lambda, asserting
  # the dispatch-pin response payloads:
  #   compliance-anchor          → {dispatched: true, anchored: false, ...}
  #   compliance-anchor-watchdog → {mode: "inert", ...}
  compliance-anchor-smoke:
    name: Compliance Anchor Smoke
    if: github.event_name == 'workflow_dispatch' && inputs.run_smokes == true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run compliance-anchor smoke
        run: bash scripts/post-deploy-smoke-compliance-anchor.sh --stage ${{ env.STAGE }} --region ${{ env.AWS_REGION }}

  # ── Compliance export runner smoke ──────────────────────────────
  # Invokes the runner Lambda directly with a synthesized SQS event
  # containing a non-existent UUIDv7 jobId. Exercises SQS body parse,
  # Aurora connect, and the CAS-guard SELECT/UPDATE without depending
  # on a queued job. Catches deploy regressions on env vars, IAM role
  # wiring, and the Secrets Manager fetch at boot.
  compliance-export-runner-smoke:
    name: Compliance Export Runner Smoke
    if: github.event_name == 'workflow_dispatch' && inputs.run_smokes == true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run compliance-export-runner smoke
        run: bash scripts/post-deploy-smoke-compliance-export-runner.sh --stage ${{ env.STAGE }} --region ${{ env.AWS_REGION }}

  # ── Terraform drift-check (nightly only) ────────────────────────
  # The push-time `terraform apply` runs with `-refresh=false` to skip
  # ~30s of AWS-API polling per deploy. This job is the safety net: it
  # runs once daily, refreshes state, and reports any unexpected diff
  # to $GITHUB_STEP_SUMMARY. Exits 0 even on drift — surfaces it,
  # doesn't fail the workflow.
  drift-check:
    name: Terraform Drift Check
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform/examples/greenfield
        run: |
          terraform init
          terraform workspace select ${{ env.STAGE }} || terraform workspace new ${{ env.STAGE }}

      - name: Plan with refresh and report drift
        working-directory: terraform/examples/greenfield
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || 'placeholder-not-configured' }}
          COGNEE_ENABLED_INPUT: ${{ vars.COGNEE_ENABLED || 'false' }}
          COGNEE_IMAGE_URI_INPUT: ${{ vars.COGNEE_IMAGE_URI || '' }}
          COGNEE_DB_USERNAME_INPUT: ${{ vars.COGNEE_DB_USERNAME || 'thinkwork_cognee' }}
          COGNEE_DB_NAME_INPUT: ${{ vars.COGNEE_DB_NAME || 'thinkwork_cognee' }}
          COGNEE_DB_PASSWORD_SECRET_ARN_INPUT: ${{ vars.COGNEE_DB_PASSWORD_SECRET_ARN || '' }}
          COGNEE_DB_PASSWORD_SECRET_ID_INPUT: ${{ vars.COGNEE_DB_PASSWORD_SECRET_ID || '' }}
          COGNEE_BACKEND_MODE_INPUT: ${{ vars.COGNEE_BACKEND_MODE || 'dogfood' }}
          COGNEE_DESIRED_COUNT_INPUT: ${{ vars.COGNEE_DESIRED_COUNT || '1' }}
          COGNEE_LLM_PROVIDER_INPUT: ${{ vars.COGNEE_LLM_PROVIDER || 'bedrock' }}
          COGNEE_EMBEDDING_PROVIDER_INPUT: ${{ vars.COGNEE_EMBEDDING_PROVIDER || 'bedrock' }}
          COGNEE_BEDROCK_MODEL_RESOURCE_ARNS_INPUT: ${{ vars.COGNEE_BEDROCK_MODEL_RESOURCE_ARNS || '' }}
          TWENTY_PROVISIONED_INPUT: ${{ vars.TWENTY_PROVISIONED || 'false' }}
          TWENTY_RUNTIME_ENABLED_INPUT: ${{ vars.TWENTY_RUNTIME_ENABLED || 'false' }}
          TWENTY_DESTROY_DATA_INPUT: ${{ vars.TWENTY_DESTROY_DATA || 'false' }}
          TWENTY_IMAGE_URI_INPUT: ${{ vars.TWENTY_IMAGE_URI || '' }}
          TWENTY_DB_USERNAME_INPUT: ${{ vars.TWENTY_DB_USERNAME || 'thinkwork_twenty' }}
          TWENTY_DB_NAME_INPUT: ${{ vars.TWENTY_DB_NAME || 'thinkwork_twenty' }}
          TWENTY_DB_URL_SECRET_ARN_INPUT: ${{ vars.TWENTY_DB_URL_SECRET_ARN || '' }}
          TWENTY_DB_URL_SECRET_ID_INPUT: ${{ vars.TWENTY_DB_URL_SECRET_ID || '' }}
          TWENTY_ENCRYPTION_KEY_SECRET_ARN_INPUT: ${{ vars.TWENTY_ENCRYPTION_KEY_SECRET_ARN || '' }}
          TWENTY_ENCRYPTION_KEY_SECRET_ID_INPUT: ${{ vars.TWENTY_ENCRYPTION_KEY_SECRET_ID || '' }}
          TWENTY_PUBLIC_URL_INPUT: ${{ vars.TWENTY_PUBLIC_URL || '' }}
          TWENTY_CERTIFICATE_ARN_INPUT: ${{ vars.TWENTY_CERTIFICATE_ARN || '' }}
        run: |
          # -detailed-exitcode: 0=no changes, 1=error, 2=changes detected.
          # We treat 2 (drift) as a soft signal and write a summary instead
          # of failing — operators triage manually rather than getting
          # paged by every benign drift.
          cognee_enabled=$(printf '%s' "$COGNEE_ENABLED_INPUT" | tr '[:upper:]' '[:lower:]')
          if [ "$cognee_enabled" != "true" ] && [ "$cognee_enabled" != "false" ]; then
            echo "::error::COGNEE_ENABLED must be true or false."
            exit 1
          fi

          cognee_image_uri="${COGNEE_IMAGE_URI_INPUT:-cognee/cognee@sha256:5ce7e4052b1d16738d1e24476d64847fcb5b1666631b642651e8ccce414046f8}"
          cognee_db_username="${COGNEE_DB_USERNAME_INPUT:-thinkwork_cognee}"
          cognee_db_name="${COGNEE_DB_NAME_INPUT:-thinkwork_cognee}"
          cognee_db_password_secret_id="${COGNEE_DB_PASSWORD_SECRET_ID_INPUT:-thinkwork/${STAGE}/cognee/db-credentials}"
          cognee_db_password_secret_arn="$COGNEE_DB_PASSWORD_SECRET_ARN_INPUT"
          cognee_backend_mode="${COGNEE_BACKEND_MODE_INPUT:-dogfood}"
          cognee_desired_count="${COGNEE_DESIRED_COUNT_INPUT:-1}"
          cognee_llm_provider="${COGNEE_LLM_PROVIDER_INPUT:-bedrock}"
          cognee_embedding_provider="${COGNEE_EMBEDDING_PROVIDER_INPUT:-bedrock}"
          cognee_bedrock_model_resource_arns="${COGNEE_BEDROCK_MODEL_RESOURCE_ARNS_INPUT:-[\"arn:aws:bedrock:${AWS_REGION}::foundation-model/amazon.nova-lite-v1:0\",\"arn:aws:bedrock:${AWS_REGION}::foundation-model/amazon.titan-embed-text-v2:0\"]}"
          twenty_provisioned=$(printf '%s' "$TWENTY_PROVISIONED_INPUT" | tr '[:upper:]' '[:lower:]')
          twenty_runtime_enabled=$(printf '%s' "$TWENTY_RUNTIME_ENABLED_INPUT" | tr '[:upper:]' '[:lower:]')
          twenty_destroy_data=$(printf '%s' "$TWENTY_DESTROY_DATA_INPUT" | tr '[:upper:]' '[:lower:]')
          for value_name in twenty_provisioned twenty_runtime_enabled twenty_destroy_data; do
            value="${!value_name}"
            if [ "$value" != "true" ] && [ "$value" != "false" ]; then
              echo "::error::${value_name^^} must be true or false."
              exit 1
            fi
          done
          if [ "$twenty_runtime_enabled" = "true" ] && [ "$twenty_provisioned" != "true" ]; then
            echo "::error::TWENTY_RUNTIME_ENABLED=true requires TWENTY_PROVISIONED=true."
            exit 1
          fi
          if [ "$twenty_destroy_data" = "true" ] && { [ "$twenty_provisioned" = "true" ] || [ "$twenty_runtime_enabled" = "true" ]; }; then
            echo "::error::TWENTY_DESTROY_DATA=true requires TWENTY_PROVISIONED=false and TWENTY_RUNTIME_ENABLED=false."
            exit 1
          fi
          twenty_image_uri="${TWENTY_IMAGE_URI_INPUT:-}"
          twenty_db_username="${TWENTY_DB_USERNAME_INPUT:-thinkwork_twenty}"
          twenty_db_name="${TWENTY_DB_NAME_INPUT:-thinkwork_twenty}"
          twenty_db_url_secret_id="${TWENTY_DB_URL_SECRET_ID_INPUT:-thinkwork/${STAGE}/twenty/db-url}"
          twenty_db_url_secret_arn="$TWENTY_DB_URL_SECRET_ARN_INPUT"
          twenty_encryption_key_secret_id="${TWENTY_ENCRYPTION_KEY_SECRET_ID_INPUT:-thinkwork/${STAGE}/twenty/encryption-key}"
          twenty_encryption_key_secret_arn="$TWENTY_ENCRYPTION_KEY_SECRET_ARN_INPUT"
          twenty_public_url="${TWENTY_PUBLIC_URL_INPUT:-}"
          twenty_certificate_arn="${TWENTY_CERTIFICATE_ARN_INPUT:-}"

          if [ "$cognee_enabled" = "true" ] && [ -z "$cognee_db_password_secret_arn" ]; then
            cognee_db_password_secret_arn=$(aws secretsmanager describe-secret \
              --secret-id "$cognee_db_password_secret_id" \
              --query ARN --output text 2>/dev/null || echo "")
            if [ -z "$cognee_db_password_secret_arn" ] || [ "$cognee_db_password_secret_arn" = "None" ]; then
              echo "::error::COGNEE_ENABLED=true but the Cognee DB secret does not exist yet. Run the deploy workflow once to create it."
              exit 1
            fi
          fi
          if [ "$twenty_provisioned" = "true" ]; then
            if [[ ! "$twenty_image_uri" =~ @sha256:[0-9a-f]{64}$ ]]; then
              echo "::error::TWENTY_IMAGE_URI must be pinned to an immutable sha256 digest when TWENTY_PROVISIONED=true."
              exit 1
            fi
            if [[ ! "$twenty_db_username" =~ ^[A-Za-z_][A-Za-z0-9_]{0,62}$ ]]; then
              echo "::error::TWENTY_DB_USERNAME must be a valid PostgreSQL identifier."
              exit 1
            fi
            if [[ ! "$twenty_db_name" =~ ^[A-Za-z_][A-Za-z0-9_]{0,62}$ ]] || [ "$twenty_db_name" = "thinkwork" ]; then
              echo "::error::TWENTY_DB_NAME must be a valid PostgreSQL identifier distinct from thinkwork."
              exit 1
            fi
            if [ -z "$twenty_db_url_secret_arn" ]; then
              twenty_db_url_secret_arn=$(aws secretsmanager describe-secret \
                --secret-id "$twenty_db_url_secret_id" \
                --query ARN --output text 2>/dev/null || echo "")
              if [ -z "$twenty_db_url_secret_arn" ] || [ "$twenty_db_url_secret_arn" = "None" ]; then
                echo "::error::TWENTY_PROVISIONED=true but the Twenty DB URL secret does not exist yet. Run the deploy workflow once to create it."
                exit 1
              fi
            fi
            if [ -z "$twenty_encryption_key_secret_arn" ]; then
              twenty_encryption_key_secret_arn=$(aws secretsmanager describe-secret \
                --secret-id "$twenty_encryption_key_secret_id" \
                --query ARN --output text 2>/dev/null || echo "")
              if [ -z "$twenty_encryption_key_secret_arn" ] || [ "$twenty_encryption_key_secret_arn" = "None" ]; then
                echo "::error::TWENTY_PROVISIONED=true but the Twenty encryption key secret does not exist yet. Run the deploy workflow once to create it."
                exit 1
              fi
            fi
          fi

          set +e
          terraform plan \
            -refresh=true \
            -detailed-exitcode \
            -no-color \
            -var "stage=${{ env.STAGE }}" \
            -var "region=${{ env.AWS_REGION }}" \
            -var "account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var "db_password=${{ secrets.DB_PASSWORD }}" \
            -var "database_engine=aurora-serverless" \
            -var "enable_hindsight=true" \
            -var "enable_cognee=$cognee_enabled" \
            -var "cognee_image_uri=$cognee_image_uri" \
            -var "cognee_db_username=$cognee_db_username" \
            -var "cognee_db_name=$cognee_db_name" \
            -var "cognee_db_password_secret_arn=$cognee_db_password_secret_arn" \
            -var "cognee_backend_mode=$cognee_backend_mode" \
            -var "cognee_desired_count=$cognee_desired_count" \
            -var "cognee_llm_provider=$cognee_llm_provider" \
            -var "cognee_embedding_provider=$cognee_embedding_provider" \
            -var "cognee_bedrock_model_resource_arns=$cognee_bedrock_model_resource_arns" \
            -var "twenty_provisioned=$twenty_provisioned" \
            -var "twenty_runtime_enabled=$twenty_runtime_enabled" \
            -var "twenty_image_uri=$twenty_image_uri" \
            -var "twenty_db_username=$twenty_db_username" \
            -var "twenty_db_name=$twenty_db_name" \
            -var "twenty_db_url_secret_arn=$twenty_db_url_secret_arn" \
            -var "twenty_encryption_key_secret_arn=$twenty_encryption_key_secret_arn" \
            -var "twenty_public_url=$twenty_public_url" \
            -var "twenty_certificate_arn=$twenty_certificate_arn" \
            -var "enable_workspace_orchestration=true" \
            -var "api_auth_secret=${{ secrets.API_AUTH_SECRET }}" \
            -var "mapbox_public_token=${{ secrets.MAPBOX_PUBLIC_TOKEN || '' }}" \
            -var "google_oauth_client_id=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}" \
            -var "google_oauth_client_secret=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}" \
            -var "microsoft_oauth_client_id=${{ secrets.MICROSOFT_OAUTH_CLIENT_ID || '' }}" \
            -var "microsoft_oauth_client_secret=${{ secrets.MICROSOFT_OAUTH_CLIENT_SECRET || '' }}" \
            -var "microsoft_oauth_tenant=${{ vars.MICROSOFT_OAUTH_TENANT || 'organizations' }}" \
            -var "platform_operator_emails=$THINKWORK_PLATFORM_OPERATOR_EMAILS" \
            -var "www_domain=${{ vars.WWW_DOMAIN }}" \
            -var "cloudflare_zone_id=${{ vars.CLOUDFLARE_ZONE_ID }}" \
            -var "ses_inbound_domain=agents.thinkwork.ai" \
            -var "stripe_price_ids_json=${{ vars.STRIPE_PRICE_IDS_JSON || '{}' }}" \
            -var "agentcore_code_interpreter_id=${{ vars.AGENTCORE_CODE_INTERPRETER_ID || '' }}" \
            -var "mcp_custom_domain=${{ vars.MCP_CUSTOM_DOMAIN }}" \
            -var "mcp_custom_domain_ready=${{ vars.MCP_CUSTOM_DOMAIN_READY || 'false' }}" \
            > /tmp/plan.txt 2>&1
          rc=$?
          set -e
          {
            echo "## Terraform drift check"
            echo ""
            case $rc in
              0)
                echo "✅ No drift detected — state matches AWS."
                ;;
              2)
                echo "⚠️  Drift detected. Operators: review and reconcile."
                echo ""
                echo "<details><summary>Plan output</summary>"
                echo ""
                echo '```'
                tail -c 60000 /tmp/plan.txt
                echo '```'
                echo "</details>"
                ;;
              *)
                echo "❌ Plan failed with exit code $rc — investigate."
                echo ""
                echo '```'
                tail -c 60000 /tmp/plan.txt
                echo '```'
                ;;
            esac
          } >> "$GITHUB_STEP_SUMMARY"
          # Exit 0 on drift (2); fail on real errors.
          if [ "$rc" = "1" ]; then exit 1; fi
          exit 0
