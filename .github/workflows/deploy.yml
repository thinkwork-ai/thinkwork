name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_container:
        description: "Skip container build"
        type: boolean
        default: false
      run_smokes:
        description: "Run optional post-deploy smoke tests"
        type: boolean
        default: false
      use_controller:
        description: "Start the dev deployment controller instead of direct Terraform apply"
        type: boolean
        default: false
      controller_action:
        description: "Deployment controller action"
        type: choice
        default: update
        options:
          - plan
          - deploy
          - update
      release_version:
        description: "Release version for controller mode, for example v0.1.0-canary.134"
        type: string
        default: ""
      release_manifest_url:
        description: "Release manifest URL for controller mode"
        type: string
        default: ""
      release_manifest_sha256:
        description: "Release manifest SHA-256 for controller mode"
        type: string
        default: ""

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  STAGE: dev
  THINKWORK_PLATFORM_OPERATOR_EMAILS: ${{ vars.THINKWORK_PLATFORM_OPERATOR_EMAILS || 'eric@thinkwork.ai' }}

jobs:
  # ── Detect what changed ──────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      lambdas: ${{ steps.filter.outputs.lambdas }}
      container: ${{ steps.filter.outputs.container }}
      container_source_sha: ${{ steps.container-source.outputs.sha }}
      pi_container_source_sha: ${{ steps.container-source.outputs.pi_sha }}
      runtime_container_stale: ${{ steps.runtime-image.outputs.stale }}
      terraform: ${{ steps.filter.outputs.terraform }}
      workspace_defaults: ${{ steps.filter.outputs.workspace_defaults }}
      web: ${{ steps.filter.outputs.web }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            lambdas:
              - 'packages/api/**'
              - 'packages/database-pg/**'
              # packages/lambda/ holds 15 non-api handlers (job-trigger,
              # compliance-*, agentcore-admin, github-workspace, etc.) that
              # build-lambdas.sh bundles. Without this entry, edits to any
              # of those silently skipped terraform-apply under the new gate
              # and AWS kept running stale code.
              - 'packages/lambda/**'
            container:
              - 'packages/agentcore-pi/**'
              - 'packages/agentcore/**'
              - 'packages/pi-aws/**'
              - 'packages/pi-extensions/**'
              - 'packages/pi-runtime-core/**'
              # Build config changes count as container changes — a
              # platform or base-image tweak must rebuild even if no
              # Python source moved.
              - '.github/workflows/deploy.yml'
            terraform:
              - 'terraform/**'
              - 'packages/cognee/**'
            workspace_defaults:
              - 'packages/workspace-defaults/files/**'
              # Customer Onboarding Space source files are seeded by the same
              # bootstrap handler that refreshes workspace defaults. If this
              # source changes, bootstrap must run even when canonical defaults
              # under packages/workspace-defaults/files did not move.
              - 'packages/api/src/handlers/seed-workspace-defaults.ts'
              - 'packages/api/src/lib/spaces/customer-onboarding-seed.ts'
              - 'packages/api/src/lib/spaces/customer-onboarding-source-files.ts'
            web:
              - 'apps/web/**'
            docs:
              - 'docs/**'

      - name: Latest AgentCore container source commit
        id: container-source
        run: |
          set -euo pipefail
          PI_SHA=$(git log -1 --format=%H -- \
            packages/agentcore-pi \
            packages/agentcore \
            packages/pi-aws \
            packages/pi-extensions \
            packages/pi-runtime-core \
            .github/workflows/deploy.yml)
          echo "sha=$PI_SHA" >> "$GITHUB_OUTPUT"
          echo "pi_sha=$PI_SHA" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Detect stale deployed AgentCore image
        id: runtime-image
        run: |
          set -euo pipefail
          stale=false
          check_runtime() {
            local runtime="$1"
            local source_sha="$2"
            local runtime_id
            runtime_id=$(aws ssm get-parameter \
              --name /thinkwork/${{ env.STAGE }}/agentcore/runtime-id-${runtime} \
              --region ${{ env.AWS_REGION }} \
              --query Parameter.Value --output text 2>/dev/null || echo "")
            if [ -z "$runtime_id" ] || [ "$runtime_id" = "None" ]; then
              echo "No ${runtime} runtime ID in SSM yet."
              return 0
            fi
            local image
            image=$(aws bedrock-agentcore-control get-agent-runtime \
              --region ${{ env.AWS_REGION }} \
              --agent-runtime-id "$runtime_id" \
              --query 'agentRuntimeArtifact.containerConfiguration.containerUri' \
              --output text 2>/dev/null || echo "")
            local tag="${image##*:}"
            local image_sha=""
            if [[ "$tag" =~ ([0-9a-f]{40}) ]]; then
              image_sha="${BASH_REMATCH[1]}"
            fi
            if [ -n "$image_sha" ] && git cat-file -e "${image_sha}^{commit}" 2>/dev/null && git merge-base --is-ancestor "$source_sha" "$image_sha"; then
              echo "${runtime} AgentCore runtime image $image_sha includes latest container source $source_sha."
            else
              stale=true
              echo "${runtime} AgentCore runtime image ${image_sha:-unknown} is stale; latest container source is $source_sha."
            fi
          }
          check_runtime pi "${{ steps.container-source.outputs.pi_sha }}"
          echo "stale=$stale" >> "$GITHUB_OUTPUT"

  # ── Build Lambda zips ────────────────────────────────────────────
  # Always build — TF needs the zips to keep API Gateway routes intact.
  # Only ~50s with esbuild, cheaper than debugging empty-handler destroys.
  build-lambdas:
    name: Build Lambdas
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: bash scripts/build-lambdas.sh
      - uses: actions/upload-artifact@v4
        with:
          name: lambda-zips
          path: dist/lambdas/
          retention-days: 1

  # ── Build + push AgentCore container ─────────────────────────────
  build-container:
    name: Build Container
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.container == 'true' ||
      needs.detect-changes.outputs.runtime_container_stale == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Multi-arch QEMU builds are 3-5x slower than single-arch native.
    # 30 is comfortable headroom; 20 was already tight for the old
    # amd64-only build with playwright installed.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      # QEMU lets the amd64 GHA runner cross-build the arm64 variant.
      # setup-buildx-action auto-installs this in most cases but
      # pinning the action is cheap and makes multi-arch reliable.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      # Two single-platform builds, not a manifest list.
      #
      # Lambda's UpdateFunctionCode rejects OCI manifest lists with
      # "image manifest, config or layer media type ... is not
      # supported". Bedrock AgentCore Runtime wants arm64.
      # Emitting two separate tags lets each consumer point at a
      # single-platform image it can actually pull. Layers are shared
      # via the GHA cache so the second build reuses everything up to
      # the platform-specific steps.

      - name: Compute build timestamp
        id: build_time
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push Pi amd64 (Lambda)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/agentcore-pi/agent-container/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/thinkwork-${{ env.STAGE }}-agentcore:${{ github.sha }}-pi
            ${{ steps.ecr.outputs.registry }}/thinkwork-${{ env.STAGE }}-agentcore:pi-latest
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.build_time.outputs.value }}
          cache-from: type=gha,scope=pi-amd64
          cache-to: type=gha,scope=pi-amd64,mode=max
          provenance: false

      - name: Build and push Pi arm64 (AgentCore Runtime)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/agentcore-pi/agent-container/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/thinkwork-${{ env.STAGE }}-agentcore:${{ github.sha }}-pi-arm64
            ${{ steps.ecr.outputs.registry }}/thinkwork-${{ env.STAGE }}-agentcore:pi-latest-arm64
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.build_time.outputs.value }}
          cache-from: type=gha,scope=pi-arm64
          cache-to: type=gha,scope=pi-arm64,mode=max
          provenance: false

      - name: Update Pi Lambda function code (x86_64)
        run: |
          if aws lambda get-function \
            --function-name thinkwork-${{ env.STAGE }}-agentcore-pi \
            --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
            aws lambda update-function-code \
              --function-name thinkwork-${{ env.STAGE }}-agentcore-pi \
              --image-uri ${{ steps.ecr.outputs.registry }}/thinkwork-${{ env.STAGE }}-agentcore:${{ github.sha }}-pi \
              --region ${{ env.AWS_REGION }}
            aws lambda wait function-updated \
              --function-name thinkwork-${{ env.STAGE }}-agentcore-pi \
              --region ${{ env.AWS_REGION }}
          else
            echo "Pi Lambda function not found yet; terraform apply will create it from pi-latest."
          fi

      - name: Create or update Pi AgentCore Runtime (arm64 variant)
        run: |
          set -euo pipefail
          RUNTIME_NAME="thinkwork_${{ env.STAGE }}_pi"
          SSM_NAME="/thinkwork/${{ env.STAGE }}/agentcore/runtime-id-pi"
          NEW_IMAGE="${{ steps.ecr.outputs.registry }}/thinkwork-${{ env.STAGE }}-agentcore:${{ github.sha }}-pi-arm64"
          RUNTIME_ID=$(aws ssm get-parameter \
            --name "$SSM_NAME" \
            --region ${{ env.AWS_REGION }} \
            --query Parameter.Value --output text 2>/dev/null || echo "")
          if [ -z "$RUNTIME_ID" ] || [ "$RUNTIME_ID" = "None" ]; then
            RUNTIME_ID=$(aws bedrock-agentcore-control list-agent-runtimes \
              --region ${{ env.AWS_REGION }} \
              --query "agentRuntimes[?agentRuntimeName=='${RUNTIME_NAME}'].agentRuntimeId | [0]" \
              --output text 2>/dev/null || echo "")
          fi
          # Pi's IAM role split out of the legacy shared `agentcore-role` in plan §005 U2.
          # The role is provisioned by terraform module
          # `terraform/modules/app/agentcore-pi/main.tf` (resource
          # `aws_iam_role.agentcore_pi`). On the FIRST deploy of this stage
          # after the U2 module landed, terraform-apply creates the role —
          # but build-container runs BEFORE terraform-apply in the same
          # workflow run, so the role does not yet exist when this step
          # fires. The fallback below detects the missing role and reuses
          # the existing runtime's roleArn (which currently points at the
          # legacy shared role); the next deploy after terraform-apply
          # creates the role will pick up the canonical Pi role on the
          # update path. New stages where the role doesn't exist AND no
          # runtime exists yet (greenfield) must run terraform-apply once
          # before this step can create the runtime.
          DESIRED_ROLE_ARN="arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/thinkwork-${{ env.STAGE }}-agentcore-pi-role"
          ROLE_ARN="$DESIRED_ROLE_ARN"
          if ! aws iam get-role \
            --role-name "thinkwork-${{ env.STAGE }}-agentcore-pi-role" \
            --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
            ROLE_ARN=""  # signal "use existing / skip creation"
            echo "Pi IAM role not yet provisioned; will fall back to current runtime's role on the update path. Greenfield create path will fail loudly."
          fi
          if [ -z "$RUNTIME_ID" ] || [ "$RUNTIME_ID" = "None" ]; then
            if [ -z "$ROLE_ARN" ]; then
              echo "Cannot create greenfield Pi runtime: $DESIRED_ROLE_ARN does not exist. Run terraform-apply for the agentcore-pi module first to provision it, then retry."
              exit 1
            fi
            echo "Creating Pi AgentCore runtime $RUNTIME_NAME with $NEW_IMAGE"
            RUNTIME_ID=$(aws bedrock-agentcore-control create-agent-runtime \
              --region ${{ env.AWS_REGION }} \
              --agent-runtime-name "$RUNTIME_NAME" \
              --agent-runtime-artifact "containerConfiguration={containerUri=$NEW_IMAGE}" \
              --role-arn "$ROLE_ARN" \
              --network-configuration "networkMode=PUBLIC" \
              --protocol-configuration "serverProtocol=HTTP" \
              --query agentRuntimeId \
              --output text)
            aws ssm put-parameter \
              --name "$SSM_NAME" \
              --value "$RUNTIME_ID" \
              --type String \
              --overwrite \
              --region ${{ env.AWS_REGION }}
          else
            echo "Updating Pi runtime $RUNTIME_ID to $NEW_IMAGE"
            # Plan §005 U2: force the role to the new agentcore-pi-role on
            # every update so an existing dev runtime created in U1 against
            # the shared `agentcore-role` reconciles to the canonical Pi
            # role. When the canonical role exists, avoid a pre-update
            # get-agent-runtime read; AgentCore's control plane can return
            # Forbidden for reads while still allowing the update call.
            NETWORK_MODE="PUBLIC"
            SERVER_PROTOCOL="HTTP"
            if [ -z "$ROLE_ARN" ]; then
              CURRENT=$(aws bedrock-agentcore-control get-agent-runtime \
                --region ${{ env.AWS_REGION }} \
                --agent-runtime-id "$RUNTIME_ID" \
                --output json)
              ROLE_ARN=$(echo "$CURRENT" | jq -r '.roleArn')
              echo "Reusing existing role: $ROLE_ARN (canonical Pi role will be adopted on the next deploy after terraform-apply creates it)"
              NETWORK_MODE=$(echo "$CURRENT" | jq -r '.networkConfiguration.networkMode // "PUBLIC"')
              SERVER_PROTOCOL=$(echo "$CURRENT" | jq -r '.protocolConfiguration.serverProtocol // "HTTP"')
            fi
            UPDATE_OUTPUT=$(aws bedrock-agentcore-control update-agent-runtime \
              --region ${{ env.AWS_REGION }} \
              --agent-runtime-id "$RUNTIME_ID" \
              --role-arn "$ROLE_ARN" \
              --network-configuration "networkMode=$NETWORK_MODE" \
              --protocol-configuration "serverProtocol=$SERVER_PROTOCOL" \
              --agent-runtime-artifact "containerConfiguration={containerUri=$NEW_IMAGE}" \
              --query '{version:agentRuntimeVersion,status:status,image:agentRuntimeArtifact.containerConfiguration.containerUri}' \
              --output json 2>&1) || {
                if grep -Eq 'ForbiddenException|(^|[^[:alnum:]_])Forbidden([^[:alnum:]_]|$)' <<<"$UPDATE_OUTPUT"; then
                  echo "WARN: update-agent-runtime $RUNTIME_ID returned Forbidden; Lambda/Terraform deploy will continue and Deploy Summary will run the tolerant AgentCore drift probe."
                else
                  echo "$UPDATE_OUTPUT" >&2
                  exit 1
                fi
              }
            if [ -n "${UPDATE_OUTPUT:-}" ]; then
              echo "$UPDATE_OUTPUT"
            fi
          fi

          echo "Pi AgentCore runtime visible:"
          aws bedrock-agentcore-control get-agent-runtime \
            --region ${{ env.AWS_REGION }} \
            --agent-runtime-id "$RUNTIME_ID" \
            --query '{id:agentRuntimeId,name:agentRuntimeName,status:status,image:agentRuntimeArtifact.containerConfiguration.containerUri}' \
            --output json || echo "WARN: get-agent-runtime returned non-zero after update; Deploy Summary will perform the tolerant drift probe."

  # ── Dev deployment-controller dogfood path ──────────────────────
  deployment-controller-update:
    name: Deployment Controller Update
    if: github.event_name == 'workflow_dispatch' && inputs.use_controller == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Start dev deployment controller
        env:
          CONTROLLER_ACTION: ${{ inputs.controller_action }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          RELEASE_MANIFEST_URL: ${{ inputs.release_manifest_url }}
          RELEASE_MANIFEST_SHA256: ${{ inputs.release_manifest_sha256 }}
        run: |
          set -euo pipefail
          if [ -z "$RELEASE_VERSION" ] || [ -z "$RELEASE_MANIFEST_URL" ] || [ -z "$RELEASE_MANIFEST_SHA256" ]; then
            echo "release_version, release_manifest_url, and release_manifest_sha256 are required when use_controller=true." >&2
            exit 1
          fi
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          STATE_MACHINE_ARN="arn:aws:states:${AWS_REGION}:${ACCOUNT_ID}:stateMachine:thinkwork-${STAGE}-deployment-orchestrator"
          SESSION_ID="gha-${STAGE}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          EVIDENCE_BUCKET="thinkwork-${STAGE}-${ACCOUNT_ID}-deploy-evidence"
          INPUT_JSON=$(jq -n \
            --arg action "$CONTROLLER_ACTION" \
            --arg sessionId "$SESSION_ID" \
            --arg stage "$STAGE" \
            --arg accountId "$ACCOUNT_ID" \
            --arg region "$AWS_REGION" \
            --arg evidenceBucket "$EVIDENCE_BUCKET" \
            --arg releaseVersion "$RELEASE_VERSION" \
            --arg manifestUrl "$RELEASE_MANIFEST_URL" \
            --arg manifestSha256 "$RELEASE_MANIFEST_SHA256" \
            '{
              schemaVersion: 1,
              contract: "thinkwork.deployment.controller.v1",
              phase: $action,
              action: $action,
              sessionId: $sessionId,
              customerName: "ThinkWork",
              environmentName: $stage,
              awsAccountId: $accountId,
              awsRegion: $region,
              evidenceBucket: $evidenceBucket,
              evidence: {
                bucket: $evidenceBucket,
                prefix: ("sessions/" + $sessionId + "/" + $action),
                expectedArtifacts: [
                  "controller-input-summary.json",
                  "redacted-terraform-vars.json",
                  "terraform-plan.json",
                  "terraform-outputs.json",
                  "deployment-evidence.json"
                ]
              },
              releaseVersion: $releaseVersion,
              releaseManifestUrl: $manifestUrl,
              releaseManifestSha256: $manifestSha256,
              release: {
                version: $releaseVersion,
                manifestUrl: $manifestUrl,
                manifestSha256: $manifestSha256
              },
              session: {
                id: $sessionId,
                source: "github-actions",
                requestedAction: $action
              },
              operation: {
                kind: "foundation",
                action: $action,
                plan: true,
                apply: ($action != "plan"),
                destroy: false
              },
              features: {
                baseInstall: {
                  cognee: false,
                  slack: false,
                  stripe: false,
                  twenty: false
                },
                optionalApps: []
              },
              terraform: {
                stateRecovery: {
                  mode: "state",
                  recoverByTags: false
                }
              }
            }')
          EXECUTION_ARN=$(aws stepfunctions start-execution \
            --state-machine-arn "$STATE_MACHINE_ARN" \
            --name "tw-${SESSION_ID}" \
            --input "$INPUT_JSON" \
            --query executionArn \
            --output text)
          echo "Started deployment controller execution: $EXECUTION_ARN"
          echo "state_machine_arn=$STATE_MACHINE_ARN" >> "$GITHUB_STEP_SUMMARY"
          echo "execution_arn=$EXECUTION_ARN" >> "$GITHUB_STEP_SUMMARY"

  # ── Terraform apply ──────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    # `build-container` is deliberately NOT in `needs:` even though
    # update-agentcore-runtimes still consumes it after this job.
    # GitHub Actions queues a runner to evaluate a skipped job's `if:`
    # condition, which on 2026-05-11 held this job for 19m36s while
    # build-container waited to skip. Terraform reads runtime image
    # state from SSM/AgentCore data sources, not from build-container
    # outputs, so dropping the edge is safe.
    #
    # Gating: source deploys always run Terraform after Lambda zips build.
    # When no Terraform files changed, the apply step targets the API Lambda
    # and IAM resources so a later docs/status merge can recover stale handler
    # code after transient deploy failures without pulling unrelated stack drift
    # into the recovery path. We deliberately do NOT add `build-container` here
    # even to read `build-container.result` — that would reintroduce the
    # 20-minute queue gap.
    needs: [detect-changes, build-lambdas]
    # Require build-lambdas to have succeeded. The pre-PR shape inherited
    # this implicitly via `needs`; the new `if:` overrides `always()` so
    # we have to restate the constraint or terraform-apply would proceed
    # with stale or missing dist/lambdas zips and break filebase64sha256.
    if: >-
      always() && !cancelled()
      && needs.build-lambdas.result == 'success'
      && !(github.event_name == 'workflow_dispatch' && inputs.use_controller == true)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
        if: ${{ vars.COGNEE_ENABLED == 'true' && vars.COGNEE_IMAGE_URI == '' }}

      - uses: docker/setup-buildx-action@v3
        if: ${{ vars.COGNEE_ENABLED == 'true' && vars.COGNEE_IMAGE_URI == '' }}

      - name: Build and push Cognee Bedrock image
        id: cognee_image
        if: ${{ vars.COGNEE_ENABLED == 'true' && vars.COGNEE_IMAGE_URI == '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/cognee/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/thinkwork-${{ env.STAGE }}-agentcore:${{ github.sha }}-cognee
            ${{ steps.ecr.outputs.registry }}/thinkwork-${{ env.STAGE }}-agentcore:cognee-latest
          cache-from: type=gha,scope=cognee
          cache-to: type=gha,scope=cognee,mode=max
          provenance: false

      - uses: hashicorp/setup-terraform@v3

      - uses: actions/download-artifact@v4
        with:
          name: lambda-zips
          path: dist/lambdas/
        continue-on-error: true

      - name: Terraform Init
        working-directory: terraform/examples/greenfield
        run: |
          terraform init
          terraform workspace select ${{ env.STAGE }} || terraform workspace new ${{ env.STAGE }}

      # Runtime rename backfill — agents.runtime `flue` → `pi`. Runs BEFORE the
      # Terraform apply that updates the dispatcher Lambda code so the new
      # Pi-only runtime path never sees a `flue` value it can't route.
      # Idempotent: WHERE runtime = 'flue' is a no-op once the rows are gone,
      # so subsequent deploys are clean.
      #
      # Skips cleanly on greenfield (no existing terraform state → no DB
      # endpoint output → step exits 0 without running psql). Once the
      # stage has applied terraform-apply once, subsequent runs of this
      # step have a real DB endpoint and apply the backfill.
      - name: Install psql (U3 backfill)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Backfill agents.runtime flue to pi
        working-directory: terraform/examples/greenfield
        run: |
          set -euo pipefail
          source ../../../scripts/lib/terraform-output.sh
          DB_ENDPOINT=$(tf_output_raw db_cluster_endpoint 2>/dev/null || echo "")
          DB_SECRET_ARN=$(tf_output_raw db_secret_arn 2>/dev/null || echo "")
          if [ -z "$DB_ENDPOINT" ] || [ -z "$DB_SECRET_ARN" ]; then
            echo "Skipping flue → pi backfill: no existing DB outputs (greenfield apply)."
            exit 0
          fi
          DB_PASS=$(aws secretsmanager get-secret-value \
            --secret-id "$DB_SECRET_ARN" \
            --query SecretString --output text | jq -r .password)
          export DATABASE_URL="postgresql://thinkwork_admin:${DB_PASS}@${DB_ENDPOINT}:5432/thinkwork?sslmode=require"
          # ON_ERROR_STOP=1 + --single-transaction so a partial failure rolls
          # the whole migration back rather than leaving rows half-migrated.
          psql "$DATABASE_URL" \
