      - name: Resolve Cognee deployment inputs
        env:
          COGNEE_ENABLED_INPUT: ${{ vars.COGNEE_ENABLED || 'false' }}
          COGNEE_IMAGE_URI_INPUT: ${{ vars.COGNEE_IMAGE_URI || '' }}
          COGNEE_DB_USERNAME_INPUT: ${{ vars.COGNEE_DB_USERNAME || 'thinkwork_cognee' }}
          COGNEE_DB_NAME_INPUT: ${{ vars.COGNEE_DB_NAME || 'thinkwork_cognee' }}
          COGNEE_DB_PASSWORD_SECRET_ARN_INPUT: ${{ vars.COGNEE_DB_PASSWORD_SECRET_ARN || '' }}
          COGNEE_DB_PASSWORD_SECRET_ID_INPUT: ${{ vars.COGNEE_DB_PASSWORD_SECRET_ID || '' }}
          COGNEE_BACKEND_MODE_INPUT: ${{ vars.COGNEE_BACKEND_MODE || 'dogfood' }}
          COGNEE_DESIRED_COUNT_INPUT: ${{ vars.COGNEE_DESIRED_COUNT || '1' }}
          COGNEE_LLM_PROVIDER_INPUT: ${{ vars.COGNEE_LLM_PROVIDER || 'bedrock' }}
          COGNEE_EMBEDDING_PROVIDER_INPUT: ${{ vars.COGNEE_EMBEDDING_PROVIDER || 'bedrock' }}
          COGNEE_BEDROCK_MODEL_RESOURCE_ARNS_INPUT: ${{ vars.COGNEE_BEDROCK_MODEL_RESOURCE_ARNS || '' }}
          COGNEE_BUILT_IMAGE_DIGEST: ${{ steps.cognee_image.outputs.digest || '' }}
          COGNEE_BUILT_IMAGE_REPOSITORY: ${{ steps.ecr.outputs.registry }}/thinkwork-${{ env.STAGE }}-agentcore
        run: |
          set -euo pipefail

          cognee_enabled=$(printf '%s' "$COGNEE_ENABLED_INPUT" | tr '[:upper:]' '[:lower:]')
          if [ "$cognee_enabled" != "true" ] && [ "$cognee_enabled" != "false" ]; then
            echo "::error::COGNEE_ENABLED must be true or false."
            exit 1
          fi

          if [ -n "$COGNEE_IMAGE_URI_INPUT" ]; then
            cognee_image_uri="$COGNEE_IMAGE_URI_INPUT"
          elif [ -n "${COGNEE_BUILT_IMAGE_DIGEST:-}" ] && [ -n "${COGNEE_BUILT_IMAGE_REPOSITORY:-}" ]; then
            cognee_image_uri="${COGNEE_BUILT_IMAGE_REPOSITORY}@${COGNEE_BUILT_IMAGE_DIGEST}"
          else
            cognee_image_uri="cognee/cognee@sha256:5ce7e4052b1d16738d1e24476d64847fcb5b1666631b642651e8ccce414046f8"
          fi
          cognee_db_username="${COGNEE_DB_USERNAME_INPUT:-thinkwork_cognee}"
          cognee_db_name="${COGNEE_DB_NAME_INPUT:-thinkwork_cognee}"
          cognee_backend_mode="${COGNEE_BACKEND_MODE_INPUT:-dogfood}"
          cognee_desired_count="${COGNEE_DESIRED_COUNT_INPUT:-1}"
          cognee_llm_provider="${COGNEE_LLM_PROVIDER_INPUT:-bedrock}"
          cognee_embedding_provider="${COGNEE_EMBEDDING_PROVIDER_INPUT:-bedrock}"
          # Extraction LLM is Kimi K2.5 (ON_DEMAND foundation model — no
          # inference profile). nova-lite persistently failed tool-use
          # extraction and Haiku is rate-limited on this account. nova-lite
          # stays listed for rollback; titan is the embeddings model.
          cognee_bedrock_model_resource_arns="${COGNEE_BEDROCK_MODEL_RESOURCE_ARNS_INPUT:-[\"arn:aws:bedrock:${AWS_REGION}::foundation-model/moonshotai.kimi-k2.5\",\"arn:aws:bedrock:${AWS_REGION}::foundation-model/amazon.nova-lite-v1:0\",\"arn:aws:bedrock:${AWS_REGION}::foundation-model/amazon.titan-embed-text-v2:0\"]}"
          cognee_db_password_secret_id="${COGNEE_DB_PASSWORD_SECRET_ID_INPUT:-thinkwork/${STAGE}/cognee/db-credentials}"

          if [[ ! "$cognee_image_uri" =~ @sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::COGNEE_IMAGE_URI must be pinned to an immutable sha256 digest."
            exit 1
          fi
          if [[ ! "$cognee_db_username" =~ ^[A-Za-z_][A-Za-z0-9_]{0,62}$ ]]; then
            echo "::error::COGNEE_DB_USERNAME must be a valid PostgreSQL identifier."
            exit 1
          fi
          if [[ ! "$cognee_db_name" =~ ^[A-Za-z_][A-Za-z0-9_]{0,62}$ ]] || [ "$cognee_db_name" = "thinkwork" ]; then
            echo "::error::COGNEE_DB_NAME must be a valid PostgreSQL identifier distinct from thinkwork."
            exit 1
          fi
          if [ "$cognee_enabled" = "true" ] && { [ "$cognee_llm_provider" = "bedrock" ] || [ "$cognee_embedding_provider" = "bedrock" ]; }; then
            jq -e 'type == "array" and length > 0' >/dev/null <<< "$cognee_bedrock_model_resource_arns"
          fi

          {
            echo "COGNEE_ENABLED=$cognee_enabled"
            echo "COGNEE_IMAGE_URI=$cognee_image_uri"
            echo "COGNEE_DB_USERNAME=$cognee_db_username"
            echo "COGNEE_DB_NAME=$cognee_db_name"
            echo "COGNEE_DB_PASSWORD_SECRET_ARN=$COGNEE_DB_PASSWORD_SECRET_ARN_INPUT"
            echo "COGNEE_DB_PASSWORD_SECRET_ID=$cognee_db_password_secret_id"
            echo "COGNEE_BACKEND_MODE=$cognee_backend_mode"
            echo "COGNEE_DESIRED_COUNT=$cognee_desired_count"
            echo "COGNEE_LLM_PROVIDER=$cognee_llm_provider"
            echo "COGNEE_EMBEDDING_PROVIDER=$cognee_embedding_provider"
            echo "COGNEE_BEDROCK_MODEL_RESOURCE_ARNS=$cognee_bedrock_model_resource_arns"
          } >> "$GITHUB_ENV"

      - name: Resolve Twenty CRM deployment inputs
        env:
          TWENTY_PROVISIONED_INPUT: ${{ vars.TWENTY_PROVISIONED || 'false' }}
          TWENTY_RUNTIME_ENABLED_INPUT: ${{ vars.TWENTY_RUNTIME_ENABLED || 'false' }}
          TWENTY_DESTROY_DATA_INPUT: ${{ vars.TWENTY_DESTROY_DATA || 'false' }}
          TWENTY_IMAGE_URI_INPUT: ${{ vars.TWENTY_IMAGE_URI || '' }}
          TWENTY_DB_USERNAME_INPUT: ${{ vars.TWENTY_DB_USERNAME || 'thinkwork_twenty' }}
          TWENTY_DB_NAME_INPUT: ${{ vars.TWENTY_DB_NAME || 'thinkwork_twenty' }}
          TWENTY_DB_URL_SECRET_ARN_INPUT: ${{ vars.TWENTY_DB_URL_SECRET_ARN || '' }}
          TWENTY_DB_URL_SECRET_ID_INPUT: ${{ vars.TWENTY_DB_URL_SECRET_ID || '' }}
          TWENTY_ENCRYPTION_KEY_SECRET_ARN_INPUT: ${{ vars.TWENTY_ENCRYPTION_KEY_SECRET_ARN || '' }}
          TWENTY_ENCRYPTION_KEY_SECRET_ID_INPUT: ${{ vars.TWENTY_ENCRYPTION_KEY_SECRET_ID || '' }}
          TWENTY_PUBLIC_URL_INPUT: ${{ vars.TWENTY_PUBLIC_URL || '' }}
          TWENTY_CERTIFICATE_ARN_INPUT: ${{ vars.TWENTY_CERTIFICATE_ARN || '' }}
        run: |
          set -euo pipefail

          twenty_provisioned=$(printf '%s' "$TWENTY_PROVISIONED_INPUT" | tr '[:upper:]' '[:lower:]')
          twenty_runtime_enabled=$(printf '%s' "$TWENTY_RUNTIME_ENABLED_INPUT" | tr '[:upper:]' '[:lower:]')
          twenty_destroy_data=$(printf '%s' "$TWENTY_DESTROY_DATA_INPUT" | tr '[:upper:]' '[:lower:]')
          for value_name in twenty_provisioned twenty_runtime_enabled twenty_destroy_data; do
            value="${!value_name}"
            if [ "$value" != "true" ] && [ "$value" != "false" ]; then
              echo "::error::${value_name^^} must be true or false."
              exit 1
            fi
          done
          if [ "$twenty_runtime_enabled" = "true" ] && [ "$twenty_provisioned" != "true" ]; then
            echo "::error::TWENTY_RUNTIME_ENABLED=true requires TWENTY_PROVISIONED=true."
            exit 1
          fi
          if [ "$twenty_destroy_data" = "true" ] && { [ "$twenty_provisioned" = "true" ] || [ "$twenty_runtime_enabled" = "true" ]; }; then
            echo "::error::TWENTY_DESTROY_DATA=true requires TWENTY_PROVISIONED=false and TWENTY_RUNTIME_ENABLED=false."
            exit 1
          fi

          twenty_image_uri="${TWENTY_IMAGE_URI_INPUT:-}"
          twenty_db_username="${TWENTY_DB_USERNAME_INPUT:-thinkwork_twenty}"
          twenty_db_name="${TWENTY_DB_NAME_INPUT:-thinkwork_twenty}"
          twenty_db_url_secret_id="${TWENTY_DB_URL_SECRET_ID_INPUT:-thinkwork/${STAGE}/twenty/db-url}"
          twenty_encryption_key_secret_id="${TWENTY_ENCRYPTION_KEY_SECRET_ID_INPUT:-thinkwork/${STAGE}/twenty/encryption-key}"

          if [ "$twenty_provisioned" = "true" ] && [[ ! "$twenty_image_uri" =~ @sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::TWENTY_IMAGE_URI must be pinned to an immutable sha256 digest when TWENTY_PROVISIONED=true."
            exit 1
          fi
          if [[ ! "$twenty_db_username" =~ ^[A-Za-z_][A-Za-z0-9_]{0,62}$ ]]; then
            echo "::error::TWENTY_DB_USERNAME must be a valid PostgreSQL identifier."
            exit 1
          fi
          if [[ ! "$twenty_db_name" =~ ^[A-Za-z_][A-Za-z0-9_]{0,62}$ ]] || [ "$twenty_db_name" = "thinkwork" ]; then
            echo "::error::TWENTY_DB_NAME must be a valid PostgreSQL identifier distinct from thinkwork."
            exit 1
          fi

          {
            echo "TWENTY_PROVISIONED=$twenty_provisioned"
            echo "TWENTY_RUNTIME_ENABLED=$twenty_runtime_enabled"
            echo "TWENTY_DESTROY_DATA=$twenty_destroy_data"
            echo "TWENTY_IMAGE_URI=$twenty_image_uri"
            echo "TWENTY_DB_USERNAME=$twenty_db_username"
            echo "TWENTY_DB_NAME=$twenty_db_name"
            echo "TWENTY_DB_URL_SECRET_ARN=$TWENTY_DB_URL_SECRET_ARN_INPUT"
            echo "TWENTY_DB_URL_SECRET_ID=$twenty_db_url_secret_id"
            echo "TWENTY_ENCRYPTION_KEY_SECRET_ARN=$TWENTY_ENCRYPTION_KEY_SECRET_ARN_INPUT"
            echo "TWENTY_ENCRYPTION_KEY_SECRET_ID=$twenty_encryption_key_secret_id"
            echo "TWENTY_PUBLIC_URL=$TWENTY_PUBLIC_URL_INPUT"
            echo "TWENTY_CERTIFICATE_ARN=$TWENTY_CERTIFICATE_ARN_INPUT"
          } >> "$GITHUB_ENV"

      - name: Prepare Cognee database credentials
        working-directory: terraform/examples/greenfield
        run: |
          set -euo pipefail
          if [ "${COGNEE_ENABLED:-false}" != "true" ]; then
            echo "Cognee disabled; skipping Cognee database credential preparation."
            exit 0
          fi
          source ../../../scripts/lib/terraform-output.sh

          DB_ENDPOINT=$(tf_output_raw db_cluster_endpoint 2>/dev/null || echo "")
          DB_SECRET_ARN=$(tf_output_raw db_secret_arn 2>/dev/null || echo "")
          if [ -z "$DB_ENDPOINT" ] || [ -z "$DB_SECRET_ARN" ]; then
            echo "::error::Cognee is enabled but existing database outputs are missing. Apply the base stack first."
            exit 1
          fi

          secret_selector="${COGNEE_DB_PASSWORD_SECRET_ARN:-$COGNEE_DB_PASSWORD_SECRET_ID}"
          new_cognee_password() {
            openssl rand -hex 32 | tr -d '\n'
          }

          secret_arn=$(aws secretsmanager describe-secret \
            --secret-id "$secret_selector" \
            --query ARN --output text 2>/dev/null || echo "")

          if [ -z "$secret_arn" ] || [ "$secret_arn" = "None" ]; then
            cognee_password=$(new_cognee_password)
            echo "::add-mask::$cognee_password"
            secret_json=$(jq -n \
              --arg username "$COGNEE_DB_USERNAME" \
              --arg password "$cognee_password" \
              '{username: $username, password: $password}')
            secret_arn=$(aws secretsmanager create-secret \
              --name "$COGNEE_DB_PASSWORD_SECRET_ID" \
              --description "Dedicated Cognee PostgreSQL credentials for ${STAGE}" \
              --secret-string "$secret_json" \
              --query ARN --output text)
          else
            secret_json=$(aws secretsmanager get-secret-value \
              --secret-id "$secret_arn" \
              --query SecretString --output text)
            cognee_password=$(jq -r '.password // empty' <<< "$secret_json")
            if [ -z "$cognee_password" ] || [ "$cognee_password" = "PLACEHOLDER_SET_VIA_CLI" ]; then
              cognee_password=$(new_cognee_password)
              echo "::add-mask::$cognee_password"
              secret_json=$(jq -n \
                --arg username "$COGNEE_DB_USERNAME" \
                --arg password "$cognee_password" \
                '{username: $username, password: $password}')
              aws secretsmanager put-secret-value \
                --secret-id "$secret_arn" \
                --secret-string "$secret_json" >/dev/null
            elif [[ ! "$cognee_password" =~ ^[A-Za-z0-9._~-]+$ ]]; then
              cognee_password=$(new_cognee_password)
              echo "::add-mask::$cognee_password"
              secret_json=$(jq -n \
                --arg username "$COGNEE_DB_USERNAME" \
                --arg password "$cognee_password" \
                '{username: $username, password: $password}')
              aws secretsmanager put-secret-value \
                --secret-id "$secret_arn" \
                --secret-string "$secret_json" >/dev/null
            else
              echo "::add-mask::$cognee_password"
            fi
          fi

          admin_password=$(aws secretsmanager get-secret-value \
            --secret-id "$DB_SECRET_ARN" \
            --query SecretString --output text | jq -r .password)
          echo "::add-mask::$admin_password"
          export DATABASE_URL="postgresql://thinkwork_admin:${admin_password}@${DB_ENDPOINT}:5432/thinkwork?sslmode=require"

          psql "$DATABASE_URL" \
            -v ON_ERROR_STOP=1 \
            -v cognee_user="$COGNEE_DB_USERNAME" \
            -v cognee_db="$COGNEE_DB_NAME" \
            -v cognee_password="$cognee_password" <<'SQL'
          SELECT format(
            CASE
              WHEN EXISTS (SELECT 1 FROM pg_roles WHERE rolname = :'cognee_user')
                THEN 'ALTER ROLE %I LOGIN PASSWORD %L'
              ELSE 'CREATE ROLE %I LOGIN PASSWORD %L'
            END,
            :'cognee_user',
            :'cognee_password'
          ) \gexec

          SELECT format('CREATE DATABASE %I', :'cognee_db')
          WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = :'cognee_db')
          \gexec
          GRANT CONNECT ON DATABASE :"cognee_db" TO :"cognee_user";
          \connect :"cognee_db"
          GRANT USAGE, CREATE ON SCHEMA public TO :"cognee_user";
          GRANT SELECT, INSERT, UPDATE, DELETE, REFERENCES ON ALL TABLES IN SCHEMA public TO :"cognee_user";
          GRANT USAGE, SELECT, UPDATE ON ALL SEQUENCES IN SCHEMA public TO :"cognee_user";
          ALTER DEFAULT PRIVILEGES IN SCHEMA public
            GRANT SELECT, INSERT, UPDATE, DELETE, REFERENCES ON TABLES TO :"cognee_user";
          ALTER DEFAULT PRIVILEGES IN SCHEMA public
            GRANT USAGE, SELECT, UPDATE ON SEQUENCES TO :"cognee_user";
          SQL

          echo "COGNEE_DB_PASSWORD_SECRET_ARN=$secret_arn" >> "$GITHUB_ENV"

      - name: Prepare Twenty CRM runtime secrets and database
        working-directory: terraform/examples/greenfield
        run: |
          set -euo pipefail
          if [ "${TWENTY_PROVISIONED:-false}" != "true" ]; then
            echo "Twenty CRM not provisioned; skipping Twenty runtime secret and database preparation."
            exit 0
          fi
          source ../../../scripts/lib/terraform-output.sh

          DB_ENDPOINT=$(tf_output_raw db_cluster_endpoint 2>/dev/null || echo "")
          DB_SECRET_ARN=$(tf_output_raw db_secret_arn 2>/dev/null || echo "")
          if [ -z "$DB_ENDPOINT" ] || [ -z "$DB_SECRET_ARN" ]; then
            echo "::error::Twenty CRM is provisioned but existing database outputs are missing. Apply the base stack first."
            exit 1
          fi

          new_twenty_password() {
            openssl rand -hex 32 | tr -d '\n'
          }
          new_twenty_encryption_key() {
            openssl rand -hex 32 | tr -d '\n'
          }

          db_secret_selector="${TWENTY_DB_URL_SECRET_ARN:-$TWENTY_DB_URL_SECRET_ID}"
          db_secret_arn=$(aws secretsmanager describe-secret \
            --secret-id "$db_secret_selector" \
            --query ARN --output text 2>/dev/null || echo "")
          if { [ -z "$db_secret_arn" ] || [ "$db_secret_arn" = "None" ]; } && [ -n "${TWENTY_DB_URL_SECRET_ARN:-}" ]; then
            echo "Twenty CRM database URL secret ARN was not found; retrying by stable secret name."
            db_secret_arn=$(aws secretsmanager describe-secret \
              --secret-id "$TWENTY_DB_URL_SECRET_ID" \
              --query ARN --output text 2>/dev/null || echo "")
          fi
          if [ -z "$db_secret_arn" ] || [ "$db_secret_arn" = "None" ]; then
            twenty_password=$(new_twenty_password)
            echo "::add-mask::$twenty_password"
            db_secret_arn=$(aws secretsmanager create-secret \
              --name "$TWENTY_DB_URL_SECRET_ID" \
              --description "Dedicated Twenty CRM PostgreSQL URL for ${STAGE}" \
              --secret-string '{}' \
              --query ARN --output text)
          else
            secret_json=$(aws secretsmanager get-secret-value \
              --secret-id "$db_secret_arn" \
              --query SecretString --output text)
            twenty_password=$(jq -r '.password // empty' <<< "$secret_json")
            if [ -z "$twenty_password" ] || [ "$twenty_password" = "PLACEHOLDER_SET_VIA_CI" ] || [[ ! "$twenty_password" =~ ^[A-Za-z0-9._~-]+$ ]]; then
              twenty_password=$(new_twenty_password)
            fi
            echo "::add-mask::$twenty_password"
          fi

          admin_password=$(aws secretsmanager get-secret-value \
            --secret-id "$DB_SECRET_ARN" \
            --query SecretString --output text | jq -r .password)
          echo "::add-mask::$admin_password"
          export DATABASE_URL="postgresql://thinkwork_admin:${admin_password}@${DB_ENDPOINT}:5432/thinkwork?sslmode=require"

          psql "$DATABASE_URL" \
            -v ON_ERROR_STOP=1 \
            -v twenty_user="$TWENTY_DB_USERNAME" \
            -v twenty_db="$TWENTY_DB_NAME" \
            -v twenty_password="$twenty_password" <<'SQL'
          SELECT format(
            CASE
              WHEN EXISTS (SELECT 1 FROM pg_roles WHERE rolname = :'twenty_user')
                THEN 'ALTER ROLE %I LOGIN PASSWORD %L'
              ELSE 'CREATE ROLE %I LOGIN PASSWORD %L'
            END,
            :'twenty_user',
            :'twenty_password'
          ) \gexec

          SELECT format('CREATE DATABASE %I', :'twenty_db')
          WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = :'twenty_db')
          \gexec
          SELECT format('GRANT %I TO %I', :'twenty_user', current_user)
          \gexec
          SELECT format('ALTER DATABASE %I OWNER TO %I', :'twenty_db', :'twenty_user')
          \gexec
          GRANT CONNECT, CREATE ON DATABASE :"twenty_db" TO :"twenty_user";
          \connect :"twenty_db"
          SET ROLE :"twenty_user";
          DO $do$
          DECLARE
            core_table_count integer;
          BEGIN
            SELECT count(*) INTO core_table_count
            FROM information_schema.tables
            WHERE table_schema = 'core';

            IF EXISTS (SELECT 1 FROM information_schema.schemata WHERE schema_name = 'core')
              AND core_table_count = 0 THEN
              EXECUTE 'DROP SCHEMA core CASCADE';
            END IF;
          END
          $do$;
          ALTER SCHEMA public OWNER TO :"twenty_user";
          CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
          CREATE EXTENSION IF NOT EXISTS "unaccent";
          RESET ROLE;
          GRANT USAGE, CREATE ON SCHEMA public TO :"twenty_user";
          GRANT SELECT, INSERT, UPDATE, DELETE, REFERENCES ON ALL TABLES IN SCHEMA public TO :"twenty_user";
          GRANT USAGE, SELECT, UPDATE ON ALL SEQUENCES IN SCHEMA public TO :"twenty_user";
          ALTER DEFAULT PRIVILEGES IN SCHEMA public
            GRANT SELECT, INSERT, UPDATE, DELETE, REFERENCES ON TABLES TO :"twenty_user";
          ALTER DEFAULT PRIVILEGES IN SCHEMA public
            GRANT USAGE, SELECT, UPDATE ON SEQUENCES TO :"twenty_user";
          SQL

          twenty_database_url="postgresql://${TWENTY_DB_USERNAME}:${twenty_password}@${DB_ENDPOINT}:5432/${TWENTY_DB_NAME}?sslmode=require"
          echo "::add-mask::$twenty_database_url"
          db_secret_json=$(jq -n \
            --arg username "$TWENTY_DB_USERNAME" \
            --arg password "$twenty_password" \
            --arg database "$TWENTY_DB_NAME" \
            --arg PG_DATABASE_URL "$twenty_database_url" \
            '{username: $username, password: $password, database: $database, PG_DATABASE_URL: $PG_DATABASE_URL}')
          aws secretsmanager put-secret-value \
            --secret-id "$db_secret_arn" \
            --secret-string "$db_secret_json" >/dev/null

          encryption_secret_selector="${TWENTY_ENCRYPTION_KEY_SECRET_ARN:-$TWENTY_ENCRYPTION_KEY_SECRET_ID}"
          encryption_secret_arn=$(aws secretsmanager describe-secret \
            --secret-id "$encryption_secret_selector" \
            --query ARN --output text 2>/dev/null || echo "")
          if { [ -z "$encryption_secret_arn" ] || [ "$encryption_secret_arn" = "None" ]; } && [ -n "${TWENTY_ENCRYPTION_KEY_SECRET_ARN:-}" ]; then
            echo "Twenty CRM encryption key secret ARN was not found; retrying by stable secret name."
            encryption_secret_arn=$(aws secretsmanager describe-secret \
              --secret-id "$TWENTY_ENCRYPTION_KEY_SECRET_ID" \
              --query ARN --output text 2>/dev/null || echo "")
          fi
          if [ -z "$encryption_secret_arn" ] || [ "$encryption_secret_arn" = "None" ]; then
            twenty_encryption_key=$(new_twenty_encryption_key)
            echo "::add-mask::$twenty_encryption_key"
            encryption_secret_json=$(jq -n \
              --arg ENCRYPTION_KEY "$twenty_encryption_key" \
              '{ENCRYPTION_KEY: $ENCRYPTION_KEY}')
            encryption_secret_arn=$(aws secretsmanager create-secret \
              --name "$TWENTY_ENCRYPTION_KEY_SECRET_ID" \
              --description "Twenty CRM ENCRYPTION_KEY for ${STAGE}" \
              --secret-string "$encryption_secret_json" \
              --query ARN --output text)
          else
            encryption_secret_json=$(aws secretsmanager get-secret-value \
              --secret-id "$encryption_secret_arn" \
              --query SecretString --output text)
            twenty_encryption_key=$(jq -r '.ENCRYPTION_KEY // empty' <<< "$encryption_secret_json")
            if [ -z "$twenty_encryption_key" ] || [ "$twenty_encryption_key" = "PLACEHOLDER_SET_VIA_CI" ]; then
              twenty_encryption_key=$(new_twenty_encryption_key)
              echo "::add-mask::$twenty_encryption_key"
              encryption_secret_json=$(jq -n \
                --arg ENCRYPTION_KEY "$twenty_encryption_key" \
                '{ENCRYPTION_KEY: $ENCRYPTION_KEY}')
              aws secretsmanager put-secret-value \
                --secret-id "$encryption_secret_arn" \
                --secret-string "$encryption_secret_json" >/dev/null
            else
              echo "::add-mask::$twenty_encryption_key"
            fi
          fi

          {
            echo "TWENTY_DB_URL_SECRET_ARN=$db_secret_arn"
            echo "TWENTY_ENCRYPTION_KEY_SECRET_ARN=$encryption_secret_arn"
          } >> "$GITHUB_ENV"

      - name: Empty retired admin static site bucket
        run: |
          set -euo pipefail
          if [ "${STAGE}" != "dev" ]; then
            echo "Skipping retired admin bucket cleanup outside dev."
            exit 0
          fi

          bucket="thinkwork-${STAGE}-admin"
          if ! aws s3api head-bucket --bucket "$bucket" >/dev/null 2>&1; then
            echo "Retired admin bucket ${bucket} is already gone."
            exit 0
          fi

          echo "Emptying retired admin static-site bucket ${bucket} before Terraform destroys stale state."
          aws s3 rm "s3://${bucket}" --recursive || true

          object_versions=$(aws s3api list-object-versions --bucket "$bucket" --output json)
          delete_payload=$(jq -c '
            [
              (.Versions // [])[] | {Key, VersionId}
            ] + [
              (.DeleteMarkers // [])[] | {Key, VersionId}
            ] | {Objects: ., Quiet: true}
          ' <<< "$object_versions")
          object_count=$(jq '.Objects | length' <<< "$delete_payload")
          if [ "$object_count" -gt 0 ]; then
            aws s3api delete-objects --bucket "$bucket" --delete "$delete_payload" >/dev/null
          fi

      - name: Terraform Apply
        working-directory: terraform/examples/greenfield
        env:
          # Cloudflare provider init requires a non-empty token even when
          # the www_dns module has count=0. Fall back to a placeholder when
          # the real secret isn't set — the provider only hits the API if
          # WWW_DOMAIN is also configured, which enables the module. NB:
          # despite the name, www_dns no longer manages the marketing-site
          # apex/www DNS (extracted to thinkwork-ai/thinkworkwebsite); it
          # still owns the shared ACM cert + docs/web/api CNAMEs.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || 'placeholder-not-configured' }}
        run: |
          set -euo pipefail
          LAMBDA_DIR=""
          if [ -d "${{ github.workspace }}/dist/lambdas" ]; then
            LAMBDA_DIR="${{ github.workspace }}/dist/lambdas"
          fi
          PRE_SIGNUP_ZIP=""
          if [ -f "$LAMBDA_DIR/cognito-pre-signup.zip" ]; then
            PRE_SIGNUP_ZIP="$LAMBDA_DIR/cognito-pre-signup.zip"
          fi
          TF_TARGET_ARGS=()
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && [ "${{ needs.detect-changes.outputs.terraform }}" != "true" ]; then
            echo "No Terraform source changes detected; targeting API Lambda/IAM recovery resources."
            TF_TARGET_ARGS+=(
              -target=module.thinkwork.module.api.aws_iam_policy.api_data_plane
              -target=module.thinkwork.module.api.aws_lambda_function.handler
              -target=module.thinkwork.module.api.aws_lambda_function.compliance_anchor
              -target=module.thinkwork.module.api.aws_lambda_function.compliance_anchor_watchdog
              -target=module.thinkwork.module.api.aws_lambda_function.compliance_export_runner
            )
          fi
          # -refresh=false skips ~30s of "Refreshing state…" against ~700
          # resources on every push. Out-of-band drift is caught by the
          # nightly drift-check job in .github/workflows/verify.yml, which
          # runs `terraform plan -refresh=true` and surfaces any diff to
          # $GITHUB_STEP_SUMMARY without failing the workflow.
          terraform apply -auto-approve -refresh=false -lock-timeout=10m "${TF_TARGET_ARGS[@]}" \
            -var "stage=${{ env.STAGE }}" \
            -var "region=${{ env.AWS_REGION }}" \
            -var "account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var "db_password=${{ secrets.DB_PASSWORD }}" \
            -var "database_engine=aurora-serverless" \
            -var "enable_hindsight=true" \
            -var "enable_cognee=$COGNEE_ENABLED" \
            -var "cognee_image_uri=$COGNEE_IMAGE_URI" \
            -var "cognee_db_username=$COGNEE_DB_USERNAME" \
            -var "cognee_db_name=$COGNEE_DB_NAME" \
            -var "cognee_db_password_secret_arn=$COGNEE_DB_PASSWORD_SECRET_ARN" \
            -var "cognee_backend_mode=$COGNEE_BACKEND_MODE" \
            -var "cognee_desired_count=$COGNEE_DESIRED_COUNT" \
            -var "cognee_llm_provider=$COGNEE_LLM_PROVIDER" \
            -var "cognee_embedding_provider=$COGNEE_EMBEDDING_PROVIDER" \
            -var "cognee_bedrock_model_resource_arns=$COGNEE_BEDROCK_MODEL_RESOURCE_ARNS" \
            -var "twenty_provisioned=$TWENTY_PROVISIONED" \
            -var "twenty_runtime_enabled=$TWENTY_RUNTIME_ENABLED" \
            -var "twenty_image_uri=$TWENTY_IMAGE_URI" \
            -var "twenty_db_username=$TWENTY_DB_USERNAME" \
            -var "twenty_db_name=$TWENTY_DB_NAME" \
            -var "twenty_db_url_secret_arn=$TWENTY_DB_URL_SECRET_ARN" \
            -var "twenty_encryption_key_secret_arn=$TWENTY_ENCRYPTION_KEY_SECRET_ARN" \
            -var "twenty_public_url=$TWENTY_PUBLIC_URL" \
            -var "twenty_certificate_arn=$TWENTY_CERTIFICATE_ARN" \
            -var "enable_workspace_orchestration=true" \
            -var "api_auth_secret=${{ secrets.API_AUTH_SECRET }}" \
            -var "mapbox_public_token=${{ secrets.MAPBOX_PUBLIC_TOKEN || '' }}" \
            -var "google_oauth_client_id=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}" \
            -var "google_oauth_client_secret=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}" \
            -var "lambda_zips_dir=$LAMBDA_DIR" \
            -var "pre_signup_lambda_zip=$PRE_SIGNUP_ZIP" \
            -var "platform_operator_emails=$THINKWORK_PLATFORM_OPERATOR_EMAILS" \
            -var "www_domain=${{ vars.WWW_DOMAIN }}" \
            -var "cloudflare_zone_id=${{ vars.CLOUDFLARE_ZONE_ID }}" \
            -var "ses_inbound_domain=agents.thinkwork.ai" \
            -var "ses_parent_domain=thinkwork.ai" \
            -var 'tenant_slugs=["academic-bobcat-897","sleek-squirrel-230"]' \
            -var "stripe_price_ids_json=${{ vars.STRIPE_PRICE_IDS_JSON || '{}' }}" \
            -var "agentcore_code_interpreter_id=${{ vars.AGENTCORE_CODE_INTERPRETER_ID || '' }}" \
            -var "agentcore_memory_id=${{ vars.AGENTCORE_MEMORY_ID || '' }}" \
            -var "mcp_custom_domain=${{ vars.MCP_CUSTOM_DOMAIN }}" \
            -var "mcp_custom_domain_ready=${{ vars.MCP_CUSTOM_DOMAIN_READY || 'false' }}"

      - name: Restart Twenty CRM runtime after database prep
        working-directory: terraform/examples/greenfield
        run: |
          set -euo pipefail
          if [ "${TWENTY_PROVISIONED:-false}" != "true" ] || [ "${TWENTY_RUNTIME_ENABLED:-false}" != "true" ]; then
            echo "Twenty CRM runtime is not enabled; skipping ECS restart."
            exit 0
          fi

          source ../../../scripts/lib/terraform-output.sh
          cluster_arn=$(tf_output_raw twenty_cluster_arn 2>/dev/null || echo "")
          server_service=$(tf_output_raw twenty_server_service_name 2>/dev/null || echo "")
          worker_service=$(tf_output_raw twenty_worker_service_name 2>/dev/null || echo "")

          if [ -z "$cluster_arn" ] || [ -z "$server_service" ] || [ -z "$worker_service" ]; then
            echo "::error::Twenty CRM runtime is enabled but ECS service outputs are missing."
            exit 1
          fi

          aws ecs update-service \
            --cluster "$cluster_arn" \
            --service "$server_service" \
            --force-new-deployment >/dev/null
          aws ecs update-service \
            --cluster "$cluster_arn" \
            --service "$worker_service" \
            --force-new-deployment >/dev/null
          aws ecs wait services-stable \
            --cluster "$cluster_arn" \
            --services "$server_service" "$worker_service"

      - name: Destroy Twenty CRM retained data
        working-directory: terraform/examples/greenfield
        run: |
          set -euo pipefail
          if [ "${TWENTY_DESTROY_DATA:-false}" != "true" ]; then
            echo "Twenty CRM destructive cleanup not requested; skipping retained data cleanup."
            exit 0
          fi
          if [ "${TWENTY_PROVISIONED:-false}" = "true" ] || [ "${TWENTY_RUNTIME_ENABLED:-false}" = "true" ]; then
            echo "::error::Refusing destructive cleanup while Twenty CRM is still provisioned or runtime-enabled."
            exit 1
          fi
          source ../../../scripts/lib/terraform-output.sh

          DB_ENDPOINT=$(tf_output_raw db_cluster_endpoint 2>/dev/null || echo "")
          DB_SECRET_ARN=$(tf_output_raw db_secret_arn 2>/dev/null || echo "")
          if [ -z "$DB_ENDPOINT" ] || [ -z "$DB_SECRET_ARN" ]; then
            echo "::error::Twenty CRM destructive cleanup requires existing database outputs."
            exit 1
          fi

          admin_password=$(aws secretsmanager get-secret-value \
            --secret-id "$DB_SECRET_ARN" \
            --query SecretString --output text | jq -r .password)
          echo "::add-mask::$admin_password"
          export DATABASE_URL="postgresql://thinkwork_admin:${admin_password}@${DB_ENDPOINT}:5432/thinkwork?sslmode=require"

          psql "$DATABASE_URL" \
            -v ON_ERROR_STOP=1 \
            -v twenty_user="$TWENTY_DB_USERNAME" \
            -v twenty_db="$TWENTY_DB_NAME" <<'SQL'
          SELECT format('REVOKE CONNECT ON DATABASE %I FROM PUBLIC', :'twenty_db')
          WHERE EXISTS (SELECT 1 FROM pg_database WHERE datname = :'twenty_db')
          \gexec

          SELECT pg_terminate_backend(pid)
          FROM pg_stat_activity
          WHERE datname = :'twenty_db'
            AND pid <> pg_backend_pid();

          SELECT format('DROP DATABASE IF EXISTS %I', :'twenty_db')
          \gexec
          SELECT format('DROP ROLE IF EXISTS %I', :'twenty_user')
          \gexec
          SQL

          delete_secret_if_present() {
            local selector="$1"
            local label="$2"
            if [ -z "$selector" ]; then
              echo "Twenty CRM ${label} secret selector is empty; skipping."
              return
            fi
            local arn
            arn=$(aws secretsmanager describe-secret \
              --secret-id "$selector" \
              --query ARN --output text 2>/dev/null || echo "")
            if [ -z "$arn" ] || [ "$arn" = "None" ]; then
              echo "Twenty CRM ${label} secret not found; skipping."
              return
            fi
            aws secretsmanager delete-secret \
              --secret-id "$arn" \
              --force-delete-without-recovery >/dev/null
            echo "Deleted Twenty CRM ${label} secret."
          }

          delete_secret_if_present "${TWENTY_DB_URL_SECRET_ARN:-$TWENTY_DB_URL_SECRET_ID}" "database URL"
          delete_secret_if_present "${TWENTY_ENCRYPTION_KEY_SECRET_ARN:-$TWENTY_ENCRYPTION_KEY_SECRET_ID}" "encryption key"

  # ── Database migration drift check ──────────────────────────────
  # Runs `scripts/db-migrate-manual.sh` against the dev DB after
  # terraform-apply has ensured the cluster exists. Fails the deploy if
  # any hand-rolled .sql file in packages/database-pg/drizzle/ (i.e.
  # one not registered in meta/_journal.json) declares objects missing
  # from the DB, forcing an operator to apply them via
  # `psql "$DATABASE_URL" -f <file>` before redeploying.
  #
  # Why this exists: three drift incidents in five days (Apr 17 mig
  # 0008; Apr 18 mig 0012 collision; Apr 21 migs 0018+0019) all had
  # the same root cause — hand-rolled migrations are outside
  # drizzle-kit's journal and have no automated drift detection. This
  # gate turns drift into a deploy-time error instead of a runtime
  # surprise. Captures the deferred fix named in session 3fdbdb0c
  # (Apr 17) that stayed open across two incidents.
  #
  # Scope: manual-track only (drizzle/*.sql not in meta/_journal.json).
  # Journal-track drift detection is a separate follow-up. If
  # migration-drift-check surfaces false positives or blocks
  # legitimate deploys, an operator can re-run the workflow after
  # applying the missing migrations via `psql`.
  # ── Compliance role bootstrap ────────────────────────────────────
  # Phase 3 U2 chicken-egg: terraform-apply creates the three Secrets
  # Manager containers (writer/drainer/reader), but only the bootstrap
  # script can populate values + create the matching Aurora roles +
  # apply 0070_compliance_aurora_roles.sql with psql variable
  # substitution. Without this step, migration-drift-check below would
  # report the three creates-role: markers as MISSING after every deploy
  # until an operator manually ran the bootstrap.
  #
  # The script is idempotent across re-runs: it reads existing Secrets
  # Manager values and re-uses them on subsequent deploys (no password
  # rotation), only auto-generating on greenfield. Safe to run on every
  # deploy.
  #
  # Runs AFTER terraform-apply (containers must exist) and BEFORE
  # migration-drift-check (drift gate verifies the roles created here).
  update-agentcore-runtimes:
    name: Update AgentCore Runtimes
    needs: [build-container, terraform-apply]
    # Belt-and-suspenders for the build-container/terraform-apply gate
    # coupling: when `runtime_container_stale=true` forces a container
    # rebuild on a docs-only push, terraform-apply's gate fires too (the
    # OR list above includes runtime_container_stale), so the strict
    # success-only check works today. Accepting `skipped` keeps this
    # job firing even if a future edit narrows terraform-apply's gate
    # without also widening this one. Prevents the silent-pin failure
    # mode in docs/solutions/workflow-issues/agentcore-runtime-no-auto
    # -repull-requires-explicit-update-2026-04-24.md.
    if: >-
      always()
      && needs.build-container.result == 'success'
      && (needs.terraform-apply.result == 'success' || needs.terraform-apply.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Pi AgentCore runtime
        run: |
          set -euo pipefail
          REPO="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/thinkwork-${{ env.STAGE }}-agentcore"
          bash scripts/update-agentcore-runtime-image.sh \
            --stage ${{ env.STAGE }} \
            --region ${{ env.AWS_REGION }} \
            --runtime pi \
            --image "${REPO}:${{ github.sha }}-pi-arm64" \
            --account-id ${{ secrets.AWS_ACCOUNT_ID }} \
            --wait-seconds 900

  # ── Database migration drift check ──────────────────────────────
  # Runs `scripts/db-migrate-manual.sh` against the dev DB after
  # terraform-apply has ensured the cluster exists. Fails the deploy if
  # any hand-rolled .sql file in packages/database-pg/drizzle/ (i.e.
  # one not registered in meta/_journal.json) declares objects missing
  # from the DB, forcing an operator to apply them via
  # `psql "$DATABASE_URL" -f <file>` before redeploying.
  #
  # Why this exists: three drift incidents in five days (Apr 17 mig
  # 0008; Apr 18 mig 0012 collision; Apr 21 migs 0018+0019) all had
  # the same root cause — hand-rolled migrations are outside
  # drizzle-kit's journal and have no automated drift detection. This
  # gate turns drift into a deploy-time error instead of a runtime
  # surprise. Captures the deferred fix named in session 3fdbdb0c
  # (Apr 17) that stayed open across two incidents.
  #
  # Scope: manual-track only (drizzle/*.sql not in meta/_journal.json).
  # Journal-track drift detection is a separate follow-up. If
  # migration-drift-check surfaces false positives or blocks
  # legitimate deploys, an operator can re-run the workflow after
  # applying the missing migrations via `psql`.
  # ── Compliance role bootstrap ────────────────────────────────────
  # Phase 3 U2 chicken-egg: terraform-apply creates the three Secrets
  # Manager containers (writer/drainer/reader), but only the bootstrap
  # script can populate values + create the matching Aurora roles +
  # apply 0070_compliance_aurora_roles.sql with psql variable
  # substitution. Without this step, migration-drift-check below would
  # report the three creates-role: markers as MISSING after every deploy
  # until an operator manually ran the bootstrap.
  #
  # The script is idempotent across re-runs: it reads existing Secrets
  # Manager values and re-uses them on subsequent deploys (no password
  # rotation), only auto-generating on greenfield. Safe to run on every
  # deploy.
  #
  # Runs AFTER terraform-apply (containers must exist) and BEFORE
  # migration-drift-check (drift gate verifies the roles created here).

  compliance-bootstrap:
    name: Compliance Role Bootstrap
    needs: [terraform-apply]
    if: always() && needs.terraform-apply.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install psql + jq
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client jq

      - name: Run compliance role bootstrap
        env:
          STAGE: ${{ env.STAGE }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: bash scripts/bootstrap-compliance-roles.sh

  migration-drift-check:
    name: Migration Drift Check
    needs: [terraform-apply, compliance-bootstrap]
    # TEMPORARILY DISABLED — the drift gate fires ~150 separate psql
    # connections on every deploy and intermittently exits 1 on
    # transient RDS connection-rate / network blips, blocking deploys
    # with no actionable signal (the inner invocation inside
    # bootstrap-compliance-roles.sh redirects output to /dev/null).
    # Re-enable by restoring the original
    #   if: always() && needs.terraform-apply.result == 'success' && needs.compliance-bootstrap.result == 'success'
    # once the drift gate is rewritten to share a single psql
    # connection (or moved off the deploy critical path entirely).
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Get DB endpoint + secret
        id: outputs
        working-directory: terraform/examples/greenfield
        run: |
          terraform init
          terraform workspace select ${{ env.STAGE }} || terraform workspace new ${{ env.STAGE }}
          source ../../../scripts/lib/terraform-output.sh
          echo "db_endpoint=$(tf_output_raw db_cluster_endpoint)" >> "$GITHUB_OUTPUT"
          echo "db_secret_arn=$(tf_output_raw db_secret_arn)" >> "$GITHUB_OUTPUT"

      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Run drift check
        run: |
          DB_PASS=$(aws secretsmanager get-secret-value \
            --secret-id "${{ steps.outputs.outputs.db_secret_arn }}" \
            --query SecretString --output text | jq -r .password)
          # db-migrate-manual.sh shells out to psql, which rejects the
          # `sslmode=no-verify` extension (it's a Node pg driver value,
          # not a Postgres / psql one). Use sslmode=require instead —
          # same RDS-compatible behavior (encrypt, don't verify CA) but
          # actually accepted by psql. scripts/bootstrap-workspace.sh
          # sed-replaces no-verify → require for the same reason; this
          # fix applies the substitution up-front so the drift step
          # doesn't need the sed dance.
          export DATABASE_URL="postgresql://thinkwork_admin:${DB_PASS}@${{ steps.outputs.outputs.db_endpoint }}:5432/thinkwork?sslmode=require"
          bash scripts/db-migrate-manual.sh

  # NOTE: the web app (apps/web → app.thinkwork.ai) is intentionally NOT
  # deployed on every push to main. It now ships only when a desktop release is
  # cut (release-desktop.yml on a `desktop-v*` tag), so the web app and the
  # desktop app always update together. See the `build-web` step there.

  # ── Build & deploy docs site ────────────────────────────────────
  build-docs:
    name: Build & Deploy Docs
    needs: [terraform-apply]
    if: always() && (needs.terraform-apply.result == 'success' || needs.terraform-apply.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform/examples/greenfield
        run: |
          terraform init
          terraform workspace select ${{ env.STAGE }} || terraform workspace new ${{ env.STAGE }}

      - name: Build & deploy
        run: bash scripts/build-docs.sh ${{ env.STAGE }}

  # ── Bootstrap workspace defaults ─────────────────────────────────
  # Originally gated on migration-drift-check so workspace default seeding
  # never ran against an unmigrated schema. With the drift gate temporarily
  # disabled (see the migration-drift-check job above), bootstrap now runs
  # whenever terraform-apply succeeds; restore the drift-check dependency
  # when the gate is re-enabled.
  bootstrap:
    name: Bootstrap
    needs: [detect-changes, terraform-apply]
    # Allow terraform-apply == skipped: workspace S3 bucket exists from
    # prior applies; this job only syncs workspace-default content into it.
    if: >-
      always()
      && (needs.terraform-apply.result == 'success' || needs.terraform-apply.result == 'skipped')
      && (
        needs.detect-changes.outputs.workspace_defaults == 'true' ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Get deploy outputs
        id: outputs
        working-directory: terraform/examples/greenfield
        run: |
          terraform init
          terraform workspace select ${{ env.STAGE }} || terraform workspace new ${{ env.STAGE }}
          TF_OUTPUT_JSON="$(terraform output -json)"
          tf_output_cached_raw() {
            jq -er --arg name "$1" '.[$name].value | if type == "string" then . else @json end' <<<"$TF_OUTPUT_JSON"
          }
          echo "bucket=$(tf_output_cached_raw bucket_name)" >> "$GITHUB_OUTPUT"
          echo "db_endpoint=$(tf_output_cached_raw db_cluster_endpoint)" >> "$GITHUB_OUTPUT"
          echo "db_secret_arn=$(tf_output_cached_raw db_secret_arn)" >> "$GITHUB_OUTPUT"

      - name: Run bootstrap
        run: |
          DB_PASS=$(aws secretsmanager get-secret-value --secret-id "${{ steps.outputs.outputs.db_secret_arn }}" --query SecretString --output text | jq -r .password)
          DB_URL="postgresql://thinkwork_admin:${DB_PASS}@${{ steps.outputs.outputs.db_endpoint }}:5432/thinkwork?sslmode=no-verify"
          bash scripts/bootstrap-workspace.sh ${{ env.STAGE }} ${{ steps.outputs.outputs.bucket }} "$DB_URL"

      # Plan §008 U4 — version-aware reseed of every existing tenant's
      # _catalog/defaults/workspace/ prefix. The bootstrap script's per-tenant
      # block above only seeds tenants whose prefix is sparse (<11 files); it
      # has no concept of DEFAULTS_VERSION, so a content-only update (e.g.
      # U3's bump to v4 for the new AGENTS.md / CONTEXT.md) would never reach
      # tenants that already have a populated prefix. The handler below diffs
      # each tenant's stored `_defaults_version` marker against the constant
      # and rewrites only when stale — idempotent on subsequent deploys.
      - name: Reseed workspace-defaults to existing tenants (version-aware)
        run: |
          DB_PASS=$(aws secretsmanager get-secret-value --secret-id "${{ steps.outputs.outputs.db_secret_arn }}" --query SecretString --output text | jq -r .password)
          export DATABASE_URL="postgresql://thinkwork_admin:${DB_PASS}@${{ steps.outputs.outputs.db_endpoint }}:5432/thinkwork?sslmode=no-verify"
          export WORKSPACE_BUCKET="${{ steps.outputs.outputs.bucket }}"
          npx tsx packages/api/src/handlers/seed-workspace-defaults.ts

  workspace-layout-migration:
    name: Workspace Layout Migration
    needs: [detect-changes, terraform-apply]
    if: >-
      always()
      && needs.terraform-apply.result == 'success'
      && (
        needs.detect-changes.outputs.lambdas == 'true' ||
        needs.detect-changes.outputs.container == 'true' ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Get deploy outputs
        id: outputs
        working-directory: terraform/examples/greenfield
        run: |
          terraform init
          terraform workspace select ${{ env.STAGE }} || terraform workspace new ${{ env.STAGE }}
          TF_OUTPUT_JSON="$(terraform output -json)"
          tf_output_cached_raw() {
            jq -er --arg name "$1" '.[$name].value | if type == "string" then . else @json end' <<<"$TF_OUTPUT_JSON"
          }
          echo "bucket=$(tf_output_cached_raw bucket_name)" >> "$GITHUB_OUTPUT"
          echo "db_endpoint=$(tf_output_cached_raw db_cluster_endpoint)" >> "$GITHUB_OUTPUT"
          echo "db_secret_arn=$(tf_output_cached_raw db_secret_arn)" >> "$GITHUB_OUTPUT"

      - name: Migrate tuple workspace source layout
        run: |
          DB_PASS=$(aws secretsmanager get-secret-value \
            --secret-id "${{ steps.outputs.outputs.db_secret_arn }}" \
            --query SecretString --output text | jq -r .password)
          export DATABASE_URL="postgresql://thinkwork_admin:${DB_PASS}@${{ steps.outputs.outputs.db_endpoint }}:5432/thinkwork?sslmode=no-verify"
          pnpm exec tsx scripts/migrate-workspace-layout.mts \
            --apply \
            --delete-legacy-sources \
            --workspace-bucket "${{ steps.outputs.outputs.bucket }}"

  # ── Deploy summary ──────────────────────────────────────────────
  summary:
    name: Deploy Summary
    needs:
      [
        detect-changes,
        build-container,
        terraform-apply,
        update-agentcore-runtimes,
        migration-drift-check,
        build-docs,
        bootstrap,
        workspace-layout-migration,
      ]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # post-deploy.sh's image_contains_source_sha() needs `git cat-file
        # -e <sha>^{commit}` to succeed on both the active runtime image's
        # source sha and the required source sha. With the default depth=1
        # only HEAD is fetched, so any prior-commit sha (the typical case
        # when the merge that triggered the deploy didn't touch the
        # container) fails the existence check and the verifier reports a
        # false-negative drift even when image and source are identical.
        with:
          fetch-depth: 0

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Terraform init
        working-directory: terraform/examples/greenfield
        run: |
          terraform init
          terraform workspace select ${{ env.STAGE }} || terraform workspace new ${{ env.STAGE }}

      - name: Verify AgentCore runtime image
        run: |
          bash scripts/post-deploy.sh \
            --stage ${{ env.STAGE }} \
            --region ${{ env.AWS_REGION }} \
            --runtime pi \
            --min-source-sha ${{ needs.detect-changes.outputs.pi_container_source_sha }} \
            --strict

      - name: Fat-folder composed-tree smoke
        if: github.event_name == 'workflow_dispatch' && inputs.run_smokes == true
        timeout-minutes: 5
        run: |
          bash scripts/post-deploy-smoke-fat-folder.sh \
            --stage ${{ env.STAGE }} \
            --region ${{ env.AWS_REGION }}

      - name: Record deployment status pointer
        working-directory: terraform/examples/greenfield
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ needs.terraform-apply.result }}" != "success" ]; then
            echo "Skipping success status pointer because Terraform Apply result was ${{ needs.terraform-apply.result }}."
            exit 0
          fi

          source ../../../scripts/lib/terraform-output.sh
          evidence_bucket="$(tf_output_raw deployment_evidence_bucket_name 2>/dev/null || echo "")"
          if [ -z "$evidence_bucket" ] || [ "$evidence_bucket" = "null" ]; then
            echo "No deployment evidence bucket output; skipping deployment status pointer."
            exit 0
          fi

          state_machine_arn="$(tf_output_raw deployment_state_machine_arn 2>/dev/null || echo "")"
          runner_project_name="$(tf_output_raw deployment_runner_project_name 2>/dev/null || echo "")"
          release_tag="$(git tag --points-at "$GITHUB_SHA" --list 'v*' --sort=-version:refname | head -1 || true)"
          release_version=""
          if [ -z "$release_tag" ]; then
            # Dev deploys from source on every merge, so the deployed commit
            # is rarely an exact tag commit. Describe against the nearest
            # reachable release tag so the operator-facing label stays
            # version-shaped (v0.1.0-canary.175+2 = two merges past
            # canary.175) instead of an opaque source-<sha> marker.
            described="$(git describe --tags --match 'v*' "$GITHUB_SHA" 2>/dev/null || true)"
            if [[ "$described" =~ ^(v.+)-([0-9]+)-g[0-9a-f]+$ ]]; then
              release_version="${BASH_REMATCH[1]}+${BASH_REMATCH[2]}"
            fi
          fi
          release_version="${release_version:-${release_tag:-source-${GITHUB_SHA:0:12}}}"
          manifest_url=""
          manifest_sha256=""

          if [[ "$release_tag" == v* ]]; then
            manifest_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_tag}/thinkwork-release.json"
            tmpdir="$(mktemp -d)"
            if gh release download "$release_tag" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern thinkwork-release.json \
              --dir "$tmpdir"; then
              manifest_sha256="$(shasum -a 256 "$tmpdir/thinkwork-release.json" | awk '{print $1}')"
            else
              echo "Release manifest is not published yet for ${release_tag}; release.yml will refresh the pointer after finalization."
            fi
            rm -rf "$tmpdir"
          fi

          ../../../scripts/release/write-deployment-status.sh \
            --stage "${{ env.STAGE }}" \
            --bucket "$evidence_bucket" \
            --release-version "$release_version" \
            --manifest-url "$manifest_url" \
            --manifest-sha256 "$manifest_sha256" \
            --commit "$GITHUB_SHA" \
            --source "github-actions" \
            --status "succeeded" \
            --state-machine-arn "$state_machine_arn" \
            --runner-project-name "$runner_project_name" \
            --github-repository "$GITHUB_REPOSITORY" \
            --github-run-id "$GITHUB_RUN_ID" \
            --github-run-at "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" \
            --github-run-attempt "$GITHUB_RUN_ATTEMPT" \
            --github-ref "$GITHUB_REF" \
            --github-workflow "$GITHUB_WORKFLOW" \
            --github-actor "$GITHUB_ACTOR"

      - name: Show deployment URLs
        working-directory: terraform/examples/greenfield
        run: |
          source ../../../scripts/lib/terraform-output.sh
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║                    DEPLOYMENT SUMMARY                       ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║ Stage: ${{ env.STAGE }}"
          echo "║"
          echo "║ Web App:    $(tf_output_raw app_url || echo 'N/A')"
          echo "║ Docs Site:  $(tf_output_raw docs_url || echo 'N/A')"
          echo "║ API:        $(tf_output_raw api_endpoint || echo 'N/A')"
          echo "║ AppSync:    $(tf_output_raw appsync_api_url || echo 'N/A')"
          echo "║ Hindsight:  $(tf_output_raw hindsight_endpoint || echo 'N/A')"
          echo "║ S3 Bucket:  $(tf_output_raw bucket_name || echo 'N/A')"
          echo "║ Database:   $(tf_output_raw db_cluster_endpoint || echo 'N/A')"
          echo "║ ECR:        $(tf_output_raw ecr_repository_url || echo 'N/A')"
          echo "║ Memory:     managed (always on)"
          echo "║ Hindsight:  $(tf_output_raw hindsight_enabled || echo 'N/A')"
          echo "║"
          echo "║ Job Results:"
          echo "║   Terraform Apply:        ${{ needs.terraform-apply.result }}"
          echo "║   AgentCore Runtime:      ${{ needs.update-agentcore-runtimes.result }}"
          echo "║   Migration Drift Check:  ${{ needs.migration-drift-check.result }}"
          echo "║   Build Docs:             ${{ needs.build-docs.result }}"
          echo "║   Bootstrap:              ${{ needs.bootstrap.result }}"
          echo "╚══════════════════════════════════════════════════════════════╝"
