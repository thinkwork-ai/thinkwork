name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_container:
        description: "Skip container build"
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  STAGE: dev

jobs:
  # ── Detect what changed ──────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      lambdas: ${{ steps.filter.outputs.lambdas }}
      container: ${{ steps.filter.outputs.container }}
      container_source_sha: ${{ steps.container-source.outputs.sha }}
      strands_container_source_sha: ${{ steps.container-source.outputs.strands_sha }}
      flue_container_source_sha: ${{ steps.container-source.outputs.flue_sha }}
      runtime_container_stale: ${{ steps.runtime-image.outputs.stale }}
      terraform: ${{ steps.filter.outputs.terraform }}
      skills: ${{ steps.filter.outputs.skills }}
      admin: ${{ steps.filter.outputs.admin }}
      docs: ${{ steps.filter.outputs.docs }}
      www: ${{ steps.filter.outputs.www }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            lambdas:
              - 'packages/api/**'
              - 'packages/database-pg/**'
            container:
              - 'packages/agentcore-strands/**'
              - 'packages/agentcore-flue/**'
              - 'packages/agentcore/**'
              # Build config changes count as container changes — a
              # platform or base-image tweak must rebuild even if no
              # Python source moved.
              - '.github/workflows/deploy.yml'
            terraform:
              - 'terraform/**'
            skills:
              - 'packages/skill-catalog/**'
              - 'packages/workspace-defaults/files/**'
            admin:
              - 'apps/admin/**'
            docs:
              - 'docs/**'
            www:
              - 'apps/www/**'

      - name: Latest AgentCore container source commit
        id: container-source
        run: |
          set -euo pipefail
          STRANDS_SHA=$(git log -1 --format=%H -- \
            packages/agentcore-strands \
            packages/agentcore \
            .github/workflows/deploy.yml)
          FLUE_SHA=$(git log -1 --format=%H -- \
            packages/agentcore-flue \
            packages/agentcore \
            .github/workflows/deploy.yml)
          echo "sha=$STRANDS_SHA" >> "$GITHUB_OUTPUT"
          echo "strands_sha=$STRANDS_SHA" >> "$GITHUB_OUTPUT"
          echo "flue_sha=$FLUE_SHA" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Detect stale deployed AgentCore image
        id: runtime-image
        run: |
          set -euo pipefail
          stale=false
          check_runtime() {
            local runtime="$1"
            local source_sha="$2"
            local runtime_id
            runtime_id=$(aws ssm get-parameter \
              --name /thinkwork/${{ env.STAGE }}/agentcore/runtime-id-${runtime} \
              --region ${{ env.AWS_REGION }} \
              --query Parameter.Value --output text 2>/dev/null || echo "")
            if [ -z "$runtime_id" ] || [ "$runtime_id" = "None" ]; then
              echo "No ${runtime} runtime ID in SSM yet."
              return 0
            fi
            local image
            image=$(aws bedrock-agentcore-control get-agent-runtime \
              --region ${{ env.AWS_REGION }} \
              --agent-runtime-id "$runtime_id" \
              --query 'agentRuntimeArtifact.containerConfiguration.containerUri' \
              --output text 2>/dev/null || echo "")
            local tag="${image##*:}"
            local image_sha=""
            if [[ "$tag" =~ ([0-9a-f]{40}) ]]; then
              image_sha="${BASH_REMATCH[1]}"
            fi
            if [ -n "$image_sha" ] && git cat-file -e "${image_sha}^{commit}" 2>/dev/null && git merge-base --is-ancestor "$source_sha" "$image_sha"; then
              echo "${runtime} AgentCore runtime image $image_sha includes latest container source $source_sha."
            else
              stale=true
              echo "${runtime} AgentCore runtime image ${image_sha:-unknown} is stale; latest container source is $source_sha."
            fi
          }
          check_runtime strands "${{ steps.container-source.outputs.strands_sha }}"
          check_runtime flue "${{ steps.container-source.outputs.flue_sha }}"
          echo "stale=$stale" >> "$GITHUB_OUTPUT"

  # ── Build Lambda zips ────────────────────────────────────────────
  # Always build — TF needs the zips to keep API Gateway routes intact.
  # Only ~50s with esbuild, cheaper than debugging empty-handler destroys.
  build-lambdas:
    name: Build Lambdas
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: bash scripts/build-lambdas.sh
      - uses: actions/upload-artifact@v4
        with:
          name: lambda-zips
          path: dist/lambdas/
          retention-days: 1

  # ── Build + push AgentCore container ─────────────────────────────
  build-container:
    name: Build Container
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.container == 'true' ||
      needs.detect-changes.outputs.runtime_container_stale == 'true' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Multi-arch QEMU builds are 3-5x slower than single-arch native.
    # 30 is comfortable headroom; 20 was already tight for the old
    # amd64-only build with playwright installed.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      # QEMU lets the amd64 GHA runner cross-build the arm64 variant.
      # setup-buildx-action auto-installs this in most cases but
      # pinning the action is cheap and makes multi-arch reliable.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      # Two single-platform builds, not a manifest list.
      #
      # Lambda's UpdateFunctionCode rejects OCI manifest lists with
      # "image manifest, config or layer media type ... is not
      # supported". Bedrock AgentCore Runtime wants arm64.
      # Emitting two separate tags lets each consumer point at a
      # single-platform image it can actually pull. Layers are shared
      # via the GHA cache so the second build reuses everything up to
      # the platform-specific steps.

      - name: Compute build timestamp
        id: build_time
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push amd64 (Lambda)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/agentcore-strands/agent-container/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/thinkwork-${{ env.STAGE }}-agentcore:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/thinkwork-${{ env.STAGE }}-agentcore:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.build_time.outputs.value }}
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,scope=amd64,mode=max
          provenance: false

      - name: Build and push Flue amd64 (Lambda)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/agentcore-flue/agent-container/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/thinkwork-${{ env.STAGE }}-agentcore:${{ github.sha }}-flue
            ${{ steps.ecr.outputs.registry }}/thinkwork-${{ env.STAGE }}-agentcore:flue-latest
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.build_time.outputs.value }}
          cache-from: type=gha,scope=flue-amd64
          cache-to: type=gha,scope=flue-amd64,mode=max
          provenance: false

      - name: Build and push arm64 (AgentCore Runtime)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/agentcore-strands/agent-container/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/thinkwork-${{ env.STAGE }}-agentcore:${{ github.sha }}-arm64
            ${{ steps.ecr.outputs.registry }}/thinkwork-${{ env.STAGE }}-agentcore:latest-arm64
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.build_time.outputs.value }}
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,scope=arm64,mode=max
          provenance: false

      - name: Build and push Flue arm64 (AgentCore Runtime)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/agentcore-flue/agent-container/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/thinkwork-${{ env.STAGE }}-agentcore:${{ github.sha }}-flue-arm64
            ${{ steps.ecr.outputs.registry }}/thinkwork-${{ env.STAGE }}-agentcore:flue-latest-arm64
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.build_time.outputs.value }}
          cache-from: type=gha,scope=flue-arm64
          cache-to: type=gha,scope=flue-arm64,mode=max
          provenance: false

      - name: Update Lambda function code (x86_64)
        run: |
          aws lambda update-function-code \
            --function-name thinkwork-${{ env.STAGE }}-agentcore \
            --image-uri ${{ steps.ecr.outputs.registry }}/thinkwork-${{ env.STAGE }}-agentcore:${{ github.sha }} \
            --region ${{ env.AWS_REGION }}
          aws lambda wait function-updated \
            --function-name thinkwork-${{ env.STAGE }}-agentcore \
            --region ${{ env.AWS_REGION }}

      - name: Update Flue Lambda function code (x86_64)
        run: |
          if aws lambda get-function \
            --function-name thinkwork-${{ env.STAGE }}-agentcore-flue \
            --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
            aws lambda update-function-code \
              --function-name thinkwork-${{ env.STAGE }}-agentcore-flue \
              --image-uri ${{ steps.ecr.outputs.registry }}/thinkwork-${{ env.STAGE }}-agentcore:${{ github.sha }}-flue \
              --region ${{ env.AWS_REGION }}
            aws lambda wait function-updated \
              --function-name thinkwork-${{ env.STAGE }}-agentcore-flue \
              --region ${{ env.AWS_REGION }}
          else
            echo "Flue Lambda function not found yet; terraform apply will create it from flue-latest."
          fi

      - name: Update AgentCore Runtime (arm64 variant)
        # Bedrock AgentCore Runtime doesn't repull on its own — it pins
        # to whatever containerUri UpdateAgentRuntime last set. Without
        # this step the runtime keeps serving a previous build's arm64
        # image indefinitely, regardless of how many times we push the
        # tag. Idempotent: skips cleanly on greenfield stages where
        # the runtime SSM param hasn't been published yet (first
        # terraform-apply on that stage writes it).
        run: |
          set -euo pipefail
          RUNTIME_ID=$(aws ssm get-parameter \
            --name /thinkwork/${{ env.STAGE }}/agentcore/runtime-id-strands \
            --region ${{ env.AWS_REGION }} \
            --query Parameter.Value --output text 2>/dev/null || echo "")
          if [ -z "$RUNTIME_ID" ] || [ "$RUNTIME_ID" = "None" ]; then
            echo "No Strands runtime ID in SSM — skipping (first greenfield apply will create it)."
            exit 0
          fi
          # -arm64 suffix: UpdateAgentRuntime requires a single-platform
          # arm64 manifest. The unsuffixed ${sha} tag is amd64 (for
          # Lambda). Both point at the same commit's code.
          NEW_IMAGE="${{ steps.ecr.outputs.registry }}/thinkwork-${{ env.STAGE }}-agentcore:${{ github.sha }}-arm64"
          echo "Updating runtime $RUNTIME_ID to $NEW_IMAGE"
          # Preserve roleArn / network / protocol from the existing
          # runtime — hard-coding them here would drift from terraform.
          CURRENT=$(aws bedrock-agentcore-control get-agent-runtime \
            --region ${{ env.AWS_REGION }} \
            --agent-runtime-id "$RUNTIME_ID" \
            --output json)
          ROLE_ARN=$(echo "$CURRENT" | jq -r '.roleArn')
          NETWORK_MODE=$(echo "$CURRENT" | jq -r '.networkConfiguration.networkMode')
          SERVER_PROTOCOL=$(echo "$CURRENT" | jq -r '.protocolConfiguration.serverProtocol')
          aws bedrock-agentcore-control update-agent-runtime \
            --region ${{ env.AWS_REGION }} \
            --agent-runtime-id "$RUNTIME_ID" \
            --role-arn "$ROLE_ARN" \
            --network-configuration "networkMode=$NETWORK_MODE" \
            --protocol-configuration "serverProtocol=$SERVER_PROTOCOL" \
            --agent-runtime-artifact "containerConfiguration={containerUri=$NEW_IMAGE}" \
            --query '{version:agentRuntimeVersion,status:status,image:agentRuntimeArtifact.containerConfiguration.containerUri}' \
            --output json

      - name: Create or update Flue AgentCore Runtime (arm64 variant)
        run: |
          set -euo pipefail
          RUNTIME_NAME="thinkwork_${{ env.STAGE }}_flue"
          SSM_NAME="/thinkwork/${{ env.STAGE }}/agentcore/runtime-id-flue"
          NEW_IMAGE="${{ steps.ecr.outputs.registry }}/thinkwork-${{ env.STAGE }}-agentcore:${{ github.sha }}-flue-arm64"
          RUNTIME_ID=$(aws ssm get-parameter \
            --name "$SSM_NAME" \
            --region ${{ env.AWS_REGION }} \
            --query Parameter.Value --output text 2>/dev/null || echo "")
          if [ -z "$RUNTIME_ID" ] || [ "$RUNTIME_ID" = "None" ]; then
            RUNTIME_ID=$(aws bedrock-agentcore-control list-agent-runtimes \
              --region ${{ env.AWS_REGION }} \
              --query "agentRuntimes[?agentRuntimeName=='${RUNTIME_NAME}'].agentRuntimeId | [0]" \
              --output text 2>/dev/null || echo "")
          fi
          # Flue's IAM role split out of the Strands `agentcore-role` in plan §005 U2.
          # The role is provisioned by terraform module
          # `terraform/modules/app/agentcore-flue/main.tf` (resource
          # `aws_iam_role.agentcore_flue`). On the FIRST deploy of this stage
          # after the U2 module landed, terraform-apply creates the role —
          # but build-container runs BEFORE terraform-apply in the same
          # workflow run, so the role does not yet exist when this step
          # fires. The fallback below detects the missing role and reuses
          # the existing runtime's roleArn (which currently points at the
          # shared Strands role); the next deploy after terraform-apply
          # creates the role will pick up the canonical Flue role on the
          # update path. New stages where the role doesn't exist AND no
          # runtime exists yet (greenfield) must run terraform-apply once
          # before this step can create the runtime.
          DESIRED_ROLE_ARN="arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/thinkwork-${{ env.STAGE }}-agentcore-flue-role"
          ROLE_ARN="$DESIRED_ROLE_ARN"
          if ! aws iam get-role \
            --role-name "thinkwork-${{ env.STAGE }}-agentcore-flue-role" \
            --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
            ROLE_ARN=""  # signal "use existing / skip creation"
            echo "Flue IAM role not yet provisioned; will fall back to current runtime's role on the update path. Greenfield create path will fail loudly."
          fi
          if [ -z "$RUNTIME_ID" ] || [ "$RUNTIME_ID" = "None" ]; then
            if [ -z "$ROLE_ARN" ]; then
              echo "Cannot create greenfield Flue runtime: $DESIRED_ROLE_ARN does not exist. Run terraform-apply for the agentcore-flue module first to provision it, then retry."
              exit 1
            fi
            echo "Creating Flue AgentCore runtime $RUNTIME_NAME with $NEW_IMAGE"
            RUNTIME_ID=$(aws bedrock-agentcore-control create-agent-runtime \
              --region ${{ env.AWS_REGION }} \
              --agent-runtime-name "$RUNTIME_NAME" \
              --agent-runtime-artifact "containerConfiguration={containerUri=$NEW_IMAGE}" \
              --role-arn "$ROLE_ARN" \
              --network-configuration "networkMode=PUBLIC" \
              --protocol-configuration "serverProtocol=HTTP" \
              --query agentRuntimeId \
              --output text)
            aws ssm put-parameter \
              --name "$SSM_NAME" \
              --value "$RUNTIME_ID" \
              --type String \
              --overwrite \
              --region ${{ env.AWS_REGION }}
          else
            echo "Updating Flue runtime $RUNTIME_ID to $NEW_IMAGE"
            CURRENT=$(aws bedrock-agentcore-control get-agent-runtime \
              --region ${{ env.AWS_REGION }} \
              --agent-runtime-id "$RUNTIME_ID" \
              --output json)
            # Plan §005 U2: force the role to the new agentcore-flue-role on
            # every update so an existing dev runtime created in U1 against
            # the shared `agentcore-role` reconciles to the canonical Flue
            # role. Reading roleArn from CURRENT (the prior pattern) preserved
            # the stale role indefinitely. Fallback: when the new role does
            # not exist yet (terraform-apply hasn't run on this stage), keep
            # the runtime's CURRENT role so the update succeeds anyway.
            if [ -z "$ROLE_ARN" ]; then
              ROLE_ARN=$(echo "$CURRENT" | jq -r '.roleArn')
              echo "Reusing existing role: $ROLE_ARN (canonical Flue role will be adopted on the next deploy after terraform-apply creates it)"
            fi
            NETWORK_MODE=$(echo "$CURRENT" | jq -r '.networkConfiguration.networkMode // "PUBLIC"')
            SERVER_PROTOCOL=$(echo "$CURRENT" | jq -r '.protocolConfiguration.serverProtocol // "HTTP"')
            aws bedrock-agentcore-control update-agent-runtime \
              --region ${{ env.AWS_REGION }} \
              --agent-runtime-id "$RUNTIME_ID" \
              --role-arn "$ROLE_ARN" \
              --network-configuration "networkMode=$NETWORK_MODE" \
              --protocol-configuration "serverProtocol=$SERVER_PROTOCOL" \
              --agent-runtime-artifact "containerConfiguration={containerUri=$NEW_IMAGE}" \
              --query '{version:agentRuntimeVersion,status:status,image:agentRuntimeArtifact.containerConfiguration.containerUri}' \
              --output json
          fi

          echo "Flue AgentCore runtime visible:"
          aws bedrock-agentcore-control get-agent-runtime \
            --region ${{ env.AWS_REGION }} \
            --agent-runtime-id "$RUNTIME_ID" \
            --query '{id:agentRuntimeId,name:agentRuntimeName,status:status,image:agentRuntimeArtifact.containerConfiguration.containerUri}' \
            --output json

  # ── Terraform apply ──────────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    needs: [build-lambdas, build-container]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3

      - uses: actions/download-artifact@v4
        with:
          name: lambda-zips
          path: dist/lambdas/
        continue-on-error: true

      - name: Terraform Init
        working-directory: terraform/examples/greenfield
        run: |
          terraform init
          terraform workspace select ${{ env.STAGE }} || terraform workspace new ${{ env.STAGE }}

      # Plan §005 U3 — agents.runtime backfill `pi` → `flue`. Runs BEFORE the
      # Terraform apply that updates the dispatcher Lambda code so the new
      # AgentRuntimeType union (`strands` | `flue`) never sees a `pi` value
      # it can't route. Idempotent: WHERE runtime = 'pi' is a no-op once the
      # rows are gone, so subsequent deploys are clean.
      #
      # Skips cleanly on greenfield (no existing terraform state → no DB
      # endpoint output → step exits 0 without running psql). Once the
      # stage has applied terraform-apply once, subsequent runs of this
      # step have a real DB endpoint and apply the backfill.
      - name: Install psql (U3 backfill)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Backfill agents.runtime pi → flue (plan §005 U3)
        working-directory: terraform/examples/greenfield
        run: |
          set -euo pipefail
          source ../../../scripts/lib/terraform-output.sh
          DB_ENDPOINT=$(tf_output_raw db_cluster_endpoint 2>/dev/null || echo "")
          DB_SECRET_ARN=$(tf_output_raw db_secret_arn 2>/dev/null || echo "")
          if [ -z "$DB_ENDPOINT" ] || [ -z "$DB_SECRET_ARN" ]; then
            echo "Skipping pi → flue backfill: no existing DB outputs (greenfield apply)."
            exit 0
          fi
          DB_PASS=$(aws secretsmanager get-secret-value \
            --secret-id "$DB_SECRET_ARN" \
            --query SecretString --output text | jq -r .password)
          export DATABASE_URL="postgresql://thinkwork_admin:${DB_PASS}@${DB_ENDPOINT}:5432/thinkwork?sslmode=require"
          # ON_ERROR_STOP=1 + --single-transaction so a partial failure rolls
          # the whole migration back rather than leaving rows half-migrated.
          psql "$DATABASE_URL" \
            -v ON_ERROR_STOP=1 \
            --single-transaction \
            -f ../../../packages/database-pg/drizzle/0062_migrate_pi_to_flue.sql

      # Plan §005 U4 — adds threads.session_data jsonb so AuroraSessionStore
      # has a column to write into. Idempotent (`ADD COLUMN IF NOT EXISTS`),
      # so the same skip-on-greenfield short-circuit + repeat-run safety as
      # the U3 step. Runs BEFORE terraform-apply so the agentcore-flue Lambda
      # never picks up code that references a column the schema doesn't have
      # yet.
      - name: Add threads.session_data column (plan §005 U4)
        working-directory: terraform/examples/greenfield
        run: |
          set -euo pipefail
          source ../../../scripts/lib/terraform-output.sh
          DB_ENDPOINT=$(tf_output_raw db_cluster_endpoint 2>/dev/null || echo "")
          DB_SECRET_ARN=$(tf_output_raw db_secret_arn 2>/dev/null || echo "")
          if [ -z "$DB_ENDPOINT" ] || [ -z "$DB_SECRET_ARN" ]; then
            echo "Skipping threads.session_data column add: no existing DB outputs (greenfield apply)."
            exit 0
          fi
          DB_PASS=$(aws secretsmanager get-secret-value \
            --secret-id "$DB_SECRET_ARN" \
            --query SecretString --output text | jq -r .password)
          export DATABASE_URL="postgresql://thinkwork_admin:${DB_PASS}@${DB_ENDPOINT}:5432/thinkwork?sslmode=require"
          psql "$DATABASE_URL" \
            -v ON_ERROR_STOP=1 \
            --single-transaction \
            -f ../../../packages/database-pg/drizzle/0063_threads_session_data.sql

      - name: Terraform Apply
        working-directory: terraform/examples/greenfield
        env:
          # Cloudflare provider init requires a non-empty token even when
          # the www_dns module has count=0. Fall back to a placeholder when
          # the real secret isn't set — the provider only hits the API if
          # WWW_DOMAIN is also configured, which enables the module.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || 'placeholder-not-configured' }}
        run: |
          LAMBDA_DIR=""
          if [ -d "${{ github.workspace }}/dist/lambdas" ]; then
            LAMBDA_DIR="${{ github.workspace }}/dist/lambdas"
          fi
          PRE_SIGNUP_ZIP=""
          if [ -f "$LAMBDA_DIR/cognito-pre-signup.zip" ]; then
            PRE_SIGNUP_ZIP="$LAMBDA_DIR/cognito-pre-signup.zip"
          fi
          terraform apply -auto-approve \
            -var "stage=${{ env.STAGE }}" \
            -var "region=${{ env.AWS_REGION }}" \
            -var "account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var "db_password=${{ secrets.DB_PASSWORD }}" \
            -var "database_engine=aurora-serverless" \
            -var "enable_hindsight=true" \
            -var "enable_workspace_orchestration=true" \
            -var "api_auth_secret=${{ secrets.API_AUTH_SECRET }}" \
            -var "google_oauth_client_id=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}" \
            -var "google_oauth_client_secret=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}" \
            -var "lambda_zips_dir=$LAMBDA_DIR" \
            -var "pre_signup_lambda_zip=$PRE_SIGNUP_ZIP" \
            -var "www_domain=${{ vars.WWW_DOMAIN }}" \
            -var "cloudflare_zone_id=${{ vars.CLOUDFLARE_ZONE_ID }}" \
            -var "ses_inbound_domain=agents.thinkwork.ai" \
            -var "stripe_price_ids_json=${{ vars.STRIPE_PRICE_IDS_JSON || '{}' }}" \
            -var "agentcore_code_interpreter_id=${{ vars.AGENTCORE_CODE_INTERPRETER_ID || '' }}" \
            -var "mcp_custom_domain=${{ vars.MCP_CUSTOM_DOMAIN }}" \
            -var "mcp_custom_domain_ready=${{ vars.MCP_CUSTOM_DOMAIN_READY || 'false' }}"

  # ── Refresh AgentCore runtimes after Terraform ──────────────────
  # Terraform can update Lambda image tags and runtime-adjacent IAM/env
  # after the container job has already called UpdateAgentRuntime. Make
  # the final AgentCore image refresh happen after Terraform so the
  # deploy summary probes the state users will actually hit.
  update-agentcore-runtimes:
    name: Update AgentCore Runtimes
    needs: [build-container, terraform-apply]
    if: >-
      always()
      && needs.build-container.result == 'success'
      && needs.terraform-apply.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Strands and Flue AgentCore runtimes
        run: |
          set -euo pipefail
          REPO="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/thinkwork-${{ env.STAGE }}-agentcore"
          bash scripts/update-agentcore-runtime-image.sh \
            --stage ${{ env.STAGE }} \
            --region ${{ env.AWS_REGION }} \
            --runtime strands \
            --image "${REPO}:${{ github.sha }}-arm64" \
            --wait-seconds 900
          bash scripts/update-agentcore-runtime-image.sh \
            --stage ${{ env.STAGE }} \
            --region ${{ env.AWS_REGION }} \
            --runtime flue \
            --image "${REPO}:${{ github.sha }}-flue-arm64" \
            --account-id ${{ secrets.AWS_ACCOUNT_ID }} \
            --wait-seconds 900

  # ── Flue runtime end-to-end smoke ───────────────────────────────
  # Invokes the deployed Flue dispatcher Lambda with a populated
  # payload mirroring chat-agent-invoke's shape and asserts the
  # response includes a USER.md fingerprint. Catches the class of
  # bugs that shipped silently on 2026-05-05: LWA routing, Bedrock
  # IAM, Sonnet 4.5 inference-profile prefix, missing workspace
  # prompt loader. Each of those individually was caught only when
  # an operator clicked through the admin UI and saw a wrong answer.
  # This gate makes them deploy-blockers instead of operator-noticed.
  #
  # Scope: dev only (uses Marco's tenant + agent IDs). Other stages
  # would need SMOKE_* env vars set; the wrapper script refuses to
  # run when STAGE != dev without those overrides.
  flue-smoke-test:
    name: Flue Smoke Test
    needs: [update-agentcore-runtimes]
    if: >-
      always()
      && needs.update-agentcore-runtimes.result == 'success'
      && env.STAGE == 'dev'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Flue smoke
        run: bash scripts/post-deploy-smoke-flue.sh --stage ${{ env.STAGE }}

  # ── Database migration drift check ──────────────────────────────
  # Runs `scripts/db-migrate-manual.sh` against the dev DB after
  # terraform-apply has ensured the cluster exists. Fails the deploy if
  # any hand-rolled .sql file in packages/database-pg/drizzle/ (i.e.
  # one not registered in meta/_journal.json) declares objects missing
  # from the DB, forcing an operator to apply them via
  # `psql "$DATABASE_URL" -f <file>` before redeploying.
  #
  # Why this exists: three drift incidents in five days (Apr 17 mig
  # 0008; Apr 18 mig 0012 collision; Apr 21 migs 0018+0019) all had
  # the same root cause — hand-rolled migrations are outside
  # drizzle-kit's journal and have no automated drift detection. This
  # gate turns drift into a deploy-time error instead of a runtime
  # surprise. Captures the deferred fix named in session 3fdbdb0c
  # (Apr 17) that stayed open across two incidents.
  #
  # Scope: manual-track only (drizzle/*.sql not in meta/_journal.json).
  # Journal-track drift detection is a separate follow-up. If
  # migration-drift-check surfaces false positives or blocks
  # legitimate deploys, an operator can re-run the workflow after
  # applying the missing migrations via `psql`.
  migration-drift-check:
    name: Migration Drift Check
    needs: [terraform-apply]
    if: always() && needs.terraform-apply.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Get DB endpoint + secret
        id: outputs
        working-directory: terraform/examples/greenfield
        run: |
          terraform init
          terraform workspace select ${{ env.STAGE }} || terraform workspace new ${{ env.STAGE }}
          source ../../../scripts/lib/terraform-output.sh
          echo "db_endpoint=$(tf_output_raw db_cluster_endpoint)" >> "$GITHUB_OUTPUT"
          echo "db_secret_arn=$(tf_output_raw db_secret_arn)" >> "$GITHUB_OUTPUT"

      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Run drift check
        run: |
          DB_PASS=$(aws secretsmanager get-secret-value \
            --secret-id "${{ steps.outputs.outputs.db_secret_arn }}" \
            --query SecretString --output text | jq -r .password)
          # db-migrate-manual.sh shells out to psql, which rejects the
          # `sslmode=no-verify` extension (it's a Node pg driver value,
          # not a Postgres / psql one). Use sslmode=require instead —
          # same RDS-compatible behavior (encrypt, don't verify CA) but
          # actually accepted by psql. scripts/bootstrap-workspace.sh
          # sed-replaces no-verify → require for the same reason; this
          # fix applies the substitution up-front so the drift step
          # doesn't need the sed dance.
          export DATABASE_URL="postgresql://thinkwork_admin:${DB_PASS}@${{ steps.outputs.outputs.db_endpoint }}:5432/thinkwork?sslmode=require"
          bash scripts/db-migrate-manual.sh

  # ── Build & deploy admin app ─────────────────────────────────────
  build-admin:
    name: Build & Deploy Admin
    needs: [terraform-apply]
    if: always() && needs.terraform-apply.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform/examples/greenfield
        run: |
          terraform init
          terraform workspace select ${{ env.STAGE }} || terraform workspace new ${{ env.STAGE }}

      - name: Build & deploy
        run: bash scripts/build-admin.sh ${{ env.STAGE }}
        # API_AUTH_SECRET is intentionally NOT passed to the admin build.
        # The admin SPA authenticates REST calls with the user's Cognito
        # id token (see apps/admin/src/lib/api-fetch.ts). Never re-inject
        # the secret here — Vite inlines it into the public JS bundle.
        # The server-side Lambda env injection (terraform-apply step
        # above) is a separate path and remains untouched.

  # ── Build & deploy docs site ────────────────────────────────────
  build-docs:
    name: Build & Deploy Docs
    needs: [terraform-apply]
    if: always() && needs.terraform-apply.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform/examples/greenfield
        run: |
          terraform init
          terraform workspace select ${{ env.STAGE }} || terraform workspace new ${{ env.STAGE }}

      - name: Build & deploy
        run: bash scripts/build-docs.sh ${{ env.STAGE }}

  # ── Build & deploy public website (apps/www) ───────────────────
  build-www:
    name: Build & Deploy Www
    needs: [terraform-apply]
    if: always() && needs.terraform-apply.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform/examples/greenfield
        run: |
          terraform init
          terraform workspace select ${{ env.STAGE }} || terraform workspace new ${{ env.STAGE }}

      - name: Build & deploy
        run: bash scripts/build-www.sh ${{ env.STAGE }}

  # ── Bootstrap workspace + skills ─────────────────────────────────
  # Depends on migration-drift-check so skill-catalog seeding never runs
  # against an unmigrated schema — if a hand-rolled migration is
  # outstanding, bootstrap's downstream DB writes would see pre-migration
  # table shapes and silently misbehave.
  bootstrap:
    name: Bootstrap
    needs: [detect-changes, terraform-apply, migration-drift-check]
    if: >-
      always()
      && needs.terraform-apply.result == 'success'
      && needs.migration-drift-check.result == 'success'
      && (
        needs.detect-changes.outputs.skills == 'true' ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Get deploy outputs
        id: outputs
        working-directory: terraform/examples/greenfield
        run: |
          terraform init
          terraform workspace select ${{ env.STAGE }} || terraform workspace new ${{ env.STAGE }}
          source ../../../scripts/lib/terraform-output.sh
          echo "bucket=$(tf_output_raw bucket_name)" >> "$GITHUB_OUTPUT"
          echo "db_endpoint=$(tf_output_raw db_cluster_endpoint)" >> "$GITHUB_OUTPUT"
          echo "db_secret_arn=$(tf_output_raw db_secret_arn)" >> "$GITHUB_OUTPUT"

      - name: Run bootstrap
        run: |
          DB_PASS=$(aws secretsmanager get-secret-value --secret-id "${{ steps.outputs.outputs.db_secret_arn }}" --query SecretString --output text | jq -r .password)
          DB_URL="postgresql://thinkwork_admin:${DB_PASS}@${{ steps.outputs.outputs.db_endpoint }}:5432/thinkwork?sslmode=no-verify"
          bash scripts/bootstrap-workspace.sh ${{ env.STAGE }} ${{ steps.outputs.outputs.bucket }} "$DB_URL"

      # Plan §008 U4 — version-aware reseed of every existing tenant's
      # _catalog/defaults/workspace/ prefix. The bootstrap script's per-tenant
      # block above only seeds tenants whose prefix is sparse (<11 files); it
      # has no concept of DEFAULTS_VERSION, so a content-only update (e.g.
      # U3's bump to v4 for the new AGENTS.md / CONTEXT.md) would never reach
      # tenants that already have a populated prefix. The handler below diffs
      # each tenant's stored `_defaults_version` marker against the constant
      # and rewrites only when stale — idempotent on subsequent deploys.
      - name: Reseed workspace-defaults to existing tenants (version-aware)
        run: |
          DB_PASS=$(aws secretsmanager get-secret-value --secret-id "${{ steps.outputs.outputs.db_secret_arn }}" --query SecretString --output text | jq -r .password)
          export DATABASE_URL="postgresql://thinkwork_admin:${DB_PASS}@${{ steps.outputs.outputs.db_endpoint }}:5432/thinkwork?sslmode=no-verify"
          export WORKSPACE_BUCKET="${{ steps.outputs.outputs.bucket }}"
          npx tsx packages/api/src/handlers/seed-workspace-defaults.ts

  # ── Deploy summary ──────────────────────────────────────────────
  summary:
    name: Deploy Summary
    needs:
      [
        detect-changes,
        build-container,
        terraform-apply,
        update-agentcore-runtimes,
        migration-drift-check,
        build-admin,
        build-docs,
        build-www,
        bootstrap,
      ]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # post-deploy.sh's image_contains_source_sha() needs `git cat-file
        # -e <sha>^{commit}` to succeed on both the active runtime image's
        # source sha and the required source sha. With the default depth=1
        # only HEAD is fetched, so any prior-commit sha (the typical case
        # when the merge that triggered the deploy didn't touch the
        # container) fails the existence check and the verifier reports a
        # false-negative drift even when image and source are identical.
        with:
          fetch-depth: 0

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Terraform init
        working-directory: terraform/examples/greenfield
        run: |
          terraform init
          terraform workspace select ${{ env.STAGE }} || terraform workspace new ${{ env.STAGE }}

      - name: Verify AgentCore runtime image
        run: |
          bash scripts/post-deploy.sh \
            --stage ${{ env.STAGE }} \
            --region ${{ env.AWS_REGION }} \
            --runtime strands \
            --min-source-sha ${{ needs.detect-changes.outputs.strands_container_source_sha }} \
            --strict
          bash scripts/post-deploy.sh \
            --stage ${{ env.STAGE }} \
            --region ${{ env.AWS_REGION }} \
            --runtime flue \
            --min-source-sha ${{ needs.detect-changes.outputs.flue_container_source_sha }} \
            --strict

      - name: Fat-folder composed-tree smoke
        timeout-minutes: 5
        run: |
          bash scripts/post-deploy-smoke-fat-folder.sh \
            --stage ${{ env.STAGE }} \
            --region ${{ env.AWS_REGION }}

      - name: Show deployment URLs
        working-directory: terraform/examples/greenfield
        run: |
          source ../../../scripts/lib/terraform-output.sh
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║                    DEPLOYMENT SUMMARY                       ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          echo "║ Stage: ${{ env.STAGE }}"
          echo "║"
          echo "║ Admin App:  $(tf_output_raw admin_url || echo 'N/A')"
          echo "║ Docs Site:  $(tf_output_raw docs_url || echo 'N/A')"
          echo "║ Www Site:   $(tf_output_raw www_url || echo 'N/A')"
          echo "║ API:        $(tf_output_raw api_endpoint || echo 'N/A')"
          echo "║ AppSync:    $(tf_output_raw appsync_api_url || echo 'N/A')"
          echo "║ Hindsight:  $(tf_output_raw hindsight_endpoint || echo 'N/A')"
          echo "║ S3 Bucket:  $(tf_output_raw bucket_name || echo 'N/A')"
          echo "║ Database:   $(tf_output_raw db_cluster_endpoint || echo 'N/A')"
          echo "║ ECR:        $(tf_output_raw ecr_repository_url || echo 'N/A')"
          echo "║ Memory:     managed (always on)"
          echo "║ Hindsight:  $(tf_output_raw hindsight_enabled || echo 'N/A')"
          echo "║"
          echo "║ Job Results:"
          echo "║   Terraform Apply:        ${{ needs.terraform-apply.result }}"
          echo "║   AgentCore Runtime:      ${{ needs.update-agentcore-runtimes.result }}"
          echo "║   Migration Drift Check:  ${{ needs.migration-drift-check.result }}"
          echo "║   Build Admin:            ${{ needs.build-admin.result }}"
          echo "║   Build Docs:             ${{ needs.build-docs.result }}"
          echo "║   Build Www:              ${{ needs.build-www.result }}"
          echo "║   Bootstrap:              ${{ needs.bootstrap.result }}"
          echo "╚══════════════════════════════════════════════════════════════╝"
