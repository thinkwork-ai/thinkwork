name: Plugin Catalog

on:
  pull_request:
    paths:
      - ".github/workflows/plugin-catalog.yml"
      - "plugins/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/plugin-catalog.yml"
      - "plugins/**"
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Publish the main-channel catalog even if no catalog source diff is detected"
        type: boolean
        default: false

env:
  CATALOG_RELEASE_TAG: plugin-catalog-main
  CATALOG_RELEASE_TITLE: "ThinkWork Plugin Catalog (main)"
  CATALOG_ASSET_NAME: thinkwork-plugin-catalog-main.json

jobs:
  validate:
    name: Validate signed catalog build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check generated plugin registry
        run: pnpm --filter @thinkwork/plugin-catalog check:plugins

      - name: Test catalog contracts
        run: pnpm --filter @thinkwork/plugin-catalog test

      - name: Typecheck catalog package
        run: pnpm --filter @thinkwork/plugin-catalog typecheck

      - name: Build and verify signed catalog with ephemeral key
        env:
          CATALOG_PATH: ${{ runner.temp }}/plugin-catalog.json
          PRIVATE_KEY_PATH: ${{ runner.temp }}/plugin-catalog-private.pem
          PUBLIC_KEY_PATH: ${{ runner.temp }}/plugin-catalog-public.pem
        run: |
          set -euo pipefail
          openssl genpkey -algorithm ed25519 -out "$PRIVATE_KEY_PATH"
          openssl pkey -in "$PRIVATE_KEY_PATH" -pubout -out "$PUBLIC_KEY_PATH"
          pnpm --filter @thinkwork/plugin-catalog build:catalog -- \
            --key "$PRIVATE_KEY_PATH" \
            --out "$CATALOG_PATH" \
            --source-repository "$GITHUB_REPOSITORY" \
            --source-ref "$GITHUB_REF_NAME" \
            --source-commit "$(git rev-parse HEAD)"
          pnpm --dir plugins/catalog exec tsx -e "
            import { readFileSync } from 'node:fs';
            import { verifyPluginCatalog } from './src/catalog.ts';
            const document = JSON.parse(readFileSync(process.env.CATALOG_PATH, 'utf8'));
            const trustedPublicKeyPem = readFileSync(process.env.PUBLIC_KEY_PATH, 'utf8');
            const catalog = verifyPluginCatalog({ document, trustedPublicKeyPem });
            if (catalog.source?.repository !== process.env.GITHUB_REPOSITORY) {
              throw new Error('catalog source repository mismatch');
            }
            console.log(
              'verified signed plugin catalog',
              document.signature.catalogSha256,
            );
          "

  detect-catalog-source-change:
    name: Detect catalog source change
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.detect.outputs.should_publish }}
      changed_files: ${{ steps.detect.outputs.changed_files }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        env:
          FORCE_PUBLISH: ${{ inputs.force_publish || false }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$FORCE_PUBLISH" = "true" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "changed_files=workflow_dispatch force_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "changed_files=workflow_dispatch force_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${BEFORE_SHA:-}" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${BEFORE_SHA:-}" 2>/dev/null; then
            files="$(git ls-tree -r --name-only HEAD)"
          else
            files="$(git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA")"
          fi

          changed="$(printf '%s\n' "$files" | grep -E '^(plugins/catalog/|plugins/[^/]+/(src/|package\.json))' || true)"
          if [ -n "$changed" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            {
              echo "changed_files<<EOF"
              printf '%s\n' "$changed"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "changed_files=no catalog-affecting plugin source changes detected" >> "$GITHUB_OUTPUT"
          fi

  publish-main-catalog:
    name: Publish main catalog release asset
    needs:
      - validate
      - detect-catalog-source-change
    if: >
      github.event_name != 'pull_request' &&
      needs.detect-catalog-source-change.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build signed main catalog
        env:
          PLUGIN_CATALOG_SIGNING_KEY: ${{ secrets.PLUGIN_CATALOG_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${PLUGIN_CATALOG_SIGNING_KEY:-}" ]; then
            echo "::error::Missing PLUGIN_CATALOG_SIGNING_KEY secret; cannot publish signed plugin catalog."
            exit 1
          fi
          mkdir -p dist/plugin-catalog
          pnpm --filter @thinkwork/plugin-catalog build:catalog -- \
            --out "dist/plugin-catalog/${CATALOG_ASSET_NAME}" \
            --source-repository "$GITHUB_REPOSITORY" \
            --source-ref "$GITHUB_REF_NAME" \
            --source-commit "$GITHUB_SHA"

      - name: Publish stable release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          notes_file="$(mktemp)"
          {
            echo "Stable signed ThinkWork plugin catalog for the main branch."
            echo ""
            echo "- Source repository: \`${GITHUB_REPOSITORY}\`"
            echo "- Source ref: \`${GITHUB_REF_NAME}\`"
            echo "- Source commit: \`${GITHUB_SHA}\`"
            echo "- Asset: \`${CATALOG_ASSET_NAME}\`"
          } > "$notes_file"

          if gh release view "$CATALOG_RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$CATALOG_RELEASE_TAG" \
              --title "$CATALOG_RELEASE_TITLE" \
              --notes-file "$notes_file" \
              --target "$GITHUB_SHA"
          else
            gh release create "$CATALOG_RELEASE_TAG" \
              --title "$CATALOG_RELEASE_TITLE" \
              --notes-file "$notes_file" \
              --target "$GITHUB_SHA" \
              --latest=false
          fi

          gh release upload "$CATALOG_RELEASE_TAG" \
            "dist/plugin-catalog/${CATALOG_ASSET_NAME}#${CATALOG_ASSET_NAME}" \
            --clobber

      - name: Summarize publication
        run: |
          {
            echo "## Plugin catalog published"
            echo ""
            echo "- Release tag: \`${CATALOG_RELEASE_TAG}\`"
            echo "- Asset: \`${CATALOG_ASSET_NAME}\`"
            echo "- Source commit: \`${GITHUB_SHA}\`"
            echo ""
            echo "Catalog-affecting files:"
            echo '```'
            printf '%s\n' "${{ needs.detect-catalog-source-change.outputs.changed_files }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
