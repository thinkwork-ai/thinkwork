name: Publish React Native SDK

on:
  push:
    tags:
      - "sdk-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only run npm publish --dry-run"
        type: boolean
        default: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @thinkwork/react-native-sdk typecheck
      - run: pnpm --filter @thinkwork/react-native-sdk build

  publish:
    name: Publish to npm
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # Tag-driven: sync the package.json version to the git tag so a single
      # push of `sdk-v0.2.0-beta.0` stamps the tarball without a separate
      # version-bump commit.
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/sdk-v')
        run: |
          VERSION="${GITHUB_REF_NAME#sdk-v}"
          CURRENT=$(node -p "require('./packages/react-native-sdk/package.json').version")
          if [ "$CURRENT" != "$VERSION" ]; then
            cd packages/react-native-sdk && npm version "$VERSION" --no-git-tag-version
          fi
          echo "SDK_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build SDK
        run: pnpm --filter @thinkwork/react-native-sdk build

      # npm requires an explicit --tag for prereleases (versions with a hyphen)
      # so they don't claim the `latest` dist-tag. Derive the prerelease
      # identifier (e.g., "beta" from "0.2.0-beta.0"); fall back to `latest`
      # for stable releases.
      - name: Compute npm dist-tag
        id: tag
        run: |
          VERSION=$(node -p "require('./packages/react-native-sdk/package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            PRE="${VERSION#*-}"      # 0.2.0-beta.0 → beta.0
            TAG="${PRE%%.*}"         # beta.0 → beta
          else
            TAG="latest"
          fi
          echo "npm_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using npm dist-tag: $TAG (version: $VERSION)"

      - name: Publish (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: cd packages/react-native-sdk && npm publish --access public --tag ${{ steps.tag.outputs.npm_tag }} --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: github.event_name != 'workflow_dispatch' || !inputs.dry_run
        run: cd packages/react-native-sdk && npm publish --access public --tag ${{ steps.tag.outputs.npm_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
