name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing v* tag to publish deployable platform assets for"
        required: true
        type: string

env:
  AWS_REGION: us-east-1
  RELEASE_REF_NAME: ${{ inputs.release_tag || github.ref_name }}
  IS_CLI_RELEASE: ${{ !contains(inputs.release_tag || github.ref_name, '-canary.') }}

jobs:
  # ── Build + test ────────────────────────────────────────────────
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF_NAME }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm lint

  # ── Build deployable release artifacts ──────────────────────────
  build-deploy-artifacts:
    name: Build deployable artifacts
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF_NAME }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Release metadata
        id: release
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "version=${RELEASE_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "asset_base_url=https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "agentcore_repository=ghcr.io/${OWNER}/thinkwork-agentcore" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build Lambda zips
        run: |
          bash scripts/build-lambdas.sh
          mkdir -p dist/release/lambdas
          cp dist/lambdas/*.zip dist/release/lambdas/
          cp dist/lambdas/lambdas-manifest.json dist/release/lambdas/

      - name: Build static sites
        run: |
          pnpm --filter @thinkwork/web build
          pnpm --filter @thinkwork/docs build
          bash scripts/release/package-static-assets.sh dist/release/static

      - name: Bundle platform artifacts
        run: bash scripts/release/package-platform-artifacts.sh dist/release

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Compute build timestamp
        id: build_time
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push AgentCore Pi amd64
        id: pi-amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/agentcore-pi/agent-container/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.release.outputs.agentcore_repository }}:${{ env.RELEASE_REF_NAME }}-pi-amd64
            ${{ steps.release.outputs.agentcore_repository }}:${{ steps.release.outputs.commit }}-pi-amd64
          build-args: |
            GIT_SHA=${{ steps.release.outputs.commit }}
            BUILD_TIME=${{ steps.build_time.outputs.value }}
          cache-from: type=gha,scope=release-pi-amd64
          cache-to: type=gha,scope=release-pi-amd64,mode=max
          provenance: false

      - name: Build and push AgentCore Pi arm64
        id: pi-arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/agentcore-pi/agent-container/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.release.outputs.agentcore_repository }}:${{ env.RELEASE_REF_NAME }}-pi-arm64
            ${{ steps.release.outputs.agentcore_repository }}:${{ steps.release.outputs.commit }}-pi-arm64
          build-args: |
            GIT_SHA=${{ steps.release.outputs.commit }}
            BUILD_TIME=${{ steps.build_time.outputs.value }}
          cache-from: type=gha,scope=release-pi-arm64
          cache-to: type=gha,scope=release-pi-arm64,mode=max
          provenance: false

      - name: Build release manifest
        run: |
          AGENTCORE_REPOSITORY="${{ steps.release.outputs.agentcore_repository }}"
          SIGN_ARGS=()
          if [[ -n "${RELEASE_MANIFEST_PRIVATE_KEY:-}" && -n "${RELEASE_MANIFEST_KEY_ID:-}" ]]; then
            install -m 700 -d dist/release/signing
            printf '%s' "$RELEASE_MANIFEST_PRIVATE_KEY" > dist/release/signing/release-private-key.pem
            SIGN_ARGS=(
              --signing-key-id "$RELEASE_MANIFEST_KEY_ID"
              --private-key-path dist/release/signing/release-private-key.pem
              --signature-output dist/release/thinkwork-release.sig.json
              --signature-expires-at "$(date -u -d '+1 year' '+%Y-%m-%dT%H:%M:%S.000Z')"
            )
          fi
          pnpm exec tsx scripts/release/build-release-manifest.ts \
            --version "${{ steps.release.outputs.version }}" \
            --commit "${{ steps.release.outputs.commit }}" \
            --artifact-root dist/release \
            --base-url "${{ steps.release.outputs.asset_base_url }}" \
            --lambda-dir dist/release/lambdas \
            --artifact "name=web,type=static-site,path=dist/release/static/web.tar.gz" \
            --artifact "name=docs,type=static-site,path=dist/release/static/docs.tar.gz" \
            --artifact-bundle "name=platform,path=dist/release/platform-artifacts.tar.gz" \
            --image "name=agentcore-pi-amd64,repository=${AGENTCORE_REPOSITORY},tag=${RELEASE_REF_NAME}-pi-amd64,digest=${{ steps.pi-amd64.outputs.digest }},architecture=amd64" \
            --image "name=agentcore-pi-arm64,repository=${AGENTCORE_REPOSITORY},tag=${RELEASE_REF_NAME}-pi-arm64,digest=${{ steps.pi-arm64.outputs.digest }},architecture=arm64" \
            "${SIGN_ARGS[@]}"
        env:
          RELEASE_MANIFEST_KEY_ID: ${{ secrets.RELEASE_MANIFEST_KEY_ID }}
          RELEASE_MANIFEST_PRIVATE_KEY: ${{ secrets.RELEASE_MANIFEST_PRIVATE_KEY }}

      - name: Upload deployable release assets
        uses: actions/upload-artifact@v4
        with:
          name: thinkwork-release-assets
          path: |
            dist/release/thinkwork-release.json
            dist/release/thinkwork-release.sig.json
            dist/release/platform-artifacts.tar.gz
          retention-days: 7

  # ── Publish CLI to npm ──────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    needs: verify
    # Web canary tags share the v* release workflow for deployable assets, but
    # they must not mutate or publish the CLI package version.
    if: ${{ !contains(inputs.release_tag || github.ref_name, '-canary.') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF_NAME }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Set version from tag
        run: |
          VERSION="${RELEASE_REF_NAME#v}"
          CURRENT=$(node -p "require('./apps/cli/package.json').version")
          if [ "$CURRENT" != "$VERSION" ]; then
            cd apps/cli && npm version "$VERSION" --no-git-tag-version
          fi
          echo "CLI_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build CLI
        run: pnpm --filter thinkwork-cli build

      - name: Publish
        run: cd apps/cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Update Homebrew tap ─────────────────────────────────────────
  publish-homebrew:
    name: Update Homebrew Tap
    needs: publish-npm
    if: ${{ !contains(inputs.release_tag || github.ref_name, '-canary.') }}
    runs-on: ubuntu-latest
    steps:
      - name: Wait for npm propagation
        run: sleep 30

      - name: Get tarball URL and SHA
        id: meta
        run: |
          VERSION="${RELEASE_REF_NAME#v}"
          URL="https://registry.npmjs.org/thinkwork-cli/-/thinkwork-cli-${VERSION}.tgz"
          # Wait for the package to be available
          for i in 1 2 3 4 5; do
            SHA=$(curl -sL "$URL" | shasum -a 256 | cut -d' ' -f1)
            if [ -n "$SHA" ] && [ "$SHA" != "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ]; then
              break
            fi
            sleep 10
          done
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF_NAME }}
          path: thinkwork

      - uses: actions/checkout@v4
        with:
          repository: thinkwork-ai/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          URL="${{ steps.meta.outputs.url }}"
          SHA="${{ steps.meta.outputs.sha256 }}"
          sed "s|__URL__|${URL}|g; s|__SHA__|${SHA}|g" thinkwork/.github/homebrew-formula.rb.template > homebrew-tap/Formula/thinkwork.rb

      - name: Push formula update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/thinkwork.rb
          git commit -m "thinkwork ${{ steps.meta.outputs.version }}"
          git push

  # ── Create GitHub Release ───────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [publish-npm, publish-homebrew, build-deploy-artifacts]
    if: >-
      always() &&
      needs.build-deploy-artifacts.result == 'success' &&
      (
        (
          needs.publish-npm.result == 'success' &&
          needs.publish-homebrew.result == 'success'
        ) ||
        (
          needs.publish-npm.result == 'skipped' &&
          needs.publish-homebrew.result == 'skipped'
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF_NAME }}
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${RELEASE_REF_NAME}"
          PREV_TAG=""
          if [[ "$VERSION" =~ ^(v[0-9]+\.[0-9]+\.[0-9]+-[A-Za-z]+)\.[0-9]+$ ]]; then
            SERIES="${BASH_REMATCH[1]}"
            PREV_TAG=$(git tag --list "${SERIES}.*" --sort=-version:refname | grep -Fxv "$VERSION" | head -1 || true)
          elif [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            PREV_TAG=$(git tag --list "v[0-9]*.[0-9]*.[0-9]*" --sort=-version:refname | grep -Ev -- '-[A-Za-z]+\.[0-9]+$' | grep -Fxv "$VERSION" | head -1 || true)
          fi

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${VERSION}"
          else
            RANGE="${VERSION}"
          fi
          echo "## What's Changed" > notes.md
          echo "" >> notes.md
          mapfile -t CHANGES < <(git log "$RANGE" --pretty=format:"- %s" --no-merges)
          if [ "${#CHANGES[@]}" -eq 0 ]; then
            echo "- Release artifact refresh for ${VERSION}" >> notes.md
          else
            printf '%s\n' "${CHANGES[@]:0:20}" >> notes.md
            if [ "${#CHANGES[@]}" -gt 20 ]; then
              echo "- ...and $((${#CHANGES[@]} - 20)) more commits" >> notes.md
            fi
          fi
          echo "" >> notes.md
          if [[ "$VERSION" == *"-canary."* ]]; then
            echo "_Canary release for validation before stable promotion._" >> notes.md
            echo "" >> notes.md
          fi
          echo "**Machine-consumed platform artifacts:**" >> notes.md
          echo "Backend Lambda zips, static bundles, runtime images, and the release manifest are attached for deployment automation. Signed releases also include thinkwork-release.sig.json; unsigned canaries must be used only with explicit dogfood trust policy. Human installers are the desktop assets and updater metadata." >> notes.md
          echo "" >> notes.md
          echo "---" >> notes.md
          echo "" >> notes.md
          echo "**Install:**" >> notes.md
          echo '```bash' >> notes.md
          if [[ "${IS_CLI_RELEASE}" == "true" ]]; then
            echo "npm install -g thinkwork-cli@${VERSION#v}" >> notes.md
            echo "# or" >> notes.md
            echo "brew install thinkwork-ai/tap/thinkwork" >> notes.md
          else
            echo "thinkwork deploy --stage <stage>" >> notes.md
          fi
          echo '```' >> notes.md
        env:
          IS_CLI_RELEASE: ${{ env.IS_CLI_RELEASE }}

      - name: Download deployable release assets
        uses: actions/download-artifact@v4
        with:
          name: thinkwork-release-assets
          path: dist/release

      - name: Upsert release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          prerelease_args=()
          if [[ "$RELEASE_REF_NAME" == *"-canary."* ]]; then
            prerelease_args=(--prerelease)
          fi

          if gh release view "$RELEASE_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --notes-file notes.md \
              "${prerelease_args[@]}"
          else
            gh release create "$RELEASE_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_REF_NAME" \
              --notes-file notes.md \
              "${prerelease_args[@]}"
          fi

      - name: Publish deployable release assets
        run: bash scripts/release/publish-release-assets.sh "$RELEASE_REF_NAME" dist/release
        env:
          GH_TOKEN: ${{ github.token }}
