name: Migration Precheck

# Pre-merge gate for hand-rolled SQL migrations. Runs on every PR that
# touches packages/database-pg/drizzle/*.sql and verifies the operator
# has applied the migration to the dev DB before merge by running
# `pnpm db:migrate-manual` against dev.
#
# Why this gate exists: five documented drift incidents
# (0008, 0012, 0018/0019, 0036-0039, 0833/0835) all traced to the same
# root cause — hand-rolled migrations land in PRs without being applied
# to dev first, and the failure mode is silent until runtime. See
# docs/solutions/workflow-issues/manually-applied-drizzle-migrations-drift-from-dev-2026-04-21.md.
#
# Distinct from .github/workflows/deploy.yml's `migration-drift-check`
# job (currently `if: false`): that gate fires ~150 separate psql
# connections per deploy and is flake-prone. This gate runs ONCE per PR,
# opens a SINGLE connection, and fails the PR check on MISSING /
# UNVERIFIED markers — the mechanical replacement for the
# operator-discipline-only regime.

on:
  pull_request:
    paths:
      - "packages/database-pg/drizzle/*.sql"
      - "scripts/db-migrate-manual.sh"
      - ".github/workflows/migration-precheck.yml"
  push:
    branches: [main]
    paths:
      - "packages/database-pg/drizzle/*.sql"
      - "scripts/db-migrate-manual.sh"
      - ".github/workflows/migration-precheck.yml"

concurrency:
  group: migration-precheck-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  STAGE: dev

jobs:
  migration-drift-precheck:
    name: Migration Drift Precheck (dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch enough history to diff against the PR base. On push to main
          # we just check the most recent migration. fetch-depth: 0 is the
          # robust choice — the cost is small for a single-job workflow.
          fetch-depth: 0

      - name: Determine PR-changed migration files
        id: changed
        run: |
          set -e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            files=$(git diff --name-only "$base_sha" "$head_sha" -- \
              'packages/database-pg/drizzle/*.sql' \
              ':!packages/database-pg/drizzle/*_rollback.sql')
          else
            # push to main — verify only the latest commit's migrations.
            files=$(git show --name-only --pretty=format: HEAD -- \
              'packages/database-pg/drizzle/*.sql' \
              ':!packages/database-pg/drizzle/*_rollback.sql' | sed '/^$/d')
          fi
          if [ -z "$files" ]; then
            echo "files=" >> "$GITHUB_OUTPUT"
            echo "No migration files changed — script run will be a no-op."
          else
            # GitHub Actions multiline outputs require the heredoc form.
            echo "files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$files" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "Migration files in scope:"
            echo "$files"
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Resolve dev DB endpoint + secret
        id: outputs
        working-directory: terraform/examples/greenfield
        run: |
          terraform init
          terraform workspace select ${{ env.STAGE }} || terraform workspace new ${{ env.STAGE }}
          source ../../../scripts/lib/terraform-output.sh
          echo "db_endpoint=$(tf_output_raw db_cluster_endpoint)" >> "$GITHUB_OUTPUT"
          echo "db_secret_arn=$(tf_output_raw db_secret_arn)" >> "$GITHUB_OUTPUT"

      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client jq

      - name: Verify PR-changed migrations are applied to dev
        if: steps.changed.outputs.files != ''
        run: |
          DB_PASS=$(aws secretsmanager get-secret-value \
            --secret-id "${{ steps.outputs.outputs.db_secret_arn }}" \
            --query SecretString --output text | jq -r .password)
          # psql rejects sslmode=no-verify (a Node pg-driver value).
          # Use sslmode=require — same RDS-compatible behavior, accepted by psql.
          export DATABASE_URL="postgresql://thinkwork_admin:${DB_PASS}@${{ steps.outputs.outputs.db_endpoint }}:5432/thinkwork?sslmode=require"
          # Scope the drift reporter to ONLY the migrations changed in this PR.
          # Pre-existing drift on older migrations is out of scope for this gate
          # (a separate housekeeping concern); the gate's job is to enforce that
          # any new hand-rolled migration is applied to dev before merge.
          files_arg=$(echo "${{ steps.changed.outputs.files }}" | tr '\n' ' ')
          bash scripts/db-migrate-manual.sh $files_arg

      - name: No migrations changed — skip drift probe
        if: steps.changed.outputs.files == ''
        run: echo "No hand-rolled migration files changed in this PR; gate is a no-op."
