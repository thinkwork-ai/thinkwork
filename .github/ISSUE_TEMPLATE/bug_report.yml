name: Bug Report
description: Report a bug in Thinkwork
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill in as much detail as you can.
  - type: input
    id: version
    attributes:
      label: Thinkwork version
      description: "Output of `thinkwork version`"
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: region
    attributes:
      label: AWS region
      placeholder: "us-east-1"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: CloudWatch logs, CLI output, or error messages. Redact secrets.
      render: shell
